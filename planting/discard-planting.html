<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>定植後の破棄（植え直し）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ★ 共通デザイン -->
  <link rel="stylesheet" href="/common/style.css?v=1">
</head>

<body>

  <h1>定植後の破棄（植え直し）</h1>

  <!-- 定植情報 -->
  <section id="planting-info" class="card">
    <h2>定植記録</h2>
    <div>定植日：<span id="plantDate"></span></div>
    <div>圃場：<span id="field"></span></div>
    <div>品種：<span id="variety"></span></div>
    <div>定植株数：<span id="quantity"></span> 株</div>
  </section>

  <!-- 破棄入力 -->
  <section class="card">

    <div class="form-field">
      <label>破棄日</label>
      <input type="date" id="discardDate" class="form-input">
    </div>

    <div class="form-field">
      <label>全体の畝数</label>
      <input type="number" id="totalBeds" class="form-input" min="1" placeholder="例：10">
    </div>

    <div class="form-field">
      <label>耕うんした畝数</label>
      <input type="number" id="tilledBeds" class="form-input" min="0" placeholder="例：3">
    </div>

    <div class="info-block" style="margin-top:10px;">
      <div>破棄割合：<span id="discardRate">-</span>%</div>
      <div>破棄株数：<span id="discardQuantity">-</span> 株</div>
    </div>

    <div class="form-field">
      <label>破棄理由・状況（任意）</label>
      <textarea id="notes" rows="3" class="form-textarea"
        placeholder="例：暑さで焼けた。南側の畝が特に弱かった。"></textarea>
    </div>

  </section>

  <!-- ボタン -->
  <div class="button-row" style="display:flex; gap:10px; margin-top:20px;">
    <button class="primary-btn" style="background:#666;" onclick="history.back()">← 定植ページに戻る</button>
    <button id="saveBtn" class="primary-btn">破棄ログを保存</button>
  </div>

  <!-- JS 読み込み -->
  <script type="module">
    import { initDiscardPage, saveDiscard } from "./discard-planting.js";

    window.addEventListener("DOMContentLoaded", () => {
      initDiscardPage();
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      saveDiscard();
    });
  </script>

</body>
</html>
