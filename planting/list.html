<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>定植ログ一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: sans-serif; padding: 20px; background:#f5f5f5; }
    h1 { margin-bottom: 16px; }

    .filter-box {
      background: #fff;
      padding: 12px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      font-size: 14px;
      text-align: left;
    }
    th {
      background: #e2e8f0;
    }

    .btn-discard {
      background: #c53030;
      color: #fff;
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-new {
      display: block;
      width: 100%;
      padding: 12px;
      background: #2b6cb0;
      color: #fff;
      border: none;
      border-radius: 4px;
      margin-top: 20px;
      font-size: 16px;
      text-align: center;
      text-decoration: none;
    }

    /* 認証前は非表示 */
    #main-area { display: none; }
  </style>

  <script type="module">
    import { verifyLocalAuth } from "/yamamoto-farm-log/common/ui.js";
    import { loadCSV } from "../common/csv.js";

    let canDiscard = false;
    let plantingRows = [];

    // -----------------------------
    // 初期化（認証 → 表示 → データ読み込み）
    // -----------------------------
    window.addEventListener("DOMContentLoaded", async () => {

      // 認証チェック（index.html と同じ）
      const auth = await verifyLocalAuth();
      if (!auth.ok) return;

      // admin / family は破棄可能
      if (auth.role === "admin" || auth.role === "family") {
        canDiscard = true;
      }

      // 認証済み → UI 表示
      document.getElementById("main-area").style.display = "block";

      // データ読み込み
      await loadPlantingList();
    });

    // -----------------------------
    // 定植ログの読み込み
    // -----------------------------
    async function loadPlantingList() {
      plantingRows = await loadCSV("logs/planting/all.csv");

      populateYearFilter();
      populateFieldFilter();
      populateVarietyFilter();

      renderTable(plantingRows);
    }

    // -----------------------------
    // フィルタ生成
    // -----------------------------
    function populateYearFilter() {
      const yearSet = new Set();
      plantingRows.forEach(r => {
        if (r.plantDate) yearSet.add(r.plantDate.slice(0, 4));
      });

      const sel = document.getElementById("filterYear");
      yearSet.forEach(y => {
        const opt = document.createElement("option");
        opt.value = y;
        opt.textContent = y;
        sel.appendChild(opt);
      });
    }

    function populateFieldFilter() {
      const fieldSet = new Set();
      plantingRows.forEach(r => {
        if (r.field) fieldSet.add(r.field);
      });

      const sel = document.getElementById("filterField");
      fieldSet.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f;
        opt.textContent = f;
        sel.appendChild(opt);
      });
    }

    function populateVarietyFilter() {
      const set = new Set();
      plantingRows.forEach(r => {
        if (r.variety) set.add(r.variety);
      });

      const sel = document.getElementById("filterVariety");
      set.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        sel.appendChild(opt);
      });
    }

    // -----------------------------
    // フィルタ適用
    // -----------------------------
    function applyFilter() {
      const year = document.getElementById("filterYear").value;
      const month = document.getElementById("filterMonth").value;
      const field = document.getElementById("filterField").value;
      const variety = document.getElementById("filterVariety").value;

      const filtered = plantingRows.filter(r => {
        const y = r.plantDate.slice(0, 4);
        const m = r.plantDate.slice(5, 7);

        if (year && y !== year) return false;
        if (month && m !== month) return false;
        if (field && r.field !== field) return false;
        if (variety && r.variety !== variety) return false;

        return true;
      });

      renderTable(filtered);
    }

    window.applyFilter = applyFilter;

    // -----------------------------
    // テーブル描画
    // -----------------------------
    function renderTable(rows) {
      const tbody = document.querySelector("#plantingTable tbody");
      tbody.innerHTML = "";

      rows.forEach(r => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${r.plantDate}</td>
          <td>${r.field}</td>
          <td>${r.variety}</td>
          <td>${r.quantity}</td>
          <td>${r.seedRef}</td>
          <td>
            ${canDiscard ? `<button class="btn-discard" onclick="location.href='discard-planting.html?ref=${r.plantingRef}'">破棄</button>` : ""}
          </td>
        `;

        tbody.appendChild(tr);
      });
    }
  </script>

</head>

<body>

  <div id="main-area">

    <h1>定植ログ一覧</h1>

    <a href="index.html" class="btn-new">＋ 新しい定植ログを追加</a>

    <div class="filter-box">
      <label>年</label>
      <select id="filterYear"><option value="">すべて</option></select>

      <label style="margin-left:10px;">月</label>
      <select id="filterMonth">
        <option value="">すべて</option>
        <option value="01">1月</option>
        <option value="02">2月</option>
        <option value="03">3月</option>
        <option value="04">4月</option>
        <option value="05">5月</option>
        <option value="06">6月</option>
        <option value="07">7月</option>
        <option value="08">8月</option>
        <option value="09">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>

      <label style="margin-left:10px;">圃場</label>
      <select id="filterField"><option value="">すべて</option></select>

      <label style="margin-left:10px;">品名</label>
      <select id="filterVariety"><option value="">すべて</option></select>

      <button style="margin-top:10px;" onclick="applyFilter()">フィルタ適用</button>
    </div>

    <table id="plantingTable">
      <thead>
        <tr>
          <th>定植日</th>
          <th>圃場</th>
          <th>品名</th>
          <th>株数</th>
          <th>播種ID</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

</body>
</html>
