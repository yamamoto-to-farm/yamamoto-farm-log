<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>播種ログ - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: sans-serif; padding: 20px; background:#f5f5f5; }
    h1 { margin-bottom: 16px; }
    h2 { margin-top: 24px; }
    .field { margin-bottom: 12px; }
    .field label { display:block; margin-bottom:4px; }
    .box { padding: 15px; border: 1px solid #ccc; margin-top: 10px; background:#fff; }
    input, select, textarea {
      width: 100%; padding: 8px; box-sizing: border-box; font-size: 14px;
    }
    button {
      width: 100%; padding: 12px; font-size: 16px;
      background: #2b6cb0; color: #fff; border: none; border-radius: 4px;
      margin-top: 20px;
    }
    button:active { opacity: 0.8; }

    #seedRef {
      background: #fff3b0;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div id="form-area" style="display:none;">

    <h1>播種ログ</h1>

    <!-- 日付 -->
    <div class="field">
      <label for="seedDate">播種日</label>
      <input type="date" id="seedDate">
    </div>

    <!-- 品種 -->
    <h2>品種</h2>
    <div class="box">
      <label>種別</label>
      <select id="varietyType">
        <option value="">種別を選択</option>
      </select>

      <label style="margin-top:10px;">品名</label>
      <select id="variety">
        <option value="">種別を選んでください</option>
      </select>
    </div>

    <!-- セルトレイ -->
    <h2>セルトレイ</h2>
    <div class="box">
      <label>セルトレイ種別</label>
      <label><input type="radio" name="trayType" value="128" checked>128穴</label>
      <label><input type="radio" name="trayType" value="200">200穴</label>

      <hr style="margin: 15px 0;">

      <label>枚数</label>
      <input type="number" id="trayCount" inputmode="numeric">

      <p>自動計算：<span id="calcStock">0</span> 株</p>
    </div>

    <!-- 由来 -->
    <h2>種の由来</h2>
    <div class="box">
      <label><input type="radio" name="source" value="自家採種" checked> 自家採種</label>
      <label><input type="radio" name="source" value="購入"> 購入</label>
    </div>

    <!-- seedRef -->
    <h2>管理ID（自動生成）</h2>
    <div class="box">
      <input id="seedRef" readonly>
    </div>

    <!-- 備考 -->
    <h2>備考</h2>
    <div class="box">
      <textarea id="memo" rows="3" placeholder="メモ（任意）"></textarea>
    </div>

    <!-- 保存 -->
    <button type="button" onclick="saveSeed()">GitHub に保存する</button>

  </div>

  <script type="module">
    import { verifyLocalAuth } from "/yamamoto-farm-log/common/ui.js";
    import { initSeedPage } from "./seed.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      document.getElementById("form-area").style.display = "block";

      const today = new Date().toISOString().slice(0, 10);
      document.getElementById("seedDate").value = today;

      initSeedPage();
    });
  </script>

  <script type="module" src="../common/save/index.js"></script>

</body>
</html>
