name: Save log

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "UI から送られてくる JSON データ"
        required: true
        type: string

jobs:
  save:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------
      # 1. データリポジトリをチェックアウト
      # --------------------------------------------
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: yamamoto-to-farm/yamamoto-farm-log
          token: ${{ secrets.FARM_DATA_TOKEN }}

      # --------------------------------------------
      # 2. payload をファイルに保存
      # --------------------------------------------
      - name: Parse payload
        id: parse
        run: |
          echo '${{ inputs.payload }}' > payload.json
          cat payload.json

      # --------------------------------------------
      # 3. type と dateStr を抽出
      # --------------------------------------------
      - name: Extract fields
        id: extract
        run: |
          TYPE=$(jq -r '.type' payload.json)
          DATE=$(jq -r '.dateStr' payload.json)
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      # --------------------------------------------
      # 4. JSON 保存（summary も通常ログもここ）
      # --------------------------------------------
      - name: Save JSON (summary or normal log)
        run: |
          TYPE=${{ steps.extract.outputs.type }}
          DATE=${{ steps.extract.outputs.date }}

          JSON_FILE="$DATE"

          mkdir -p "$(dirname "$JSON_FILE")"
          jq -r '.json' payload.json > "$JSON_FILE"

      # --------------------------------------------
      # 5. CSV append（通常ログのみ）
      # --------------------------------------------
      - name: Save CSV (append)
        if: ${{ fromJson(inputs.payload).replaceCsv == '' && fromJson(inputs.payload).type != 'summary' }}
        run: |
          TYPE=${{ steps.extract.outputs.type }}
          CSV_LINE=$(jq -r '.csv' payload.json)

          mkdir -p logs/$TYPE
          CSV_FILE="logs/$TYPE/all.csv"

          echo "$CSV_LINE" >> "$CSV_FILE"

      # --------------------------------------------
      # 6. CSV 全書き換え（管理画面用）
      # --------------------------------------------
      - name: Replace CSV (overwrite all.csv)
        if: ${{ fromJson(inputs.payload).replaceCsv != '' && fromJson(inputs.payload).type != 'summary' }}
        run: |
          TYPE=${{ steps.extract.outputs.type }}
          mkdir -p logs/$TYPE

          jq -r '.replaceCsv' payload.json > logs/$TYPE/all.csv

      # --------------------------------------------
      # 7. Commit & Push（★修正ポイント★）
      # --------------------------------------------
      - name: Commit & Push
        run: |
          git config user.name "farm-bot"
          git config user.email "actions@github.com"

          # ★ logs/* ではなく、全体をコミットする
          git add .

          git commit -m "save ${{ steps.extract.outputs.type }} log for ${{ steps.extract.outputs.date }}" || echo "No changes"
          git push