<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>収穫KPI（月別 予定 × 実績）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: sans-serif; padding: 20px; background:#f5f5f5; }
    h1 { margin-bottom: 20px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #fff;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px 10px;
      text-align: right;
    }

    th {
      background: #f0f0f0;
      text-align: center;
    }

    .diff-positive { color: #2e8b57; font-weight: bold; }
    .diff-negative { color: #c0392b; font-weight: bold; }
    .diff-zero { color: #555; }

    #loading {
      margin-top: 20px;
      font-size: 18px;
      color: #555;
    }
  </style>

  <script type="module" src="/yamamoto-farm-log/common/ui.js?v=1"></script>
  <script type="module" src="./harvest-kpi.js?v=1"></script>
</head>

<body>

  <h1>収穫KPI（月別 予定 × 実績）</h1>

  <div id="loading">データ読込中...</div>

  <table id="kpi-table" style="display:none;">
    <thead>
      <tr>
        <th>月</th>
        <th>予定面積(反)</th>
        <th>実績面積(反)</th>
        <th>差分(反)</th>
        <th>目標収量(kg)</th>
        <th>収穫実績(kg)</th>
        <th>目標基数(基)</th>
        <th>出荷実績(基)</th>
      </tr>
    </thead>
    <tbody id="kpi-body">
      <!-- JS で埋める -->
    </tbody>
  </table>

</body>
</html>
