<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPI 月別分析</title>

  <!-- CSS（存在しないと 404 になるので、空でも作っておく） -->
  <link rel="stylesheet" href="/common/style.css">

  <style>
    /* 最低限の保険スタイル（CSS が無くても崩れないように） */
    body { font-family: sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 6px 8px; }
    th { background: #f0f0f0; }
    .left { text-align: left; }
    .total-row { font-weight: bold; background: #fafafa; }
  </style>
</head>

<body>

  <!-- ★ ナビバーをここに追加 -->
  <script type="module">
    import { renderNavbar } from "/common/header.js?v=1.1";
    renderNavbar();
  </script>

  <h1 id="month-title">読み込み中...</h1>

  <table>
    <thead>
      <tr>
        <th>ロット</th>
        <th>品種</th>
        <th>圃場</th>
        <th>面積(反)</th>
        <th>収穫量(kg)</th>
        <th>出荷量(基)</th>
        <th>反当たり収量</th>
        <th>収穫期間</th>
        <th>分析</th>
      </tr>
    </thead>

    <tbody id="kpi-month-body"></tbody>

    <tfoot>
      <tr id="kpi-month-total"></tr>
    </tfoot>
  </table>

  <!-- JS 読み込み -->
  <script type="module" src="kpi-month.js?v=1.1"></script>

</body>
</html>
