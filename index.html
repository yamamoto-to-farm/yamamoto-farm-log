<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>山本農園ログ - 目次</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ★ キャッシュ対策 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- ★ 共通スタイル（バージョン必須） -->
  <link rel="stylesheet" href="/yamamoto-farm-log/common/style.css?v=1">

  <!-- ★ ui.js にキャッシュバスター -->
  <script type="module" src="/yamamoto-farm-log/common/ui.js?v=1"></script>

  <script type="module">
    import { showPinGate } from "/yamamoto-farm-log/common/ui.js?v=1";

    async function loadPages() {
      // ★ pages.json にキャッシュバスター
      const res = await fetch(`/yamamoto-farm-log/data/pages.json?v=${Date.now()}`);
      return (await res.json()).pages;
    }

    function createCard(page) {
      const div = document.createElement("div");
      div.className = "menu-card";
      div.innerHTML = `<a href="${page.path}">${page.name}</a>`;
      return div;
    }

    function ensureSection(category) {
      let section = document.querySelector(`[data-category="${category}"]`);
      if (!section) {
        const title = document.createElement("div");
        title.className = "menu-section-title";
        title.textContent = category;

        const grid = document.createElement("div");
        grid.className = "menu-grid";
        grid.dataset.category = category;

        const menu = document.getElementById("menu-area");
        menu.appendChild(title);
        menu.appendChild(grid);

        return grid;
      }
      return section;
    }

    window.addEventListener("DOMContentLoaded", () => {

      showPinGate("pin-area", async () => {

        document.getElementById("login-user").textContent =
          `ログイン中：${window.currentHuman}（${window.currentRole}）`;

        document.getElementById("logout-btn").style.display = "inline-block";
        document.getElementById("menu-area").style.display = "block";

        const role = window.currentRole;
        const pages = await loadPages();

        pages.forEach(page => {
          if (!page.roles.includes(role)) return;
          if (page.category.startsWith("管理/")) return;

          const grid = ensureSection(page.category);
          grid.appendChild(createCard(page));
        });
      });

      document.getElementById("logout-btn").addEventListener("click", () => {
        localStorage.removeItem("human");
        localStorage.removeItem("role");
        location.reload();
      });
    });
  </script>

</head>

<body>

  <h1>山本農園ログ - 目次</h1>

  <div id="login-user"></div>
  <button id="logout-btn" style="display:none;">ログアウト</button>

  <div id="pin-area">
    <div>アクセスキーを入力してください</div>
    <input id="pin-input" type="password" class="pin-input">
    <button id="pin-submit" class="pin-submit">OK</button>
  </div>

  <div id="menu-area" style="display:none"></div>

</body>
</html>
