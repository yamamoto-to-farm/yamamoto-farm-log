<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>圃場詳細 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ★ 共通デザイン -->
  <link rel="stylesheet" href="/common/css/main.css?v=1">
</head>

<body>

  <!-- ★ ページタイトル（動的に変更される） -->
  <h1 id="field-name" class="page-title"></h1>

  <!-- ★ 分析カード or 圃場一覧 -->
  <div id="analysis-container">読み込み中…</div>

  <!-- 地図に戻る -->
  <button class="primary-btn" onclick="location.href='/map/index.html'">
    地図に戻る
  </button>

  <!-- ★ 印刷ボタン（別ウィンドウ印刷） -->
  <button id="print-btn" class="primary-btn" style="margin-left:10px;">
    印刷
  </button>

  <!-- 認証チェック & メイン処理 -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js?v=1.1";
    import { initAnalysisPage } from "./analysis.js";   // 圃場別分析
    import { renderFieldList } from "./index.js";        // 圃場一覧
    import { printContent } from "/common/utils.js";     // ★ 共通印刷ユーティリティ

    window.addEventListener("DOMContentLoaded", async () => {

      // 認証チェック
      const ok = await verifyLocalAuth();
      if (!ok) return;

      // ヘッダー表示
      renderHeader();

      // worker → 閲覧禁止
      if (window.currentRole !== "family" && window.currentRole !== "admin") {
        alert("このページは家族のみ閲覧できます");
        location.href = "/map/index.html";
        return;
      }

      // ★ URL パラメータ取得
      const params = new URLSearchParams(location.search);
      const field = params.get("field");

      // ★ 分岐
      if (field) {
        document.getElementById("field-name").textContent = `${field}（圃場詳細）`;
        initAnalysisPage(field);

      } else {
        document.getElementById("field-name").textContent = "圃場を選択してください";
        await renderFieldList();
      }
    });

    /* -----------------------------------------
       印刷ボタン：別ウィンドウで印刷
    ----------------------------------------- */
    document.getElementById("print-btn").addEventListener("click", () => {
      printContent("#analysis-container", "圃場一覧");
    });
  </script>

</body>
</html>
