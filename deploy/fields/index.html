<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>圃場詳細 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ★ 共通デザイン -->
  <link rel="stylesheet" href="/common/css/main.css?v=20260715-2">
  <link rel="stylesheet" href="./index.css?v=20260715-1">
</head>

<body>

  <div id="page-area">
    <!-- ★ ページタイトル（動的に変更される） -->
    <h1 id="field-name" class="page-title"></h1>

    <!-- ★ 分析カード or 圃場一覧 -->
    <div id="analysis-container">読み込み中…</div>

    <!-- 地図に戻る -->
    <div class="back-action-slot">
      <button class="secondary-btn unified-back-btn" type="button" onclick="location.href='/map/index.html'">
        地図に戻る
      </button>
    </div>
  </div>

  <!-- 認証チェック & メイン処理 -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js?v=1.1";
    import { initAnalysisPage } from "./analysis.js?v=20260715-4";   // 圃場別分析
    import { renderFieldList } from "./index.js?v=20260715-4";        // 圃場一覧
    import { printInline } from "/common/utils.js?v=1";

    window.addEventListener("DOMContentLoaded", async () => {

      // 認証チェック
      const ok = await verifyLocalAuth();
      if (!ok) return;

      // ヘッダー表示
      renderHeader();

      // worker → 閲覧禁止
      if (window.currentRole !== "family" && window.currentRole !== "admin") {
        alert("このページは家族のみ閲覧できます");
        location.href = "/map/index.html";
        return;
      }

      // ★ URL パラメータ取得
      const params = new URLSearchParams(location.search);
      const field = params.get("field");
      const view = params.get("view") || "active";

      // ★ 分岐
      if (field) {
        document.getElementById("field-name").textContent = `${field}（圃場詳細）`;
        initAnalysisPage(field);

      } else {
        document.getElementById("field-name").textContent =
          view === "expired" ? "契約終了した圃場一覧" : "圃場一覧";
        await renderFieldList({ view });
      }
    });


  </script>

  <script src="/common/sw-register.js?v=20260713-1"></script>
</body>

</html>
