<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>播種ロット破棄 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
</head>
<body>
  <div class="page-container" id="form-area" style="display:none;">
    <h1 class="page-title">播種ロット破棄</h1>

    <section id="seed-info" class="card">
      <h2 class="section-title" style="margin-top:0;">播種ロット情報</h2>
      <div>播種ID: <span id="seedRefText"></span></div>
      <div>播種日: <span id="seedDateText"></span></div>
      <div>品種: <span id="varietyText"></span></div>
      <div>トレイ: <span id="trayInfoText"></span></div>
      <div>現在残数: <span id="remainingTrayText"></span> / <span id="remainingPlantText"></span></div>
    </section>

    <section class="card">
      <h2 class="section-title" style="margin-top:0;">破棄内容</h2>

      <div class="form-field">
        <label for="discardDate">破棄日</label>
        <input type="date" id="discardDate" class="form-input">
      </div>

      <div class="form-field">
        <label for="discardReason">破棄理由</label>
        <select id="discardReason" class="form-input">
          <option value="補植余り">補植余り</option>
          <option value="育苗不良">育苗不良</option>
          <option value="病害">病害</option>
          <option value="暑さ障害">暑さ障害</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="form-field">
        <label for="discardTrays">破棄トレイ枚数</label>
        <input type="number" id="discardTrays" class="form-input" min="0" step="0.1" inputmode="decimal" placeholder="例: 0.5 / 1 / 2.5">
      </div>

      <div class="info-block" style="margin-top:10px;">
        <div>破棄株数: <span id="discardQuantity">0</span> 株</div>
        <div>破棄後残数: <span id="remainingAfterTray">-</span> / <span id="remainingAfterPlant">-</span></div>
      </div>

      <div class="form-field">
        <label for="notes">備考（任意）</label>
        <textarea id="notes" rows="3" class="form-textarea" placeholder="例: 補植用に持ち出したが余り苗を破棄。"></textarea>
      </div>
    </section>

    <div class="button-row" style="display:flex; gap:10px; margin-top:20px; flex-wrap:wrap;">
      <button class="secondary-btn unified-back-btn" type="button" onclick="history.back()">← 一覧へ戻る</button>
      <button id="saveBtn" class="primary-btn" type="button">破棄ログを保存</button>
    </div>
  </div>

  <div id="modal-container"></div>
  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("modal-container").innerHTML = html;
      });
  </script>

  <script type="module">
    import { verifyLocalAuth } from "../common/ui.js";
    import { renderHeader } from "../common/header.js";
    import { initDiscardSeedPage, saveDiscardSeed } from "./discard-seed.js?v=20260724-1";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      renderHeader();
      document.getElementById("form-area").style.display = "block";
      await initDiscardSeedPage();
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      saveDiscardSeed();
    });
  </script>

  <script type="module" src="../common/save/index.js"></script>
  <script src="/common/sw-register.js?v=20260713-1"></script>
</body>
</html>
