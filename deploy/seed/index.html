<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>播種ログ - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ★ 共通デザイン（相対パス） -->
  <link rel="stylesheet" href="../common/style.css?v=1">
</head>

<body>

  <!-- ===============================
       固定ヘッダー（共通）
  =============================== -->
  <header class="app-header">
    <h1 class="app-title">山本農園 OS</h1>

    <div class="header-right">
      <span id="login-user"></span>
      <button id="logout-btn" class="logout-btn" style="display:none;">ログアウト</button>
    </div>
  </header>

  <div id="form-area" style="display:none;">

    <!-- ★ ページタイトル（統一） -->
    <h1 class="page-title">播種ログ</h1>

    <!-- 日付 -->
    <h2 class="section-title">播種日</h2>
    <div class="form-field">
      <input type="date" id="seedDate" class="form-input">
    </div>

    <!-- 品種 -->
    <h2 class="section-title">品種</h2>
    <div class="card">
      <label>種別</label>
      <select id="varietyType" class="form-input">
        <option value="">種別を選択</option>
      </select>

      <label style="margin-top:10px;">品名</label>
      <select id="variety" class="form-input">
        <option value="">種別を選んでください</option>
      </select>
    </div>

    <!-- セルトレイ -->
    <h2 class="section-title">セルトレイ</h2>
    <div class="card">
      <label>セルトレイ種別</label>
      <label><input type="radio" name="trayType" value="128" checked>128穴</label>
      <label><input type="radio" name="trayType" value="200">200穴</label>

      <hr style="margin: 15px 0;">

      <label>枚数</label>
      <input type="number" id="trayCount" class="form-input" inputmode="numeric">

      <p>自動計算：<span id="calcStock">0</span> 株</p>
    </div>

    <!-- 播種区分 -->
    <h2 class="section-title">播種区分</h2>
    <div class="card">
      <label><input type="radio" name="source" value="自家播種" checked> 自家播種</label>
      <label><input type="radio" name="source" value="中神種苗"> 中神種苗</label>
      <label><input type="radio" name="source" value="農協"> 農協</label>
      <label><input type="radio" name="source" value="試験品種"> 試験品種</label>
    </div>

    <!-- seedRef -->
    <h2 class="section-title">管理ID（自動生成）</h2>
    <div class="card">
      <input id="seedRef" class="form-input" readonly style="background:#fff3b0; font-weight:bold;">
    </div>

    <!-- 備考 -->
    <h2 class="section-title">備考</h2>
    <div class="card">
      <textarea id="memo" rows="3" class="form-textarea" placeholder="メモ（任意）"></textarea>
    </div>

    <!-- 保存 -->
    <button type="button" class="primary-btn" onclick="saveSeed()">保存</button>

  </div>

  <script type="module">
    import { verifyLocalAuth } from "../common/ui.js";
    import { initSeedPage } from "./seed.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      /* ▼ ログインユーザー表示 */
      document.getElementById("login-user").textContent =
        `ログイン中：${window.currentHuman}（${window.currentRole}）`;
      document.getElementById("logout-btn").style.display = "inline-block";

      /* ▼ ログアウト処理 */
      document.getElementById("logout-btn").addEventListener("click", () => {
        localStorage.removeItem("human");
        localStorage.removeItem("role");
        location.href = "/index.html";
      });

      document.getElementById("form-area").style.display = "block";

      const today = new Date().toISOString().slice(0, 10);
      document.getElementById("seedDate").value = today;

      initSeedPage();
    });
  </script>

  <!-- 保存処理 -->
  <script type="module" src="../common/save/index.js"></script>

  <!-- ★★★★★ 共通保存モーダル ★★★★★ -->
  <div id="modal-container"></div>
  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("modal-container").innerHTML = html;
      });
  </script>

</body>

</html>
