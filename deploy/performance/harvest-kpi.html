<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>kpi-year-index.js 単体テスト（デバッグ強化）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/common/style.css">
</head>

<body>

  <h1>kpi-year-index.js 単体テスト（デバッグ強化）</h1>

  <button id="btn-test-hash">computeSummaryIndexHash()</button>
  <button id="btn-test-check">checkYearIndexNeedsUpdate()</button>
  <button id="btn-test-generate">generateYearIndex()</button>

  <h2>出力</h2>
  <pre id="output" style="margin-top:20px; background:#eee; padding:10px;"></pre>

  <h2>コンソールログ</h2>
  <p>※ F12 → Console を開いてください</p>

  <script type="module">
    import {
      computeSummaryIndexHash,
      checkYearIndexNeedsUpdate,
      generateYearIndex
    } from "/performance/kpi-year-index.js?v=1.1";

    import { loadYearIndex, loadSummaryIndex } from "/performance/kpi-data-loader.js";

    const out = document.getElementById("output");

    function log(obj) {
      out.textContent = JSON.stringify(obj, null, 2);
      console.log("▼ 出力:", obj);
    }

    // ============================
    // 1. ハッシュ計算テスト
    // ============================
    document.getElementById("btn-test-hash").onclick = async () => {
      console.log("=== TEST: computeSummaryIndexHash() ===");

      try {
        const summaryIndex = await loadSummaryIndex();
        console.log("summary-index.json 読み込み成功:", summaryIndex);

        const hash = await computeSummaryIndexHash();
        console.log("計算されたハッシュ:", hash);

        log({ hash, summaryIndex });
      } catch (e) {
        console.error("computeSummaryIndexHash エラー:", e);
        log({ error: e.toString() });
      }
    };

    // ============================
    // 2. 更新チェックテスト
    // ============================
    document.getElementById("btn-test-check").onclick = async () => {
      console.log("=== TEST: checkYearIndexNeedsUpdate() ===");

      try {
        const yearIndex = await loadYearIndex();
        console.log("year-index.json 読み込み成功:", yearIndex);

        const needs = await checkYearIndexNeedsUpdate(yearIndex);
        console.log("更新が必要か:", needs);

        log({ needs, yearIndex });
      } catch (e) {
        console.error("checkYearIndexNeedsUpdate エラー:", e);
        log({ error: e.toString() });
      }
    };

    // ============================
    // 3. year-index.json 生成テスト
    // ============================
    document.getElementById("btn-test-generate").onclick = async () => {
      console.log("=== TEST: generateYearIndex() ===");

      try {
        const result = await generateYearIndex();
        console.log("生成された year-index:", result);

        log(result);
      } catch (e) {
        console.error("generateYearIndex エラー:", e);
        log({ error: e.toString() });
      }
    };
  </script>

</body>
</html>
