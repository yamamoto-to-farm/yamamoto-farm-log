<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>KPI Render 単体テスト</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- KPI 専用 CSS（表が見えるように） -->
  <link rel="stylesheet" href="/performance/kpi.css">
</head>

<body>

  <h1>KPI Render 単体テスト</h1>

  <!-- 出力確認エリア -->
  <div id="test-area" style="margin-top:20px; background:#fff; padding:20px;"></div>

  <!-- kpi-render.js のみ読み込む -->
  <script type="module">
    import { renderYearBlock, renderKpiTable } from "/performance/kpi-render.js";

    // ============================
    // ★ テストデータ（固定値）
    // ============================
    const planArea = Array(12).fill(1.23);        // 予定面積
    const areaMonthly = Array(12).fill(0.98);     // 収穫面積
    const actuals = {
      kg: Array(12).fill(1500),
      units: Array(12).fill(300)
    };
    const targets = {
      targetKg: Array(12).fill(2000),
      targetUnits: Array(12).fill(350)
    };

    // ============================
    // ★ renderYearBlock() のテスト
    // ============================
    const yearBlockHTML = renderYearBlock(2025);

    // ============================
    // ★ renderKpiTable() のテスト
    // ============================
    const tableHTML = renderKpiTable(
      planArea,
      areaMonthly,
      actuals,
      targets,
      2025
    );

    // ============================
    // ★ DOM に描画
    // ============================
    document.getElementById("test-area").innerHTML = `
      <h2>renderYearBlock(2025) の出力</h2>
      ${yearBlockHTML}

      <h2 style="margin-top:40px;">renderKpiTable() の出力</h2>
      ${tableHTML}
    `;
  </script>

</body>
</html>
