<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>収穫KPI（月別 予定 × 実績）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/common/style.css">
  <link rel="stylesheet" href="/performance/kpi.css">

  <style>
    body { padding: 20px; font-family: sans-serif; }
    .debug-box {
      border: 2px solid #444;
      background: #fafafa;
      padding: 10px;
      margin-top: 20px;
      white-space: pre-wrap;
    }
    .ok { color: green; font-weight: bold; }
    .ng { color: red; font-weight: bold; }
    .debug-only { display:none; }
  </style>

  <script type="module" src="/common/ui.js?v=1"></script>
</head>

<body>

  <script type="module">
    import { renderNavbar } from "/common/header.js?v=1.1";
    renderNavbar();
  </script>

  <h1>収穫KPI（月別 予定 × 実績）</h1>

  <!-- ★ デバッグ用ボタン（DEBUG=true のときだけ表示） -->
  <div id="debug-buttons" class="debug-only" style="margin-bottom:20px;">
    <button id="btn-generate">year-index.json を再生成（保存テスト）</button>
    <button id="btn-load">year-index.json を読み込み（確認）</button>
  </div>

  <!-- KPI 描画エリア -->
  <div id="kpi-container" style="border:2px solid blue; padding:10px;">
    初期状態
  </div>

  <!-- デバッグログ（DEBUG=true のときだけ表示） -->
  <h2 id="debug-title" class="debug-only">デバッグログ</h2>
  <div id="debug-log" class="debug-box debug-only"></div>

  <script type="module">
    import { renderKpiPage } from "/performance/harvest-kpi.js?v=1.1";
    import { generateYearIndex, saveYearIndex } from "/performance/kpi-year-index.js?v=1.1";
    import { loadJSON } from "/common/json.js";

    // ------------------------------
    // ★ デバッグ ON/OFF
    // ------------------------------
    const DEBUG = localStorage.getItem("debugKPI") === "1";

    if (DEBUG) {
      document.querySelectorAll(".debug-only").forEach(el => el.style.display = "block");
    }

    const log = (msg) => {
      if (!DEBUG) return;
      const box = document.getElementById("debug-log");
      box.innerHTML += msg + "\n";
      console.log(msg);
    };

    // ------------------------------
    // harvest-kpi.js の単体テスト（既存のまま）
    // ------------------------------
    log("① <span class='ok'>OK</span> kpi-container が存在します");
    log("② renderKpiPage() を実行します…");

    renderKpiPage().then(() => {
      log("③ <span class='ok'>OK</span> renderKpiPage() 完了");

      const kc = document.getElementById("kpi-container");
      const html = kc.innerHTML.trim();

      if (html.length > 0) log("④ <span class='ok'>OK</span> kpi-container に HTML が挿入されました");
      else log("④ <span class='ng'>NG</span> kpi-container が空のままです");

      const details = kc.querySelector("details");
      if (details) log("⑤ <span class='ok'>OK</span> details（年度ブロック）が生成されました");
      else log("⑤ <span class='ng'>NG</span> details が生成されていません");

      const divs = kc.querySelectorAll("[id^='kpi-']");
      if (divs.length > 0) log(`⑥ <span class='ok'>OK</span> kpi-XXXX ブロックが ${divs.length} 個生成されました`);
      else log("⑥ <span class='ng'>NG</span> kpi-XXXX ブロックが生成されていません");

      const tables = kc.querySelectorAll("table.kpi-table");
      if (tables.length > 0) log(`⑦ <span class='ok'>OK</span> KPI テーブルが ${tables.length} 個生成されました`);
      else log("⑦ <span class='ng'>NG</span> KPI テーブルが生成されていません");

    }).catch(err => {
      log("★ <span class='ng'>NG</span> renderKpiPage() 実行中にエラー");
      log(err.toString());
    });

    // ------------------------------
    // year-index.json 再生成テスト（DEBUG のときだけ）
    // ------------------------------
    if (DEBUG) {
      document.getElementById("btn-generate").addEventListener("click", async () => {
        log("\n=== year-index.json 再生成テスト開始 ===");

        try {
          log("A. generateYearIndex() を実行します…");
          const newIndex = await generateYearIndex();
          log("B. 生成結果:");
          log(JSON.stringify(newIndex, null, 2));

          log("C. saveYearIndex() を実行します…");
          await saveYearIndex(newIndex);

          log("D. <span class='ok'>OK</span> 保存完了！");

        } catch (e) {
          log("★ <span class='ng'>NG</span> 保存処理でエラー:");
          log(e.toString());
        }
      });

      // ------------------------------
      // year-index.json 読み込みテスト
      // ------------------------------
      document.getElementById("btn-load").addEventListener("click", async () => {
        log("\n=== year-index.json 読み込みテスト ===");

        try {
          const data = await loadJSON("/data/year-index.json");
          log("読み込み成功:");
          log(JSON.stringify(data, null, 2));
        } catch (e) {
          log("★ <span class='ng'>NG</span> 読み込み失敗:");
          log(e.toString());
        }
      });
    }
  </script>

</body>
</html>
