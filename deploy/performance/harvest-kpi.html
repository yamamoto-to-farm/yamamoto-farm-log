<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>収穫KPI（月別 予定 × 実績） - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通 CSS -->
  <link rel="stylesheet" href="/common/style.css?v=1">

  <!-- KPI 専用 CSS（差分のみ） -->
  <link rel="stylesheet" href="/performance/kpi.css?v=1.3">

  <style>
    /* デバッグUI専用（本番UIとは無関係） */
    .debug-box {
      border: 2px solid #444;
      background: #fafafa;
      padding: 10px;
      margin-top: 20px;
      white-space: pre-wrap;
    }
    .ok { color: green; font-weight: bold; }
    .ng { color: red; font-weight: bold; }
    .debug-only { display:none; }
  </style>

  <script type="module" src="/common/ui.js?v=1"></script>
</head>

<body>

  <!-- 共通ヘッダー -->
  <script type="module">
    import { renderHeader } from "/common/header.js?v=1.1";
    renderHeader();
  </script>

  <!-- 認証後に表示 -->
  <div id="page-area" style="display:none;">

    <h1 class="page-title">収穫KPI（月別 予定 × 実績）</h1>

    <!-- デバッグボタン（DEBUG=1 のときだけ表示） -->
    <div id="debug-buttons" class="debug-only" style="margin-bottom:20px;">
      <button id="btn-generate">year-index.json を再生成（保存テスト）</button>
      <button id="btn-load">year-index.json を読み込み（確認）</button>
    </div>

    <!-- KPI 描画エリア（青枠削除済み） -->
    <div id="kpi-container"></div>

    <!-- デバッグログ -->
    <h2 id="debug-title" class="debug-only">デバッグログ</h2>
    <div id="debug-log" class="debug-box debug-only"></div>

  </div>

  <!-- 認証処理 & KPI 描画 -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderKpiPage } from "/performance/harvest-kpi.js?v=1.1";
    import { generateYearIndex, saveYearIndex } from "/performance/kpi-year-index.js?v=1.1";
    import { loadJSON } from "/common/json.js";

    // ------------------------------
    // 認証
    // ------------------------------
    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      document.getElementById("page-area").style.display = "block";
      initKpiPage();
    });

    // ------------------------------
    // KPI ページ初期化
    // ------------------------------
    async function initKpiPage() {
      const DEBUG = localStorage.getItem("debugKPI") === "1";

      if (DEBUG) {
        document.querySelectorAll(".debug-only").forEach(el => el.style.display = "block");
      }

      const log = (msg) => {
        if (!DEBUG) return;
        const box = document.getElementById("debug-log");
        box.innerHTML += msg + "\n";
        console.log(msg);
      };

      log("① <span class='ok'>OK</span> kpi-container が存在します");
      log("② renderKpiPage() を実行します…");

      try {
        await renderKpiPage();
        log("③ <span class='ok'>OK</span> renderKpiPage() 完了");

        const kc = document.getElementById("kpi-container");
        const html = kc.innerHTML.trim();

        if (html.length > 0) log("④ <span class='ok'>OK</span> HTML が挿入されました");
        else log("④ <span class='ng'>NG</span> HTML が空です");

        const details = kc.querySelector("details");
        if (details) log("⑤ <span class='ok'>OK</span> 年度ブロック生成");
        else log("⑤ <span class='ng'>NG</span> 年度ブロックなし");

        const tables = kc.querySelectorAll("table.kpi-table");
        if (tables.length > 0) log(`⑥ <span class='ok'>OK</span> KPI テーブル ${tables.length} 個`);
        else log("⑥ <span class='ng'>NG</span> KPI テーブルなし");

      } catch (err) {
        log("★ <span class='ng'>NG</span> renderKpiPage() エラー");
        log(err.toString());
      }

      // ------------------------------
      // year-index.json 再生成（DEBUG）
      // ------------------------------
      if (DEBUG) {
        document.getElementById("btn-generate").addEventListener("click", async () => {
          log("\n=== year-index.json 再生成テスト ===");
          try {
            const newIndex = await generateYearIndex();
            log("生成結果:");
            log(JSON.stringify(newIndex, null, 2));

            await saveYearIndex(newIndex);
            log("<span class='ok'>OK</span> 保存完了");
          } catch (e) {
            log("<span class='ng'>NG</span> 保存エラー:");
            log(e.toString());
          }
        });

        document.getElementById("btn-load").addEventListener("click", async () => {
          log("\n=== year-index.json 読み込みテスト ===");
          try {
            const data = await loadJSON("/data/year-index.json");
            log("読み込み成功:");
            log(JSON.stringify(data, null, 2));
          } catch (e) {
            log("<span class='ng'>NG</span> 読み込み失敗:");
            log(e.toString());
          }
        });
      }
    }
  </script>

</body>
</html>
