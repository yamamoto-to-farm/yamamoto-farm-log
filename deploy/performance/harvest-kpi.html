<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>収穫KPI（月別 予定 × 実績） - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通 CSS -->
  <link rel="stylesheet" href="/common/style.css?v=1">
  <link rel="stylesheet" href="/common/filter.css?v=1">
  <link rel="stylesheet" href="/performance/kpi.css?v=1.3">

  <style>
    .debug-box {
      border: 2px solid #444;
      background: #fafafa;
      padding: 10px;
      margin-top: 20px;
      white-space: pre-wrap;
    }
    .debug-only { display:none; }
  </style>

  <script type="module" src="/common/ui.js?v=1"></script>
</head>

<body>

  <div id="page-area" style="display:none;">

    <h1 class="page-title">収穫KPI（月別 予定 × 実績）</h1>

    <!-- ▼ フィルタカード -->
    <div class="card" id="filter-card" style="margin-bottom:16px;">
      <h2 class="section-title">フィルタ</h2>
      <div class="filter-open-btn" data-type="year">▶ 年</div>
      <div class="filter-open-btn" data-type="field">▶ 圃場</div>
      <div class="filter-open-btn" data-type="variety">▶ 品種</div>
    </div>

    <!-- ▼ 適用中フィルタ表示 -->
    <div id="activeFilters"></div>

    <!-- ▼ 再生成ボタン（常時表示） -->
    <div id="regen-buttons" style="margin-bottom:20px;">
      <button id="btn-generate">year-index.json を再生成</button>
      <button id="btn-load" class="debug-only">year-index.json を読み込み</button>
    </div>

    <!-- KPI 描画エリア -->
    <div id="kpi-container"></div>

    <!-- ▼ デバッグログ -->
    <h2 id="debug-title" class="debug-only">デバッグログ</h2>
    <div id="debug-log" class="debug-box debug-only"></div>

  </div>

  <!-- ▼ モーダル -->
  <div id="modal-container"></div>

  <!-- ▼ KPI フィルタ共通エンジン -->
  <script type="module" src="/performance/kpi-filter.js?v=1"></script>

  <!-- ▼ 認証処理 & KPI 描画 -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { renderKpiPage } from "/performance/harvest-kpi.js?v=1.1";
    import { generateYearIndex, saveYearIndex } from "/performance/kpi-year-index.js?v=1.1";
    import { loadJSON } from "/common/json.js";
    import {
      setKpiFilterData,
      openKpiYearModal,
      openKpiFieldModal,
      openKpiVarietyModal
    } from "/performance/kpi-filter.js?v=1";

    const DEBUG_FILTER = true;

    window.addEventListener("DOMContentLoaded", async () => {

      /* ===============================
         ▼ 認証 → ヘッダー → ページ表示
      =============================== */
      const ok = await verifyLocalAuth();
      if (!ok) return;

      renderHeader();
      document.getElementById("page-area").style.display = "block";

      /* ===============================
         ▼ 再生成ボタン
      =============================== */
      document.getElementById("btn-generate").addEventListener("click", async () => {
        const box = document.getElementById("debug-log");
        document.querySelectorAll(".debug-only").forEach(el => el.style.display = "block");

        box.innerHTML += "\n=== year-index.json 再生成開始 ===\n";

        try {
          const newIndex = await generateYearIndex();
          await saveYearIndex(newIndex);

          box.innerHTML += "✔ 再生成完了\n";
          box.innerHTML += JSON.stringify(newIndex, null, 2) + "\n";
        } catch (err) {
          box.innerHTML += "✘ エラー発生\n" + err.toString() + "\n";
        }
      });

      /* ===============================
         ▼ 読み込みボタン（デバッグ専用）
      =============================== */
      document.getElementById("btn-load").addEventListener("click", async () => {
        const box = document.getElementById("debug-log");
        document.querySelectorAll(".debug-only").forEach(el => el.style.display = "block");

        box.innerHTML += "\n=== year-index.json 読み込み ===\n";

        try {
          const data = await loadJSON("/data/year-index.json");
          box.innerHTML += JSON.stringify(data, null, 2) + "\n";
        } catch (err) {
          box.innerHTML += "✘ 読み込みエラー\n" + err.toString() + "\n";
        }
      });

      /* ===============================
         ▼ year-index.json 読み込み
      =============================== */
      const yearIndex = await loadJSON("/data/year-index.json");

      const years = Object.keys(yearIndex)
        .filter(y => y !== "lastSummaryIndexHash")
        .map(Number)
        .sort();

      /* ===============================
         ▼ 圃場フィルタ（name / area に統一）
      =============================== */
      const areaMap = {};
      const areaOrder = [];

      years.forEach(y => {
        (yearIndex[y] || []).forEach(ref => {
          const area = ref.area;
          const name = ref.name;   // ← 修正ポイント

          if (!areaMap[area]) {
            areaMap[area] = [];
            areaOrder.push(area);
          }
          if (!areaMap[area].includes(name)) {
            areaMap[area].push(name);
          }
        });
      });

      /* ===============================
         ▼ 品種フィルタ
      =============================== */
      const typeMap = {};
      const typeOrder = [];

      years.forEach(y => {
        (yearIndex[y] || []).forEach(ref => {
          const type = ref.varietyType;
          const variety = ref.variety;

          if (!typeMap[type]) {
            typeMap[type] = [];
            typeOrder.push(type);
          }
          if (!typeMap[type].includes(variety)) {
            typeMap[type].push(variety);
          }
        });
      });

      /* ===============================
         ▼ デバッグ出力（name / area に統一）
      =============================== */
      if (DEBUG_FILTER) {
        const box = document.getElementById("debug-log");
        document.querySelectorAll(".debug-only").forEach(el => el.style.display = "block");

        box.innerHTML += "[KPI-FILTER] yearIndex 読み込み完了\n";
        box.innerHTML += "[KPI-FILTER] years: " + JSON.stringify(years) + "\n";
        box.innerHTML += "[KPI-FILTER] areaOrder: " + JSON.stringify(areaOrder) + "\n";
        box.innerHTML += "[KPI-FILTER] areaMap: " + JSON.stringify(areaMap, null, 2) + "\n";
        box.innerHTML += "[KPI-FILTER] typeOrder: " + JSON.stringify(typeOrder) + "\n";
        box.innerHTML += "[KPI-FILTER] typeMap: " + JSON.stringify(typeMap, null, 2) + "\n";
      }

      console.log("[KPI-FILTER] areaOrder:", areaOrder);
      console.log("[KPI-FILTER] areaMap:", areaMap);
      console.log("[KPI-FILTER] typeOrder:", typeOrder);
      console.log("[KPI-FILTER] typeMap:", typeMap);

      /* ===============================
         ▼ kpi-filter.js に渡す
      =============================== */
      setKpiFilterData({
        years,
        fields: { parents: areaOrder, children: areaMap },
        varieties: { parents: typeOrder, children: typeMap }
      });

      initFilterButtons();
      initKpiPage();
    });

    function initFilterButtons() {
      document.querySelectorAll(".filter-open-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const type = btn.dataset.type;
          if (type === "year") openKpiYearModal();
          if (type === "field") openKpiFieldModal();
          if (type === "variety") openKpiVarietyModal();
        });
      });
    }

    async function initKpiPage() {
      const DEBUG = localStorage.getItem("debugKPI") === "1";

      if (DEBUG) {
        document.querySelectorAll(".debug-only").forEach(el => el.style.display = "block");
      }

      const log = (msg) => {
        if (!DEBUG) return;
        const box = document.getElementById("debug-log");
        box.innerHTML += msg + "\n";
      };

      log("① OK kpi-container が存在します");
      log("② renderKpiPage() を実行します…");

      try {
        await renderKpiPage();
        log("③ OK renderKpiPage() 完了");
      } catch (err) {
        log("★ NG renderKpiPage() エラー\n" + err.toString());
      }
    }
  </script>

</body>
</html>
