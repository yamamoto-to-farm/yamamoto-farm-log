<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>収穫KPI（月別 予定 × 実績） - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通 CSS -->
  <link rel="stylesheet" href="/common/style.css?v=1">
  <link rel="stylesheet" href="/common/filter.css?v=1">
  <link rel="stylesheet" href="/performance/kpi.css?v=1.3">

  <style>
    .debug-box {
      border: 2px solid #444;
      background: #fafafa;
      padding: 10px;
      margin-top: 20px;
      white-space: pre-wrap;
    }
    .debug-only { display:none; }
    #activeFilters { margin-bottom: 12px; font-size: 14px; color: #333; }
    #activeFilters .chip { display:inline-block; padding:6px 10px; background:#eef; border-radius:16px; margin-right:6px; }
  </style>

  <script type="module" src="/common/ui.js?v=1"></script>
</head>

<body>

  <div id="page-area" style="display:none;">

    <h1 class="page-title">収穫KPI（月別 予定 × 実績）</h1>

    <!-- ▼ フィルタカード -->
    <div class="card" id="filter-card" style="margin-bottom:16px;">
      <h2 class="section-title">フィルタ</h2>
      <div class="filter-open-btn" data-type="year">▶ 年</div>
      <div class="filter-open-btn" data-type="variety">▶ 品種</div>
    </div>

    <!-- ▼ 適用中フィルタ表示 -->
    <div id="activeFilters"></div>

    <!-- KPI 描画エリア -->
    <div id="kpi-container"></div>

    <!-- ▼ デバッグログ -->
    <h2 id="debug-title" class="debug-only">デバッグログ</h2>
    <div id="debug-log" class="debug-box debug-only"></div>

  </div>

  <!-- ▼ モーダル -->
  <div id="modal-container"></div>

  <!-- ▼ KPI フィルタ共通エンジン -->
  <script type="module" src="/performance/kpi-filter.js?v=1"></script>

  <!-- ▼ 認証処理 & KPI 描画 -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { renderKpiPage } from "/performance/harvest-kpi.js?v=1.3";
    import { loadJSON } from "/common/json.js";
    import { loadCSV, normalizeKeys } from "/common/csv.js";
    import {
      setKpiFilterData,
      openKpiYearModal,
      openKpiVarietyModal
    } from "/performance/kpi-filter.js?v=1";

    const DEBUG_FILTER = false;

    window.addEventListener("DOMContentLoaded", async () => {

      /* ===============================
         ▼ 認証 → ヘッダー → ページ表示
      =============================== */
      const ok = await verifyLocalAuth();
      if (!ok) return;

      renderHeader();
      document.getElementById("page-area").style.display = "block";

      /* ===============================
         ▼ planting/all.csv, weight/all.csv & varieties.json から
            フィルタ用データを構築（年は shippingDate ベース）
      =============================== */
      const plantingRows = normalizeKeys(
        await loadCSV("/logs/planting/all.csv")
      );
      const weightRows = normalizeKeys(
        await loadCSV("/logs/weight/all.csv")
      );
      const varietiesData = await loadJSON("/data/varieties.json");

      // 年一覧（weightRows の shippingDate の year を基準にする）
      const years = [...new Set(
        weightRows
          .map(r => r.shippingDate)
          .filter(Boolean)
          .map(d => new Date(d).getFullYear())
      )].sort();

      // 品種タイプマップ（varietyType → varieties）
      const varietyTypeMap = {};
      const typeOrder = [];

      const varietyTypeLookup = Object.fromEntries(
        varietiesData.map(v => [v.name, v.type])
      );

      plantingRows.forEach(r => {
        const variety = r.variety;
        if (!variety) return;

        const type = varietyTypeLookup[variety] || "その他";

        if (!varietyTypeMap[type]) {
          varietyTypeMap[type] = [];
          typeOrder.push(type);
        }
        if (!varietyTypeMap[type].includes(variety)) {
          varietyTypeMap[type].push(variety);
        }
      });

      /* ===============================
         ▼ デバッグ出力
      =============================== */
      if (DEBUG_FILTER) {
        const box = document.getElementById("debug-log");
        document.querySelectorAll(".debug-only").forEach(el => el.style.display = "block");

        box.innerHTML += "[KPI-FILTER] plantingRows 読み込み完了\n";
        box.innerHTML += "[KPI-FILTER] weightRows 読み込み完了\n";
        box.innerHTML += "[KPI-FILTER] years (shippingDate): " + JSON.stringify(years) + "\n";
        box.innerHTML += "[KPI-FILTER] typeOrder: " + JSON.stringify(typeOrder) + "\n";
        box.innerHTML += "[KPI-FILTER] typeMap: " + JSON.stringify(varietyTypeMap, null, 2) + "\n";
      }

      /* ===============================
         ▼ kpi-filter.js に渡す（年は shippingDate ベース）
      =============================== */
      setKpiFilterData({
        years,
        varieties: { parents: typeOrder, children: varietyTypeMap }
      });

      initFilterButtons();
      initKpiPage();
    });

    function initFilterButtons() {
      document.querySelectorAll(".filter-open-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const type = btn.dataset.type;
          if (type === "year") openKpiYearModal();
          if (type === "variety") openKpiVarietyModal();
        });
      });
    }

    function setActiveFiltersUI(filters) {
      const container = document.getElementById("activeFilters");
      if (!filters || (Array.isArray(filters.years) && filters.years.length === 0 && (!filters.varieties || filters.varieties.length === 0))) {
        container.innerHTML = "";
        return;
      }
      const parts = [];
      if (Array.isArray(filters.years) && filters.years.length > 0) {
        parts.push(`<span class="chip">年: ${filters.years.join(", ")}</span>`);
      }
      if (Array.isArray(filters.varieties) && filters.varieties.length > 0) {
        parts.push(`<span class="chip">品種: ${filters.varieties.join(", ")}</span>`);
      }
      container.innerHTML = parts.join(" ");
    }

    async function initKpiPage() {
      const DEBUG = localStorage.getItem("debugKPI") === "1";

      if (DEBUG) {
        document.querySelectorAll(".debug-only").forEach(el => el.style.display = "block");
      }

      const log = (msg) => {
        if (!DEBUG) return;
        const box = document.getElementById("debug-log");
        box.innerHTML += msg + "\n";
      };

      log("① OK kpi-container が存在します");
      log("② renderKpiPage() を実行します（デフォルト: 今年のみ）…");

      // デフォルト年フィルタを今年に設定（renderKpiPage 側でも保険あり）
      const currentYear = new Date().getFullYear();
      // ここは UI 側での初期表示。実際の有効年は renderKpiPage が weightRows を見て決める。
      const defaultFilters = { years: [String(currentYear)] };
      setActiveFiltersUI(defaultFilters);

      try {
        await renderKpiPage(defaultFilters);
        log("③ OK renderKpiPage() 完了");
      } catch (err) {
        log("★ NG renderKpiPage() エラー\n" + err.toString());
      }
    }

    // kpi-filter.js がフィルタ適用時にカスタムイベントを投げる想定
    // activeFilters UI を更新して renderKpiPage を呼ぶ
    window.addEventListener("kpi-filter:apply", (e) => {
      const detail = e.detail || {};
      // detail.years / detail.varieties を期待
      setActiveFiltersUI(detail);
      // renderKpiPage は harvest-kpi.js 側でキャッシュ制御を行う
      renderKpiPage(detail);
    });
  </script>

</body>
</html>
