<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>フィルタ単体テスト - annual-list</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通CSS -->
  <link rel="stylesheet" href="/common/style.css">
  <link rel="stylesheet" href="/common/filter/filter.css">

  <style>
    body {
      padding: 20px;
    }
    h1 {
      margin-bottom: 20px;
    }
    .test-section {
      margin-bottom: 30px;
      padding: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h1>フィルタ単体テスト（annual-list）</h1>

  <!-- ▼ 年フィルタ -->
  <div class="test-section">
    <h2>年フィルタ</h2>
    <div id="yearFilter"></div>
  </div>

  <!-- ▼ 圃場フィルタ -->
  <div class="test-section">
    <h2>圃場フィルタ</h2>
    <button id="openField" class="primary-btn">圃場フィルタを開く</button>
  </div>

  <!-- ▼ 品種フィルタ -->
  <div class="test-section">
    <h2>品種フィルタ</h2>
    <button id="openVariety" class="primary-btn">品種フィルタを開く</button>
  </div>

  <!-- ▼ 現在のフィルタ状態 -->
  <div class="test-section">
    <h2>現在のフィルタ状態</h2>
    <pre id="filterStateBox" style="background:#f7f7f7; padding:12px; border-radius:6px;"></pre>
  </div>

  <!-- ▼ モーダル -->
  <div id="modal-container"></div>

  <!-- JS -->
  <script type="module" src="./annual-list.js"></script>

</body>
</html>
