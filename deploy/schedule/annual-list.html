<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>年間作付計画一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通 CSS -->
  <link rel="stylesheet" href="/common/style.css?v=1">

  <!-- 年間作付計画一覧専用 CSS -->
  <link rel="stylesheet" href="./annual-list.css?v=1">
</head>

<body>

  <!-- ▼ ログイン後に表示される領域 -->
  <div id="page-area" style="display:none;">

    <h1 class="page-title">年間作付計画一覧</h1>

    <!-- 年度一覧（編集リンク） -->
    <div id="table-area"></div>

    <!-- annual.json 読み込みボタン（admin のみ表示） -->
    <div id="loadArea">
      <button id="loadAnnual" class="primary-btn">annual.json を読み込む</button>
    </div>

    <!-- annual.json 表示エリア（印刷用） -->
    <div id="printArea"></div>

  </div>

  <!-- モーダル（必要なら使用） -->
  <div id="modal-container"></div>

  <!-- メイン JS -->
  <script type="module" src="./annual-list.js"></script>

  <!-- ▼ ログインチェック & ヘッダー & 権限処理 -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      renderHeader();

      /* ---------------------------------------------------------
         ★ 権限チェック
         admin → 編集OK
         family → 閲覧OK（読み込みボタンは非表示）
         worker → アクセス禁止
      --------------------------------------------------------- */
      if (window.currentRole === "worker") {
        alert("このページは家族または管理者のみ閲覧できます");
        location.href = "/";
        return;
      }

      if (window.currentRole === "family") {
        // 読み込みボタンを非表示（閲覧のみ）
        const loadArea = document.getElementById("loadArea");
        if (loadArea) loadArea.style.display = "none";
      }

      // admin はそのまま表示
      document.getElementById("page-area").style.display = "block";
    });
  </script>

</body>
</html>
