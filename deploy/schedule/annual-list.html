<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>年間作付計画一覧</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/common/style.css">
  <link rel="stylesheet" href="/common/filter/filter.css">
  <link rel="stylesheet" href="./annual-list.css">
</head>

<body>

  <header>
    <h1>年間作付計画一覧</h1>
  </header>

  <!-- アクティブフィルタ表示 -->
  <div id="activeFilters"></div>

  <!-- フィルタボタン -->
  <div id="filterButtons">
    <button class="primary-btn" data-type="year">年フィルタ</button>
    <button class="primary-btn" data-type="field">圃場フィルタ</button>
    <button class="primary-btn" data-type="variety">品種フィルタ</button>
  </div>

  <!-- 件数表示 -->
  <div id="countArea"></div>

  <!-- 一覧テーブル -->
  <div id="table-area"></div>

  <!-- ★ フィルタモーダル描画先（filter-ui.js が使用） -->
  <div id="modal-root"></div>

  <!-- フィルタのアクティブタグ -->
  <script type="module" src="/common/filter/filter-active.js"></script>

  <!-- 年間一覧ロジック -->
  <script type="module" src="./annual-list.js"></script>

</body>
</html>
