<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>播種・定植一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通 CSS -->
  <link rel="stylesheet" href="/common/style.css?v=1">

  <!-- フィルタ UI 共通 CSS -->
  <link rel="stylesheet" href="/common/filter.css?v=1">

  <!-- 一覧ページ専用 CSS（定植・播種共通の印刷設定など） -->
  <link rel="stylesheet" href="/list/plantingList.css?v=1">

  <!-- 播種一覧専用 CSS（列幅など） -->
  <link rel="stylesheet" href="/list/seedList.css?v=1">

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

  <div id="page-area" style="display:none;">

    <h1 class="page-title">播種・定植一覧</h1>

    <!-- モード切り替えカード（印刷時非表示） -->
    <div class="card" id="mode-switch-card" style="margin-bottom: 16px;">
      <button id="btn-planting" class="primary-btn" data-mode="planting">定植ベース</button>
      <button id="btn-seed" class="secondary-btn" data-mode="seed">播種ベース</button>
    </div>

    <!-- 適用中フィルタ表示 -->
    <div id="activeFilters"></div>

    <!-- フィルタカード -->
    <div class="card" id="filter-card">
      <h2 class="section-title">フィルタ</h2>
      <div class="filter-open-btn" data-type="year">▶ 年月</div>
      <div class="filter-open-btn" data-type="field">▶ 圃場</div>
      <div class="filter-open-btn" data-type="variety">▶ 品種</div>
    </div>

    <!-- 件数・サマリー -->
    <div class="card">
      <div id="countArea">0 件</div>
      <div id="summaryArea" style="margin-top:10px;"></div>
    </div>

    <!-- テーブル描画領域 -->
    <div id="table-area"></div>

  </div>

  <!-- モーダル -->
  <div id="modal-container"></div>

  <!-- 一覧ページのメイン JS -->
  <script type="module" src="./list.js"></script>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { initListPage } from "./list.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      renderHeader();
      document.getElementById("page-area").style.display = "block";

      initListPage();
    });
  </script>

</body>
</html>
