<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>年間作付計画一覧 - 山本農園</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="/common/css/main.css?v=2">

    <style>
        /* annual-list ページでは family も操作できるようにする */
        body.readonly-mode #page-area * {
            pointer-events: auto !important;
            opacity: 1 !important;
        }
    </style>
</head>

<body>

    <div id="page-area" style="display:none;">

        <!-- 印刷専用タイトル（通常は非表示） -->
        <h1 id="print-title"></h1>

        <h1 class="page-title">年間作付計画一覧</h1>

        <div id="loadArea" style="margin-bottom: 16px;">
            <button id="loadAnnual" class="primary-btn">年度を選択</button>
            <button id="createYearBtn" class="secondary-btn" style="margin-left: 12px;">
                新しい年度を作成
            </button>
        </div>

        <select id="yearSelector" style="display:none;"></select>

        <div id="table-area"></div>

        <div id="printArea"></div>

    </div>

    <div id="modal-container"></div>

    <!-- annual-list.js は defer のみ -->
    <script type="module" src="./annual-list.js?v=5" defer></script>

    <script type="module">
        import { verifyLocalAuth } from "/common/ui.js";
        import { renderHeader } from "/common/header.js";

        window.addEventListener("DOMContentLoaded", async () => {
            const ok = await verifyLocalAuth();
            if (!ok) return;

            renderHeader();

            if (window.currentRole === "worker") {
                alert("このページは家族または管理者のみ閲覧できます");
                location.href = "/";
                return;
            }

            document.getElementById("page-area").style.display = "block";
        });
    </script>

    <!-- 年度追加ボタンの動作 -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const btn = document.getElementById("createYearBtn");

            btn.addEventListener("click", () => {
                const y = prompt("作成する年度を入力してください（例：2027）");

                if (!y) return;
                if (!/^\d{4}$/.test(y)) {
                    alert("年度は4桁の数字で入力してください");
                    return;
                }

                // 編集ページへ遷移（保存すれば年度が生まれる）
                window.location.href = `/schedule/annual/index.html?year=${y}`;
            });
        });
    </script>

</body>

</html>
