<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>播種・定植計画 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/common/css/main.css?v=1">
</head>

<body>

  <div id="page-area" style="display:none;">

    <h1 class="page-title">播種・定植計画</h1>

    <section class="card plan-control-hub">
      <h2 class="section-title plan-control-title">播種・定植計画</h2>

      <div class="plan-action-row plan-mode-row" id="mode-switch-card" role="group" aria-label="計画モード切替">
        <button id="btn-seed" class="primary-btn" data-mode="seed">播種計画</button>
        <button id="btn-planting" class="secondary-btn" data-mode="planting">定植計画</button>
      </div>

      <div class="plan-action-row plan-year-row" id="planning-year-card" role="group" aria-label="年度選択">
        <button id="selectYearBtn" class="primary-btn">年度を選択</button>
        <span id="selectedYearLabel" class="selected-year-label"></span>
      </div>

      <div class="plan-io-grid">
        <div class="plan-io-card plan-action-card" id="seedList-controls">
          <h3 class="section-title">播種計画データ</h3>
          <div class="plan-action-row" role="group" aria-label="播種計画データ操作">
            <button id="loadJsonBtn" class="secondary-btn">JSON 読み込み（初期化）</button>
            <button id="loadCsvBtn" class="secondary-btn">CSV 読み込み（復元）</button>
            <button id="saveCsvBtn" class="primary-btn">CSV 保存</button>
          </div>
        </div>

        <div class="plan-io-card plan-action-card" id="planting-controls" style="display:none;">
          <h3 class="section-title">定植計画データ</h3>
          <div class="plan-action-row" role="group" aria-label="定植計画データ操作">
            <button id="loadPlantingCsvBtn" class="secondary-btn">定植計画CSV 読み込み（復元）</button>
            <button id="savePlantingCsvBtn" class="primary-btn">定植計画CSV 保存</button>
          </div>
        </div>
      </div>
    </section>

    <div id="activeFilters" class="plan-active-filters"></div>

    <div class="card" id="capacity-card">
      <label>育苗ハウス容量（トレイ枚数）</label>
      <input type="number" id="nurseryCapacity" value="3312" style="width:120px;">
    </div>

    <div class="card" id="summary-card">
      <div id="summaryArea"></div>
    </div>

    <div id="table-area"></div>

    <div style="margin-top: 16px;">
      <button id="addRowBtn" class="primary-btn">＋ 行を追加</button>
    </div>

  </div>

  <div id="modal-container"></div>

  <div id="save-modal-container"></div>
  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("save-modal-container").innerHTML = html;
      });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { initListPage, initAnnualLinkage } from "./plan.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      renderHeader();
      const pageArea = document.getElementById("page-area");
      if (pageArea) pageArea.style.display = "block";

      initAnnualLinkage();

      await initListPage();
    });
  </script>

</body>

</html>
