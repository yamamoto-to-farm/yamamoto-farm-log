<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>播種・定植計画 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/common/style.css?v=1">
  <link rel="stylesheet" href="/schedule/plantingList.css?v=1">
  <link rel="stylesheet" href="/schedule/seed/seedList.css?v=1">

  <style>
    /* ===============================
       播種／定植切替ボタン
    ================================ */
    #mode-switch-card {
      display: flex;
      gap: 8px;
      padding: 12px 0;
    }

    #mode-switch-card button {
      flex: 0 0 auto;
      height: 40px;
      padding: 8px 12px;
      font-size: 15px;
      white-space: nowrap;
      box-sizing: border-box;
    }

    /* ===============================
       CSV / JSON / 保存ボタン（seed モード専用）
    ================================ */
    #seedList-controls {
      display: flex;
      gap: 8px;
      padding: 12px 0;
    }

    #seedList-controls button {
      flex: 0 0 auto;
      height: 40px;
      padding: 8px 10px;
      font-size: 15px;
      white-space: nowrap;
      max-width: 180px;
      box-sizing: border-box;
    }
  </style>

</head>

<body>

  <div id="page-area" style="display:none;">

    <h1 class="page-title">播種・定植計画</h1>

    <!-- 年度選択 -->
    <div class="card" style="margin-bottom:16px;">
      <button id="selectYearBtn" class="primary-btn">年度を選択</button>
      <span id="selectedYearLabel" style="margin-left:12px; font-weight:bold;"></span>
    </div>

    <!-- モード切り替え -->
    <div class="card" id="mode-switch-card" style="margin-bottom: 16px;">
      <button id="btn-seed" class="primary-btn" data-mode="seed">播種計画</button>
      <button id="btn-planting" class="secondary-btn" data-mode="planting">定植計画</button>
    </div>

    <!-- ▼ CSV / JSON 読み込み・保存（seed モードのみ表示） -->
    <div class="card" id="seedList-controls" style="margin-bottom:16px;">
      <button id="loadJsonBtn" class="secondary-btn">JSON 読み込み（初期化）</button>
      <button id="loadCsvBtn" class="secondary-btn">CSV 読み込み（復元）</button>
      <button id="saveCsvBtn" class="primary-btn">CSV 保存</button>
    </div>

    <!-- ▼ 定植計画専用フィルタ -->
    <div class="card" id="filter-card">
      <h2 class="section-title">フィルタ</h2>
      <div class="filter-open-btn" data-type="year">▶ 年</div>
      <div class="filter-open-btn" data-type="variety">▶ 品種</div>
    </div>

    <div id="activeFilters"></div>

    <!-- ▼ 播種計画専用：育苗容量 -->
    <div class="card" id="capacity-card">
      <label>育苗ハウス容量（トレイ枚数）</label>
      <input type="number" id="nurseryCapacity" value="3312" style="width:120px;">
    </div>

    <!-- ▼ 播種計画専用：容量サマリー -->
    <div class="card" id="summary-card">
      <div id="summaryArea"></div>
    </div>

    <div id="table-area"></div>

    <div style="margin-top: 16px;">
      <button id="addRowBtn" class="primary-btn">＋ 行を追加</button>
    </div>

  </div>

  <div id="modal-container"></div>

  <div id="saveModal" class="save-modal" style="display:none;">
    <div class="save-modal-content">
      <span id="saveModalMessage">保存しています…</span>
      <button id="saveModalCloseBtn" style="display:none;">OK</button>
    </div>
  </div>

  <!-- ★★★ ここに PapaParse を追加（重要） ★★★ -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- seedList ロジック -->
  <script type="module" src="./plan.js"></script>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { initListPage, initAnnualLinkage } from "./plan.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      renderHeader();
      document.getElementById("page-area").style.display = "block";

      initAnnualLinkage();

      // ★★★ 最重要：initListPage() を await する ★★★
      await initListPage();
    });
  </script>

</body>

</html>
