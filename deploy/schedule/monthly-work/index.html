<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>月別作業一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <style>
    body {
      background: linear-gradient(180deg, #f7f7f2 0%, #ffffff 28%);
    }

    .page-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 16px 28px;
    }

    .intro-card,
    .link-card,
    .month-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .intro-card {
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .intro-card h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .intro-card p {
      margin: 0;
      color: #4b5563;
      line-height: 1.7;
    }

    .month-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .shortcut-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .shortcut-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #1f2937;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .shortcut-pill:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
      border-color: #94a3b8;
    }

    .month-list {
      display: grid;
      gap: 14px;
    }

    .month-card {
      padding: 16px;
    }

    .month-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .month-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin: 0;
      font-size: 22px;
    }

    .month-total {
      color: #6b7280;
      font-size: 13px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .summary-chip {
      border-radius: 14px;
      padding: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    .summary-chip .label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .summary-chip .value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .month-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .calendar-wrap {
      margin-top: 14px;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .calendar-weekdays {
      margin-bottom: 8px;
    }

    .weekday {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .calendar-cell {
      min-height: 62px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      padding: 8px 8px 7px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .calendar-cell.has-work:hover {
      border-color: #94a3b8;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
      transform: translateY(-1px);
    }

    .calendar-cell.is-empty {
      background: #f8fafc;
      border-style: dashed;
      opacity: 0.45;
    }

    .day-number {
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }

    .day-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      min-height: 12px;
    }

    .day-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .tone-seed { background: #dcfce7; border-color: #86efac; color: #166534; }
    .tone-nursery { background: #e0f2fe; border-color: #7dd3fc; color: #075985; }
    .tone-tillage { background: #e0e7ff; border-color: #a5b4fc; color: #3730a3; }
    .tone-weeding { background: #f3e8ff; border-color: #d8b4fe; color: #6b21a8; }
    .tone-maintenance { background: #f1f5f9; border-color: #cbd5e1; color: #334155; }
    .tone-pesticide { background: #fee2e2; border-color: #fca5a5; color: #b91c1c; }
    .tone-fertilizer { background: #ffedd5; border-color: #fdba74; color: #c2410c; }
    .tone-watering { background: #cffafe; border-color: #67e8f9; color: #0e7490; }
    .tone-hand-weeding { background: #fce7f3; border-color: #f9a8d4; color: #be185d; }
    .tone-intertill { background: #ccfbf1; border-color: #5eead4; color: #0f766e; }
    .tone-bedmaking { background: #fef9c3; border-color: #fde047; color: #a16207; }
    .tone-planting { background: #dbeafe; border-color: #93c5fd; color: #1d4ed8; }
    .tone-harvest { background: #fef3c7; border-color: #fbbf24; color: #b45309; }
    .tone-shipping { background: #ffe4e6; border-color: #fda4af; color: #be123c; }
    .tone-discard { background: #ede9fe; border-color: #c4b5fd; color: #6d28d9; }

    .day-dot.tone-seed { background: #16a34a; }
    .day-dot.tone-nursery { background: #0284c7; }
    .day-dot.tone-tillage { background: #4f46e5; }
    .day-dot.tone-weeding { background: #9333ea; }
    .day-dot.tone-maintenance { background: #475569; }
    .day-dot.tone-pesticide { background: #ef4444; }
    .day-dot.tone-fertilizer { background: #f97316; }
    .day-dot.tone-watering { background: #06b6d4; }
    .day-dot.tone-hand-weeding { background: #ec4899; }
    .day-dot.tone-intertill { background: #14b8a6; }
    .day-dot.tone-bedmaking { background: #eab308; }
    .day-dot.tone-planting { background: #3b82f6; }
    .day-dot.tone-harvest { background: #f59e0b; }
    .day-dot.tone-shipping { background: #f43f5e; }
    .day-dot.tone-discard { background: #8b5cf6; }

    .empty-state {
      padding: 20px;
      color: #6b7280;
      text-align: center;
    }

    summary {
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    @media (max-width: 640px) {
      .page-wrap { padding: 10px 12px 20px; }
      .intro-card h1 { font-size: 24px; }
      .month-title { font-size: 19px; }
    }
  </style>
</head>
<body>
  <div id="page-area" style="display:none;">
    <div class="page-wrap">
      <div class="intro-card">
        <h1>月別作業一覧</h1>
        <p>月ごとの作業量を俯瞰しながら、必要な一覧へすぐ移動できます。播種・育苗から耕起、防除、施肥、定植、収穫・出荷まで、すべての作業ログを1画面で確認する入口です。</p>
      </div>

      <div class="shortcut-row" aria-label="すぐ開く一覧">
        <a class="shortcut-pill" href="/diary/index.html">作業日誌</a>
        <a class="shortcut-pill" href="/list/list.html">播種・定植一覧</a>
        <a class="shortcut-pill" href="/fertilizer/list/list.html">施肥記録一覧</a>
        <a class="shortcut-pill" href="/pesticide/list/list.html">防除記録一覧</a>
        <a class="shortcut-pill" href="/performance/harvest-kpi.html">収穫KPI</a>
        <a class="shortcut-pill" href="/shipping/index.html">出荷ログ</a>
      </div>

      <div id="month-list" class="month-list"></div>
    </div>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
