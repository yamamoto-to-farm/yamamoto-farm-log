<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>月別作業一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <style>
    body {
      background: linear-gradient(180deg, #f7f7f2 0%, #ffffff 28%);
    }

    .page-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 16px 28px;
    }

    .intro-card,
    .link-card,
    .month-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .intro-card {
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .intro-card h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .intro-card p {
      margin: 0;
      color: #4b5563;
      line-height: 1.7;
    }

    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .link-card {
      padding: 14px;
      margin-bottom: 18px;
    }

    .link-card h2,
    .month-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .month-list {
      display: grid;
      gap: 14px;
    }

    .month-card {
      padding: 16px;
    }

    .month-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .month-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin: 0;
      font-size: 22px;
    }

    .month-total {
      color: #6b7280;
      font-size: 13px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .summary-chip {
      border-radius: 14px;
      padding: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    .summary-chip .label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .summary-chip .value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .month-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .pill-seed { background: #ecfdf5; border-color: #bbf7d0; color: #166534; }
    .pill-planting { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
    .pill-harvest { background: #fff7ed; border-color: #fed7aa; color: #c2410c; }
    .pill-shipping { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
    .pill-discard { background: #f5f3ff; border-color: #ddd6fe; color: #6d28d9; }

    .empty-state {
      padding: 20px;
      color: #6b7280;
      text-align: center;
    }

    summary {
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    @media (max-width: 640px) {
      .page-wrap { padding: 10px 12px 20px; }
      .intro-card h1 { font-size: 24px; }
      .month-title { font-size: 19px; }
    }
  </style>
</head>
<body>
  <div id="page-area" style="display:none;">
    <div class="page-wrap">
      <div class="intro-card">
        <h1>月別作業一覧</h1>
        <p>月ごとの作業量を俯瞰しながら、必要な一覧へすぐ移動できます。播種・定植、施肥、防除、収穫、出荷の流れを1画面で確認するための入口です。</p>
      </div>

      <div class="link-card">
        <h2>すぐ開く一覧</h2>
        <div class="link-row">
          <a class="secondary-btn" href="/diary/index.html">作業日誌</a>
          <a class="secondary-btn" href="/list/list.html">播種・定植一覧</a>
          <a class="secondary-btn" href="/fertilizer/list/list.html">施肥記録一覧</a>
          <a class="secondary-btn" href="/pesticide/list/list.html">防除記録一覧</a>
          <a class="secondary-btn" href="/performance/harvest-kpi.html">収穫KPI</a>
          <a class="secondary-btn" href="/shipping/index.html">出荷ログ</a>
        </div>
      </div>

      <div id="month-list" class="month-list"></div>
    </div>
  </div>

  <script type="module" src="./index.js"></script>
</body>
</html>
