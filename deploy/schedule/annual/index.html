<!DOCTYPE html>
<html lang="ja">
<head>

  <link rel="stylesheet" href="/common/style.css">

</head>

<body>

  <header>
    <h1 id="pageTitle">年間作付計画</h1>
  </header>

  <div id="activeFilters"></div>

  <!-- ▼ テーブル -->
  <div id="table-area"></div>

  <!-- ▼ モーダル -->
  <div id="modal-container"></div>

  <script type="module" src="/common/filter/filter-active.js"></script>

</html>
