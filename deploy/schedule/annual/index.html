<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>年間作付計画 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通 CSS -->
  <link rel="stylesheet" href="/common/css/main.css?v=2">

  <!-- フィルタ UI 共通 CSS（品種選択モーダル用） -->

  <!-- 年間作付計画専用 CSS -->
</head>

<body>

  <!-- ページ全体（ログイン後に表示） -->
  <div id="page-area" style="display:none;">

    <h1 class="page-title" id="pageTitle">年間作付計画</h1>

    <!-- STEP1 -->
    <section id="step1">
      <h2>STEP1：年間収穫計画</h2>

      <!-- 年間サマリー（JSで挿入） -->
      <div id="step1-summary"></div>

      <table>
        <thead>
          <tr>
            <th>収穫月</th>
            <th>目標基数</th>
            <th>基/反</th>
            <th>目標反収</th>
            <th>必要面積(反)</th>
          </tr>
        </thead>
        <tbody id="step1Body"></tbody>
      </table>

      <div class="step-footer">
        <button id="recalcStep1" class="primary-btn">再計算</button>
        <button id="saveStep1" class="secondary-btn">保存</button>
      </div>
    </section>

    <!-- STEP2 -->
    <section id="step2">
      <h2>STEP2：月別収穫計画</h2>

      <!-- 月選択セレクタ（JSで挿入） -->
      <!-- サマリー（JSで挿入） -->

      <table>
        <thead>
          <tr>
            <th>収穫週</th>
            <th>品種</th>
            <th>目標基数</th>
            <th>基/反</th>
            <th>必要面積(反)</th>
            <th>播種日</th>
            <th>定植日</th>
            <th>削除</th>
          </tr>
        </thead>
        <tbody id="step2Body"></tbody>
      </table>

      <div class="step-footer">
        <button id="addStep2Row" class="primary-btn">行を追加</button>
        <button id="recalcStep2" class="primary-btn">再計算</button>
        <button id="saveStep2" class="secondary-btn">保存</button>
      </div>
    </section>

    <!-- 共通保存ボタン（saveLog 用） -->
    <div id="saveArea">
      <button id="save" class="primary-btn">保存</button>
      <span id="saveStatus"></span>
    </div>

    <!-- ▼ 一覧へ戻るボタン -->
    <div class="step-footer left" style="margin-top: 24px;">
      <a href="/schedule/annual-list/annual-list.html" class="secondary-btn">
        年間作付計画一覧へ戻る
      </a>
    </div>

  </div>

  <!-- モーダル（品種選択など） -->
  <div id="modal-container"></div>

  <!-- save-modal 読み込み（saveLog に必須） -->
  <div id="save-modal-container"></div>
  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("save-modal-container").innerHTML = html;
      });
  </script>

  <!-- 年間作付計画メイン JS -->
  <script type="module" src="./annual.js"></script>

  <!-- ログインチェック & ヘッダー -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      renderHeader();
      document.getElementById("page-area").style.display = "block";
    });
  </script>

</body>
</html>
