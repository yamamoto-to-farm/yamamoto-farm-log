<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>管理データ編集（JSON）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通デザイン -->
  <link rel="stylesheet" href="/common/style.css?v=1">

  <!-- ナビバー -->
  <script type="module">
    import { renderNavbar } from "/common/header.js?v=1.1";
    renderNavbar();
  </script>
</head>

<body>

  <h1 id="page-title">管理データ編集（JSON）</h1>
  <div id="page-subtitle" class="page-subtitle"></div>

  <!-- ハブ or 編集カード -->
  <div id="edit-container"></div>

  <!-- 戻るボタン -->
  <button class="primary-btn" onclick="location.href='/admin/index.html'">
    管理ページに戻る
  </button>

  <!-- ★★★★★ 共通保存モーダル ★★★★★ -->
  <div id="modal-container"></div>
  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("modal-container").innerHTML = html;
      });
  </script>
  <!-- ★★★★★ ここまで ★★★★★ -->

  <!-- 認証チェック & メイン処理 -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { initEditJson } from "./edit-json.js";

    window.addEventListener("DOMContentLoaded", async () => {

      // 認証チェック
      const ok = await verifyLocalAuth();
      if (!ok) return;

      // admin のみ
      if (window.currentRole !== "admin") {
        alert("このページは管理者のみ利用できます");
        location.href = "/admin/index.html";
        return;
      }

      // ★ initEditJson を呼ぶのはここだけ（重複防止）
      initEditJson();
    });
  </script>

</body>
</html>
