<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>管理データ編集（JSON）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通デザイン -->
  <link rel="stylesheet" href="/common/css/main.css?v=1">
</head>

<body>

  <div id="page-area" class="page-container" style="display:none;">
    <h1 id="page-title" class="page-title">管理データ編集（JSON）</h1>
    <div id="page-subtitle" class="page-subtitle"></div>

    <!-- ハブ or 編集カード -->
    <div id="edit-container"></div>

    <!-- 戻るボタン -->
    <div class="back-action-slot">
      <button id="edit-json-back-btn" class="secondary-btn unified-back-btn" type="button">
        管理ページに戻る
      </button>
    </div>
  </div>

  <!-- ★★★★★ 共通保存モーダル ★★★★★ -->
  <div id="modal-container"></div>
  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("modal-container").innerHTML = html;
      });
  </script>
  <!-- ★★★★★ ここまで ★★★★★ -->

  <!-- 認証チェック & メイン処理 -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js?v=1.1";

    import { initEditJson } from "/admin/edit-json/edit-json.js?v=1";

    window.addEventListener("DOMContentLoaded", async () => {

      // 認証チェック
      const ok = await verifyLocalAuth();
      if (!ok) return;

      // admin のみ
      if (window.currentRole !== "admin") {
        alert("このページは管理者のみ利用できます");
        location.href = "/admin/index.html";
        return;
      }

      renderHeader({ adminPage: true });
      document.getElementById("page-area").style.display = "block";

      const backBtn = document.getElementById("edit-json-back-btn");
      if (backBtn) {
        const params = new URLSearchParams(location.search);
        const returnPath = params.get("return") || "";

        let backUrl = "/admin/index.html";
        if (returnPath.startsWith("/")) {
          backUrl = returnPath;
        } else {
          const ref = document.referrer || "";
          if (ref.startsWith(location.origin)) {
            const refPath = ref.slice(location.origin.length);
            if (refPath.startsWith("/")) {
              backUrl = refPath;
            }
          }
        }

        backBtn.textContent = backUrl.includes("/admin/index.html")
          ? "管理ページに戻る"
          : "戻る";

        backBtn.onclick = () => {
          location.href = backUrl;
        };
      }

      // ★ initEditJson を呼ぶのはここだけ（重複防止）
      initEditJson();
    });
  </script>

  <script src="/common/sw-register.js?v=20260713-1"></script>
</body>
</html>
