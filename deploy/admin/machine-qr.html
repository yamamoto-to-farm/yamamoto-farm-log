<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>QRコード生成 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- キャッシュ対策 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- 共通デザイン -->
  <link rel="stylesheet" href="/common/css/main.css?v=1">

  <style>
    #qr-area {
      text-align: left;
      padding: 18px;
    }

    .qr-result-layout {
      display: grid;
      grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
      gap: 20px;
      align-items: center;
    }

    .qr-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      min-height: 320px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }

    .qr-details {
      display: grid;
      gap: 14px;
      align-content: center;
    }

    .qr-detail-label {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .qr-detail-value {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
      word-break: break-word;
    }

    .qr-url-box {
      padding: 10px 12px;
      background: #f9fafb;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-all;
      color: #1f2937;
    }

    .qr-meta-box {
      padding: 14px 16px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }

    @media (max-width: 900px) {
      .qr-result-layout {
        grid-template-columns: 1fr;
      }

      .qr-preview {
        min-height: 0;
      }
    }
  </style>

  <!-- QRコード生成ライブラリ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

  <!-- ===============================
       PIN 入力
  =============================== -->
  <div id="pin-area">
    <div>アクセスキーを入力してください</div>
    <input id="pin-input" type="password" class="pin-input">
    <button id="pin-submit" class="pin-submit">OK</button>
  </div>

  <!-- ===============================
       ページ本体
  =============================== -->
  <div id="page-area" class="page-container" style="display:none;">

    <h1 class="page-title">QRコード生成</h1>

    <!-- ページ選択 -->
    <div class="form-field">
      <label>ページを選択</label>
      <select id="page-select" class="form-input"></select>
    </div>

    <!-- 機械選択 -->
    <div class="form-field">
      <label>機械を選択（任意）</label>
      <select id="machine-select" class="form-input">
        <option value="">（なし）</option>
      </select>
    </div>

    <!-- 生成ボタン -->
    <button id="generate-btn" class="primary-btn">QRコード生成</button>

    <!-- QR表示エリア -->
    <div id="qr-area" class="card" style="text-align:center;">
      <div class="qr-result-layout">
        <div class="qr-preview">
          <img id="qr-icon" style="display:none; width:80px;">
          <div id="qrcode"></div>
        </div>

        <div class="qr-details">
          <div class="qr-meta-box">
            <span class="qr-detail-label">ページ</span>
            <div id="qr-page-name" class="qr-detail-value"></div>
          </div>

          <div class="qr-meta-box">
            <span class="qr-detail-label">機械</span>
            <div id="qr-machine" class="qr-detail-value"></div>
          </div>

          <div class="qr-meta-box">
            <span class="qr-detail-label">URL</span>
            <div id="qr-url" class="qr-url-box"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- ===============================
       メインスクリプト
  =============================== -->
  <script type="module">
    import { showPinGate } from "/common/ui.js?v=1";
    import { renderHeader } from "/common/header.js?v=1";

    async function loadJSON(path) {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`Failed to load ${path}`);
      return await res.json();
    }

    async function initPage() {
      const pages = (await loadJSON("/data/pages.json")).pages;
      const machines = (await loadJSON("/data/machines.json")).machines;

      const pageSel = document.getElementById("page-select");
      const machineSel = document.getElementById("machine-select");

      // ページ一覧
      pages.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.name;
        opt.dataset.icon = p.icon || "";
        opt.dataset.path = p.path || "";
        opt.dataset.openLog = p.openLog ? "true" : "false";
        pageSel.appendChild(opt);
      });

      // 機械一覧
      machines.forEach(m => {
        const opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = m.name;
        machineSel.appendChild(opt);
      });

      document.getElementById("generate-btn").onclick = () => {
        const selected = pageSel.selectedOptions[0];
        const pageName = selected.textContent;
        const pagePath = selected.dataset.path;
        const machineId = machineSel.value;

        const siteRoot = "https://d3sscxnlo0qnhe.cloudfront.net/";

        let absUrl = new URL(pagePath, siteRoot).href;

        if (machineId) {
          const urlObj = new URL(absUrl);
          urlObj.searchParams.set("machine", machineId);
          absUrl = urlObj.href;
        }

        // アイコン
        const iconPath = selected.dataset.icon;
        const iconImg = document.getElementById("qr-icon");
        if (iconPath) {
          iconImg.src = new URL(iconPath, siteRoot).href;
          iconImg.style.display = "block";
        } else {
          iconImg.style.display = "none";
        }

        // 機械名
        const machineName = machineSel.selectedOptions[0].textContent;
        document.getElementById("qr-machine").textContent =
          machineId ? machineName : "（機械なし）";

        // ページ名
        document.getElementById("qr-page-name").textContent = pageName;

        // URL表示
        document.getElementById("qr-url").textContent = absUrl;

        // QR生成
        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
          text: absUrl,
          width: 256,
          height: 256
        });
      };
    }

    // PIN 認証 → ヘッダー → ページ表示
    window.addEventListener("DOMContentLoaded", () => {
      showPinGate("pin-area", async () => {
        renderHeader({ adminPage: true });
        document.getElementById("page-area").style.display = "block";
        initPage();
      });
    });
  </script>

</body>
</html>
