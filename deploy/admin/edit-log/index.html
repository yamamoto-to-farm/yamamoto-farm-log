<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>ログ編集（管理者）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <link rel="stylesheet" href="/common/filter.css?v=1">
</head>

<body>

  <div id="page-area" class="page-container" style="display:none;">
    <h1 class="page-title">ログ編集（管理者）</h1>

    <div class="card">
      <p style="margin-top:0; color:#555;">
        圃場別ログJSONを編集し、保存時に all.csv を再生成します。
      </p>

      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:end;">
        <div>
          <label for="log-type">ログタイプ</label>
          <select id="log-type" class="form-input">
            <option value="fertilizer">施肥</option>
            <option value="pesticide">防除</option>
            <option value="tillage">土づくり・耕起</option>
            <option value="weeding">除草・草刈り</option>
            <option value="hand-weeding">草とり（手作業除草）</option>
            <option value="watering">潅水</option>
            <option value="intertill">中耕</option>
            <option value="bedmaking">畝立て</option>
            <option value="field-maintenance">圃場整備</option>
          </select>
        </div>

        <div>
          <label>編集対象</label>
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <label style="display:flex; align-items:center; gap:6px; margin:0;">
              <input type="radio" name="target-mode" id="target-mode-field" value="field" checked>
              圃場
            </label>
            <label style="display:flex; align-items:center; gap:6px; margin:0;">
              <input type="radio" name="target-mode" id="target-mode-date" value="date">
              日付
            </label>
          </div>
        </div>

        <div id="target-field-wrap">
          <label>圃場</label>
          <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <button id="pick-field-btn" class="secondary-btn" type="button">圃場を選択</button>
            <span id="target-field-label" style="color:#333; font-weight:600;">未選択</span>
          </div>
        </div>

        <div id="target-date-wrap" style="display:none;">
          <label for="target-date">日付</label>
          <input id="target-date" type="date" class="form-input">
        </div>

        <button id="load-btn" class="primary-btn" type="button">読み込む</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;">
        <button id="add-row-btn" class="secondary-btn" type="button">行を追加</button>
        <button id="delete-row-btn" class="secondary-btn" type="button">選択行を削除</button>
        <label style="display:flex; align-items:center; gap:6px; margin-left:8px; color:#444;">
          <input id="sync-related" type="checkbox" checked>
          複数圃場で同時記録されたログを同時修正
        </label>
        <button id="save-btn" class="primary-btn" type="button">保存（JSON + all.csv更新）</button>
      </div>

      <div id="status" style="margin-bottom:8px; color:#555;"></div>

      <div style="overflow-x:auto;">
        <table id="edit-table" style="width:100%; border-collapse:collapse; min-width:840px;">
          <thead>
            <tr>
              <th style="text-align:left; border-bottom:1px solid #ddd; padding:6px; width:50px;">#</th>
              <th style="text-align:left; border-bottom:1px solid #ddd; padding:6px; width:220px;">圃場</th>
              <th style="text-align:left; border-bottom:1px solid #ddd; padding:6px; width:140px;">日付</th>
              <th style="text-align:left; border-bottom:1px solid #ddd; padding:6px; width:220px;">作業内容</th>
              <th style="text-align:left; border-bottom:1px solid #ddd; padding:6px; width:180px;">機械</th>
              <th style="text-align:left; border-bottom:1px solid #ddd; padding:6px; width:220px;">作業者（/区切り）</th>
              <th style="text-align:left; border-bottom:1px solid #ddd; padding:6px;">備考</th>
            </tr>
          </thead>
          <tbody id="edit-rows"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-top:0; font-size:1.1rem;">選択行の詳細項目（可変入力）</h2>
      <p style="margin-top:0; color:#666;">
        作業内容に応じて入力項目を自動表示します。既存JSONにある項目はすべて表示し、未入力項目も追加入力できます。
      </p>
      <div id="dynamic-field-status" style="margin-bottom:8px; color:#666;">行を選択してください</div>
      <div id="dynamic-fields" style="display:grid; gap:10px;"></div>
    </div>

    <div class="card">
      <h2 style="margin-top:0; font-size:1.1rem;">all.csv プレビュー</h2>
      <div id="all-csv-status" style="margin-bottom:8px; color:#666;">未読み込み</div>
      <div style="overflow-x:auto;">
        <table id="all-csv-table" style="width:100%; border-collapse:collapse; min-width:860px;">
          <thead id="all-csv-head"></thead>
          <tbody id="all-csv-rows"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <p style="margin:0; color:#666;">
        注意: この画面は圃場別JSONを正本として保存し、同タイプの all.csv を再生成します。
      </p>
    </div>

    <div class="back-action-slot">
      <a href="/admin/index.html" class="secondary-btn unified-back-btn">管理ページへ戻る</a>
    </div>
  </div>

  <div id="modal-container"></div>
  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("modal-container").innerHTML = html;
      });
  </script>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js?v=1.1";
    import "/common/filter/filter-core.js?v=1";
    import "/common/filter/filter-field.js?v=1";
    import { initEditLogPage } from "./edit-log.js?v=1";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      if (window.currentRole === "worker") {
        alert("このページは管理者のみ利用できます");
        location.href = "/admin/index.html";
        return;
      }

      renderHeader({ adminPage: true });
      document.getElementById("page-area").style.display = "block";
      await initEditLogPage();
    });
  </script>

  <script src="/common/sw-register.js?v=20260713-1"></script>
</body>

</html>
