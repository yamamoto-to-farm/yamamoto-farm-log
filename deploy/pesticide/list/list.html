<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>防除記録一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <link rel="stylesheet" href="/common/filter.css?v=1">
  <link rel="stylesheet" href="./list.css?v=1">

  <style>
    @media print {
      #page-area {
        display: block !important;
        visibility: visible !important;
      }
    }
  </style>
</head>

<body>
  <div id="page-area">
    <h1 class="page-title">防除記録一覧</h1>

    <div style="margin:10px 0; display:flex; gap:10px;">
      <a href="/admin/edit-json/index.html?data=pesticide-index" class="secondary-btn">農薬基本情報を編集</a>
    </div>

    <div class="list-shell">
      <div class="card list-filter-card">
        <div class="list-filter-row">
          <div class="form-field">
            <label for="year-select">年</label>
            <select id="year-select" class="form-input"></select>
          </div>
          <div class="form-field">
            <label>農薬フィルタ</label>
            <button id="open-pesticide-modal" class="primary-btn" type="button">農薬を選択</button>
          </div>
        </div>
        <div id="activePesticideFilters" style="margin-top:10px;"></div>
      </div>

      <div id="pesticide-container"></div>
    </div>
  </div>

  <div id="modal-container"></div>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js?v=1";
    import { renderHeader } from "/common/header.js";
    import { initPesticideList } from "./list.js?v=1";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) {
        document.getElementById("page-area").style.display = "none";
        return;
      }

      renderHeader();
      await initPesticideList();
    });
  </script>
</body>
</html>
