<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>山本農園 OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- キャッシュ対策 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- 共通スタイル -->
  <link rel="stylesheet" href="/common/css/main.css?v=1">

  <script type="module">
    import { showPinGate } from "./common/ui.js?v=1";
    import { renderHeader } from "./common/header.js?v=1";

    /* ▼ トップカテゴリの表示順（サブカテゴリはこの下に並ぶ） */
    const CATEGORY_ORDER = [
      "作業ログ",
      "作業日誌・記録一覧",
      "育苗",
      "圃場",
      "分析",
      "計画",
      "管理"
    ];

    async function loadPages() {
      const res = await fetch(`data/pages.json?v=${Date.now()}`);
      const json = await res.json();
      return json.pages;
    }

    /* ▼ カード生成 */
    function createCard(page) {
      const div = document.createElement("div");
      div.className = "menu-card";
      div.innerHTML = `<a href="${page.path}">${page.name}</a>`;
      return div;
    }

    /* ▼ セクション生成（サブカテゴリも含む） */
    function ensureSection(category) {
      let section = document.querySelector(`section[data-category="${category}"]`);
      if (!section) {
        section = document.createElement("section");
        section.dataset.category = category;

        const h2 = document.createElement("h2");
        h2.className = "menu-section-title";
        h2.textContent = category;

        const grid = document.createElement("div");
        grid.className = "menu-grid";

        section.appendChild(h2);
        section.appendChild(grid);

        document.getElementById("menu-area").appendChild(section);
      }
      return section.querySelector(".menu-grid");
    }

    /* ▼ カテゴリの並び順を決める */
    function getCategorySortKey(category) {
      // 例: "作業ログ/栽培管理" → "作業ログ"
      const top = category.split("/")[0];
      const topIndex = CATEGORY_ORDER.indexOf(top);
      return topIndex === -1 ? 999 : topIndex;
    }

    window.addEventListener("DOMContentLoaded", () => {
      showPinGate("pin-area", async () => {

        // ▼ PIN 認証成功 → ヘッダー描画
        renderHeader();

        // ▼ メニュー表示
        document.getElementById("menu-area").style.display = "block";

        const role = window.currentRole;
        const pages = await loadPages();

        /* ▼ カテゴリ順でソート（トップカテゴリ → サブカテゴリ） */
        pages.sort((a, b) => {
          const aKey = getCategorySortKey(a.category);
          const bKey = getCategorySortKey(b.category);
          if (aKey !== bKey) return aKey - bKey;
          return a.category.localeCompare(b.category, "ja");
        });

        /* ▼ カード配置 */
        pages.forEach(page => {
          if (!page.roles.includes(role)) return;
          if (page.category.startsWith("管理/")) return; // 管理/ツールは非表示

          const grid = ensureSection(page.category);
          grid.appendChild(createCard(page));
        });
      });

      /* ▼ カテゴリ見出しクリックで開閉 */
      document.addEventListener("click", (e) => {
        if (e.target.classList.contains("menu-section-title")) {
          const section = e.target.parentElement;
          const grid = section.querySelector(".menu-grid");
          grid.classList.toggle("open");
        }
      });
    });
  </script>
</head>

<body>

  <!-- ===============================
       PIN 入力
  =============================== -->
  <div id="pin-area">
    <div>アクセスキーを入力してください</div>
    <input id="pin-input" type="password" class="pin-input">
    <button id="pin-submit" class="pin-submit">OK</button>
  </div>

  <!-- ===============================
       メニュー
  =============================== -->
  <div id="menu-area" style="display:none"></div>

</body>
</html>
