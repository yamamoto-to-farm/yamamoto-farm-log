<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>山本農園 OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- キャッシュ対策 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- 共通スタイル -->
  <link rel="stylesheet" href="/common/css/main.css?v=1">

  <style>
    .category-section,
    .subcategory-section {
      margin-bottom: 20px;
    }

    .category-title,
    .subcategory-title {
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 0;
    }

    .subcategory-title {
      font-size: 17px;
      margin-left: 20px;
    }

    .menu-grid {
      display: none;
      margin-left: 40px;
    }

    .menu-grid.open {
      display: grid;
    }
  </style>

  <script type="module">
    import { showPinGate } from "./common/ui.js?v=1";
    import { renderHeader } from "./common/header.js?v=1";

    /* ▼ トップカテゴリの表示順 */
    const TOP_CATEGORY_ORDER = [
      "作業ログ",
      "作業日誌・記録一覧",
      "育苗",
      "圃場",
      "分析",
      "計画",
      "管理"
    ];

    /* ▼ サブカテゴリの表示順（栽培ステージ順） */
    const SUB_CATEGORY_ORDER = {
      "作業ログ": [
        "播種・育苗",
        "定植",
        "収穫・出荷",
        "栽培管理",
        "圃場管理"
      ]
    };

    async function loadPages() {
      const res = await fetch(`data/pages.json?v=${Date.now()}`);
      const json = await res.json();
      return json.pages;
    }

    function createCard(page) {
      const div = document.createElement("div");
      div.className = "menu-card";
      div.innerHTML = `<a href="${page.path}">${page.name}</a>`;
      return div;
    }

    /* ▼ トップカテゴリ生成 */
    function ensureTopCategory(top) {
      let section = document.querySelector(`section[data-top="${top}"]`);
      if (!section) {
        section = document.createElement("section");
        section.dataset.top = top;
        section.className = "category-section";

        const h2 = document.createElement("h2");
        h2.className = "category-title";
        h2.textContent = top;

        const container = document.createElement("div");
        container.className = "subcategory-container";
        container.style.display = "none";

        section.appendChild(h2);
        section.appendChild(container);
        document.getElementById("menu-area").appendChild(section);
      }
      return section.querySelector(".subcategory-container");
    }

    /* ▼ サブカテゴリ生成 */
    function ensureSubCategory(topContainer, sub) {
      let subSection = topContainer.querySelector(`div[data-sub="${sub}"]`);
      if (!subSection) {
        subSection = document.createElement("div");
        subSection.dataset.sub = sub;
        subSection.className = "subcategory-section";

        const h3 = document.createElement("div");
        h3.className = "subcategory-title";
        h3.textContent = sub;

        const grid = document.createElement("div");
        grid.className = "menu-grid";

        subSection.appendChild(h3);
        subSection.appendChild(grid);
        topContainer.appendChild(subSection);
      }
      return subSection.querySelector(".menu-grid");
    }

    /* ▼ 並び順ロジック（undefined 対策済み） */
    function sortPages(pages) {
      return pages.sort((a, b) => {
        const [aTop, aSub] = a.category.split("/");
        const [bTop, bSub] = b.category.split("/");

        // トップカテゴリ順
        const topA = TOP_CATEGORY_ORDER.indexOf(aTop);
        const topB = TOP_CATEGORY_ORDER.indexOf(bTop);
        if (topA !== topB) return topA - topB;

        // サブカテゴリが無い場合は後ろへ
        if (!aSub && !bSub) return 0;
        if (!aSub) return 1;
        if (!bSub) return -1;

        // サブカテゴリ順
        const subOrder = SUB_CATEGORY_ORDER[aTop] || [];
        const subA = subOrder.indexOf(aSub);
        const subB = subOrder.indexOf(bSub);

        if (subA !== -1 && subB !== -1) return subA - subB;

        // 未定義は五十音順
        return aSub.localeCompare(bSub, "ja");
      });
    }
    function normalizeCategory(category) {
      const parts = category.split("/");
      if (parts.length === 1) {
        // サブカテゴリが無い場合はトップカテゴリ名をサブカテゴリとして扱う
        return [parts[0], parts[0]];
      }
      return parts;
    }


    window.addEventListener("DOMContentLoaded", () => {
      showPinGate("pin-area", async () => {

        renderHeader();
        document.getElementById("menu-area").style.display = "block";

        const role = window.currentRole;
        let pages = await loadPages();

        pages = sortPages(pages);

        pages.forEach(page => {
          if (!page.roles.includes(role)) return;
          if (page.category.startsWith("管理/")) return;

          const [top, sub] = page.category.split("/");

          const topContainer = ensureTopCategory(top);
          const grid = ensureSubCategory(topContainer, sub);
          grid.appendChild(createCard(page));
        });
      });

      /* ▼ 開閉処理 */
      document.addEventListener("click", (e) => {
        if (e.target.classList.contains("category-title")) {
          const container = e.target.parentElement.querySelector(".subcategory-container");
          container.style.display = container.style.display === "none" ? "block" : "none";
        }

        if (e.target.classList.contains("subcategory-title")) {
          const grid = e.target.parentElement.querySelector(".menu-grid");
          grid.classList.toggle("open");
        }
      });
    });
  </script>
</head>

<body>

  <div id="pin-area">
    <div>アクセスキーを入力してください</div>
    <input id="pin-input" type="password" class="pin-input">
    <button id="pin-submit" class="pin-submit">OK</button>
  </div>

  <div id="menu-area" style="display:none"></div>

</body>

</html>
