<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>山本農園 OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- キャッシュ対策 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- 共通スタイル -->
  <link rel="stylesheet" href="/common/css/main.css?v=1">

  <style>
    .category-section, .subcategory-section {
      margin-bottom: 20px;
    }
    .category-title, .subcategory-title {
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 0;
    }
    .subcategory-title {
      font-size: 17px;
      margin-left: 20px;
    }
    .menu-grid {
      display: none;
      margin-left: 40px;
    }
    .menu-grid.open {
      display: grid;
    }
  </style>

  <script type="module">
    // ===============================
    // デバッグフラグ（?debug=1 で有効）
    // ===============================
    const DEBUG = new URL(location.href).searchParams.get("debug") === "1";
    function dlog(...msg) {
      if (DEBUG) console.log("[DEBUG]", ...msg);
    }

    import { showPinGate } from "./common/ui.js?v=1";
    import { renderHeader } from "./common/header.js?v=1";

    const TOP_CATEGORY_ORDER = [
      "作業ログ",
      "作業日誌・記録一覧",
      "育苗",
      "圃場",
      "分析",
      "計画",
      "管理"
    ];

    const SUB_CATEGORY_ORDER = {
      "作業ログ": [
        "播種・育苗",
        "定植",
        "収穫・出荷",
        "栽培管理",
        "圃場管理"
      ],
      "作業日誌・記録一覧": [
        "作業日誌",
        "記録一覧"
      ]
    };

    function normalizeCategory(category) {
      const parts = category.split("/");
      if (parts.length === 1) {
        return [parts[0], parts[0]];
      }
      return parts;
    }

    async function loadPages() {
      dlog("loading pages.json");
      const res = await fetch(`data/pages.json?v=${Date.now()}`);
      const json = await res.json();
      dlog("pages.json loaded:", json.pages);
      return json.pages;
    }

    function createCard(page) {
      const div = document.createElement("div");
      div.className = "menu-card";
      div.innerHTML = `<a href="${page.path}">${page.name}</a>`;
      return div;
    }

    function ensureTopCategory(top) {
      let section = document.querySelector(`section[data-top="${top}"]`);
      if (!section) {
        dlog("create top category:", top);

        section = document.createElement("section");
        section.dataset.top = top;
        section.className = "category-section";

        const h2 = document.createElement("h2");
        h2.className = "category-title";
        h2.textContent = top;

        const container = document.createElement("div");
        container.className = "subcategory-container";
        container.style.display = "none";

        const directGrid = document.createElement("div");
        directGrid.className = "menu-grid direct-grid";

        section.appendChild(h2);
        section.appendChild(container);
        section.appendChild(directGrid);
        document.getElementById("menu-area").appendChild(section);
      }
      return section;
    }

    function ensureSubCategory(topSection, sub) {
      const topContainer = topSection.querySelector(".subcategory-container");
      let subSection = topContainer.querySelector(`div[data-sub="${sub}"]`);
      if (!subSection) {
        dlog("create sub category:", sub);

        subSection = document.createElement("div");
        subSection.dataset.sub = sub;
        subSection.className = "subcategory-section";

        const h3 = document.createElement("div");
        h3.className = "subcategory-title";
        h3.textContent = sub;

        const grid = document.createElement("div");
        grid.className = "menu-grid";

        subSection.appendChild(h3);
        subSection.appendChild(grid);
        topContainer.appendChild(subSection);
      }
      return subSection.querySelector(".menu-grid");
    }

    function sortPages(pages) {
      dlog("sorting pages");
      return pages.sort((a, b) => {
        const [aTop, aSub] = normalizeCategory(a.category);
        const [bTop, bSub] = normalizeCategory(b.category);

        const topA = TOP_CATEGORY_ORDER.indexOf(aTop);
        const topB = TOP_CATEGORY_ORDER.indexOf(bTop);
        if (topA !== topB) return topA - topB;

        const subOrder = SUB_CATEGORY_ORDER[aTop] || [];
        const subA = subOrder.indexOf(aSub);
        const subB = subOrder.indexOf(bSub);

        if (subA !== -1 && subB !== -1) return subA - subB;

        return aSub.localeCompare(bSub, "ja");
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      dlog("DOMContentLoaded start");

      showPinGate("pin-area", async () => {
        dlog("PIN OK → renderHeader");

        const pendingReturnUrl = sessionStorage.getItem("pendingReturnUrl");
        if (pendingReturnUrl) {
          sessionStorage.removeItem("pendingReturnUrl");
          location.href = pendingReturnUrl;
          return;
        }

        renderHeader();
        document.getElementById("menu-area").style.display = "block";

        const role = window.currentRole;
        dlog("currentRole =", role);

        let pages = await loadPages();
        pages = sortPages(pages);

        pages.forEach(page => {
          dlog("check page:", page.name, "roles:", page.roles);

          if (!page.roles.includes(role)) return;
          if (page.category.startsWith("管理/")) return;

          const section = ensureTopCategory(page.category.split("/")[0]);

          if (page.category.includes("/")) {
            const [, sub] = page.category.split("/");
            const grid = ensureSubCategory(section, sub);
            grid.appendChild(createCard(page));
          } else {
            const directGrid = section.querySelector(".direct-grid");
            directGrid.appendChild(createCard(page));
          }
        });

        dlog("menu rendering complete");
      });

      document.addEventListener("click", (e) => {
        if (e.target.classList.contains("category-title")) {
          const section = e.target.parentElement;
          const subContainer = section.querySelector(".subcategory-container");
          const directGrid = section.querySelector(".direct-grid");

          if (subContainer) {
            subContainer.style.display =
              subContainer.style.display === "none" ? "block" : "none";
          }
          if (directGrid) {
            directGrid.classList.toggle("open");
          }
        }

        if (e.target.classList.contains("subcategory-title")) {
          const grid = e.target.parentElement.querySelector(".menu-grid");
          grid.classList.toggle("open");
        }
      });
    });
  </script>
</head>

<body>

  <div id="pin-area">
    <div>アクセスキーを入力してください</div>
    <input id="pin-input" type="password" class="pin-input">
    <button id="pin-submit" class="pin-submit">OK</button>
  </div>

  <div id="menu-area" style="display:none"></div>

</body>
</html>
