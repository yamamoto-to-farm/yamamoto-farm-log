<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>品種データ - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ★ 共通デザイン -->
  <link rel="stylesheet" href="/common/style.css?v=1">

  <!-- ★ 品種ページ専用デザイン -->
  <link rel="stylesheet" href="/varieties/index.css?v=1">
</head>

<body>

  <!-- ★ ページタイトル（動的に変更される） -->
  <h1 id="variety-name" class="page-title"></h1>

  <!-- ★ インデックス再生成ボタン + 最終更新（一覧ページのみ表示） -->
  <div id="index-tools" style="margin: 10px 0; display:none;">
    <button class="secondary-btn" id="regen-variety-index">
      品種インデックスを再生成
    </button>
    <span style="margin-left: 12px; font-size: 14px;">
      最終更新：<span id="variety-index-ts">読み込み中…</span>
    </span>
  </div>

  <!-- ★ 品種一覧 or 品種詳細 -->
  <div id="variety-container">読み込み中…</div>

  <!-- 戻るボタン（fields と同じ位置） -->
  <button class="primary-btn" onclick="location.href='/varieties/index.html'">
    品種一覧に戻る
  </button>

  <!-- 認証チェック & メイン処理 -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js?v=1.1";

    import { renderVarietyList } from "./index.js";      // 品種一覧
    import { initVarietyDetail } from "./detail.js";     // 品種詳細

    // ★ 更新処理を別 JS に分離
    import {
      showVarietyIndexTimestamp,
      setupRegenVarietyIndexButton
    } from "./regen-index.js";

    window.addEventListener("DOMContentLoaded", async () => {

      // 認証チェック
      const ok = await verifyLocalAuth();
      if (!ok) return;

      // ヘッダー表示
      renderHeader();

      // worker → 閲覧禁止（fields と同じ）
      if (window.currentRole !== "family" && window.currentRole !== "admin") {
        alert("このページは家族のみ閲覧できます");
        location.href = "/index.html";
        return;
      }

      // ★ URL パラメータ取得
      const params = new URLSearchParams(location.search);
      const variety = params.get("variety");

      // ★ 一覧ページ（variety なし） → 生成ボタンを表示
      if (!variety) {
        document.getElementById("index-tools").style.display = "block";
        showVarietyIndexTimestamp();
        setupRegenVarietyIndexButton();

        document.getElementById("variety-name").textContent = "品種を選択してください";
        renderVarietyList();
        return;
      }

      // ★ 詳細ページ（variety あり） → 生成ボタン非表示
      document.getElementById("index-tools").style.display = "none";

      document.getElementById("variety-name").textContent = `${variety}（品種詳細）`;
      initVarietyDetail(variety);
    });
  </script>

</body>
</html>
