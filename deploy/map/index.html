<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>圃場マップ</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="/common/css/main.css?v=2">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- map.css -->
  <link rel="stylesheet" href="./map.css?v=2">

  <style>
    body { margin: 0; }

    #field-select-container {
      padding: 10px;
      background: #f5f5f5;
      border-bottom: 1px solid #ccc;
    }

    #openFieldSelectBtn {
      width: 100%;
      font-size: 20px;
      padding: 10px;
      cursor: pointer;
    }

    #map {
      height: calc(100vh - 150px);
    }
  </style>
</head>
<body>

  <!-- ★ filter-ui.js が必要とする DOM -->
  <div id="modal-root"></div>

  <div id="map-container" style="display:none;">
    <div id="field-select-container">
      <button id="openFieldSelectBtn" class="primary-btn">
        圃場を選択する
      </button>
    </div>
    <div id="map"></div>
  </div>

  <script type="module">
    import { verifyLocalAuth } from "../common/ui.js";
    import { initMap } from "./map.js";

    /* ★★★ filter 系はここで import（script src は禁止） ★★★ */
    import "/common/filter/filter-core.js";
    import "/common/filter/filter-ui.js";
    import "/common/filter/filter-field.js";

    window.addEventListener("DOMContentLoaded", async () => {

      const ok = await verifyLocalAuth();
      if (!ok) return;

      document.getElementById("map-container").style.display = "block";

      initMap();
    });
  </script>

</body>
</html>
