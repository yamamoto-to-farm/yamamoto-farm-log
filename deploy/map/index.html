<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>圃場マップ</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="/common/css/main.css?v=2">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- map.css -->
  <link rel="stylesheet" href="./map.css?v=2">

  <!-- ★ フィルタ関連（initFilterCore は無いので import だけ） -->
  <script type="module" src="/common/filter/filter-core.js"></script>
  <script type="module" src="/common/filter/filter-ui.js"></script>
  <script type="module" src="/common/filter/filter-field.js"></script>
</head>
<body>

  <div id="map-container" style="display:none;">
    <div id="field-select-container">
      <select id="fieldSelect">
        <option value="">畑を選択してください</option>
      </select>
    </div>
    <div id="map"></div>
  </div>

  <script type="module">
    import { verifyLocalAuth } from "../common/ui.js";
    import { initMap } from "./map.js";

    window.addEventListener("DOMContentLoaded", async () => {

      const ok = await verifyLocalAuth();
      if (!ok) return;

      document.getElementById("map-container").style.display = "block";

      // ★ map.js 内で setFilterData() を呼ぶのでこれで十分
      initMap();
    });
  </script>

</body>
</html>
