<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>圃場マップ</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="/common/css/main.css?v=2">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- map.css -->
  <link rel="stylesheet" href="./map.css?v=2">

  <style>
    body { margin: 0; }

    /* 上部の選択リストエリア */
    #field-select-container {
      padding: 10px;
      background: #f5f5f5;
      border-bottom: 1px solid #ccc;
    }

    #fieldSelect {
      font-size: 20px;
      padding: 8px;
      width: 100%;
      cursor: pointer;
    }

    /* ★ ヘッダー(60px) + body padding(80px) + 選択リスト(70px) */
    #map {
      height: calc(100vh - 150px);
    }
  </style>
</head>
<body>

  <!-- 認証後に表示される地図 -->
  <div id="map-container" style="display:none;">

    <!-- 畑選択リスト -->
    <div id="field-select-container">
      <select id="fieldSelect">
        <option value="">畑を選択してください</option>
      </select>
    </div>

    <!-- 地図本体 -->
    <div id="map"></div>
  </div>

  <script type="module">
    import { verifyLocalAuth } from "../common/ui.js";
    import { initMap } from "./map.js";

    window.addEventListener("DOMContentLoaded", async () => {

      const ok = await verifyLocalAuth();
      if (!ok) return;

      // 認証済み → 地図表示
      document.getElementById("map-container").style.display = "block";

      // Leaflet 初期化
      initMap();
    });
  </script>

</body>
</html>
