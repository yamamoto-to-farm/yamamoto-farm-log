<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>出荷ログ - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ★ キャッシュ対策 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- ★ 共通スタイル -->
  <link rel="stylesheet" href="/common/style.css?v=1">

  <!-- CSV パーサー -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

  <!-- ===============================
       ★ ヘッダー（header.js が自動挿入）
  =============================== -->

  <div id="form-area" style="display:none;">

    <!-- ★ ページタイトル（統一） -->
    <h1 class="page-title">出荷ログ</h1>

    <!-- 出荷日 -->
    <h2 class="section-title">出荷日</h2>
    <div class="form-field">
      <input type="date" id="shippingDate" class="form-input">
    </div>

    <!-- 未計量リスト -->
    <h2 class="section-title">未計量の出荷申込一覧</h2>
    <div class="card" id="unshippedArea"></div>

    <!-- 重量入力 -->
    <h2 class="section-title">重量入力（改行 or カンマ区切り）</h2>
    <div class="card">
      <textarea id="weights" rows="5" class="form-textarea"
        placeholder="例：500 650 600 550 650"></textarea>
    </div>

    <!-- メモ -->
    <h2 class="section-title">メモ</h2>
    <div class="card">
      <textarea id="notes" rows="3" class="form-textarea"></textarea>
    </div>

    <!-- 保存 -->
    <button type="button" class="primary-btn" onclick="saveShipping()">保存</button>

    <!-- ★ 作業完了ボタンは utils.js が追加する -->
  </div><!-- /form-area -->


  <!-- ===============================
       ▼ 認証 → ヘッダー挿入 → 初期化
  =============================== -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { attachWorkDoneButton } from "/common/utils.js";
    import { initShippingPage } from "./shipping.js";

    window.addEventListener("DOMContentLoaded", async () => {

      // 1) 認証
      const ok = await verifyLocalAuth();
      if (!ok) return;

      // 2) ヘッダー描画
      renderHeader();

      // 3) ページ表示
      document.getElementById("form-area").style.display = "block";

      // 4) 日付初期値
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById("shippingDate").value = today;

      // 5) 作業完了ボタン（worker/family/admin 全員使える）
      attachWorkDoneButton();

      // 6) 出荷ページ初期化
      initShippingPage();
    });
  </script>

  <!-- 保存処理 -->
  <script type="module" src="/common/save/index.js"></script>

  <!-- ★★★★★ 共通保存モーダル ★★★★★ -->
  <div id="modal-container"></div>
  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("modal-container").innerHTML = html;
      });
  </script>

</body>

</html>
