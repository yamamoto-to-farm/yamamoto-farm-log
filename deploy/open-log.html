<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>ログページを開いています…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

  <h2>ページを開いています…</h2>
  <p>数秒経っても移動しない場合は、もう一度QRコードを読み取ってください。</p>

  <script>
    // URLパラメータ取得
    const url = new URL(location.href);
    const id = url.searchParams.get("id");       // ← seed / planting / harvest / shipping / ...
    const machine = url.searchParams.get("machine"); // 任意

    if (!id) {
      document.body.innerHTML = "<h2>エラー：id が指定されていません</h2>";
      throw new Error("id is required");
    }

    // id → 実際のログページのパスに変換（/logs は付けない）
    const idToPath = {
      "seed": "/seed/index.html",
      "nursery-log": "/nursery/index.html",
      "planting": "/planting/index.html",
      "cultivation-log": "/cultivation/index.html",
      "harvest": "/harvest/index.html",
      "shipping": "/shipping/index.html"
    };

    const targetBase = idToPath[id];

    if (!targetBase) {
      document.body.innerHTML = `<h2>エラー：不明な id (${id}) です</h2>`;
      throw new Error("Unknown id: " + id);
    }

    // パラメータ付与
    let target = targetBase;
    if (machine) {
      target += `?machine=${encodeURIComponent(machine)}`;
    }

    // ★ JS が新しいタブとして開く（→ window.close() が許可される）
    window.open(target, "_blank");

    // ★ 自分自身（open-log.html）は閉じる
    window.close();

    // ★ もし閉じられなかった場合のフォールバック
    setTimeout(() => {
      if (!document.hidden) {
        document.body.innerHTML = `
          <h2>ページを開きました</h2>
          <p>このページを閉じてください。</p>
          <p><a href="${target}">→ 開けない場合はこちら</a></p>
        `;
      }
    }, 500);
  </script>

</body>

</html>
