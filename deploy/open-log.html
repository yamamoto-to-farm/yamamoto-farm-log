<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>作業ページを開く</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: sans-serif;
      padding: 30px;
      text-align: center;
    }
    button {
      padding: 14px 26px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      background: #2a7ae2;
      color: white;
      cursor: pointer;
    }
    button:active {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h2>作業ページを開く</h2>
  <p>下のボタンを押してください。</p>

  <button id="open-btn">作業ページを開く</button>

  <script>
    // URLパラメータ取得
    const url = new URL(location.href);
    const id = url.searchParams.get("id");       // seed / planting / harvest / ...
    const machine = url.searchParams.get("machine");

    if (!id) {
      document.body.innerHTML = "<h2>エラー：id が指定されていません</h2>";
      throw new Error("id is required");
    }

    // ★ ログページ専用マッピング
    const idToPath = {
      "seed": "/seed/index.html",
      "nursery-log": "/nursery/index.html",
      "tillage": "/field/tillage/index.html",
      "weeding-machine": "/field/weeding/index.html",
      "field-maintenance": "/field/maintenance/index.html",
      "planting": "/planting/index.html",
      "fertilizer": "/fertilizer/index.html",
      "pesticide": "/pesticide/index.html",
      "watering": "/watering/index.html",
      "hand-weeding": "/hand-weeding/index.html",
      "intertill": "/intertill/index.html",
      "bedmaking": "/bedmaking/index.html",
      "cultivation-log": "/cultivation/index.html",
      "harvest": "/harvest/index.html",
      "shipping": "/shipping/index.html"
    };

    let targetBase = idToPath[id];

    // ★ ログページ以外の id が来たら “直リンク” にフォールバック
    if (!targetBase) {
      // 例: id=map → /map/index.html
      targetBase = `/${id}/index.html`;
    }

    // パラメータ付与
    let target = targetBase;
    if (machine) {
      target += `?machine=${encodeURIComponent(machine)}`;
    }

    // ★ ボタンを押したら window.open()（ユーザー操作扱い → ブロックされない）
    document.getElementById("open-btn").onclick = () => {
      window.open(target, "_blank");  // ← これが許可される
      window.close();                 // ← open-log.html は閉じられる（許可される）
    };
  </script>

  <script src="/common/sw-register.js?v=20260713-1"></script>
</body>

</html>
