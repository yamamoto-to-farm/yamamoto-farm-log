<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>施肥詳細 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通CSS -->
  <link rel="stylesheet" href="/common/css/main.css?v=1">

  <!-- list.css をそのまま流用（表デザイン統一） -->
  <link rel="stylesheet" href="./month.css">
</head>

<body>

  <div id="page-area" style="display:none;">

    <!-- ページタイトル -->
    <h1 id="page-title" class="page-title">施肥詳細</h1>

    <!-- 戻るリンク -->
    <div style="margin-bottom: 15px;">
      <a href="./list.html" class="back-link">← 施肥一覧へ戻る</a>
    </div>

    <!-- JS がここに詳細テーブルを描画 -->
    <div id="fertilizer-detail-container"></div>

  </div>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js?v=1";
    import { renderHeader } from "/common/header.js";
    import "./month.js?v=1";

    window.addEventListener("DOMContentLoaded", async () => {
      if (!await verifyLocalAuth()) return;

      renderHeader();
      document.getElementById("page-area").style.display = "block";
    });
  </script>

</body>
</html>
