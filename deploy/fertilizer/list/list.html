<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>施肥記録一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <link rel="stylesheet" href="/common/filter.css?v=1">
  <link rel="stylesheet" href="./list.css?v=1">

  <style>
    /* 印刷時は必ず表示されるようにする（保険） */
    @media print {
      #page-area {
        display: block !important;
        visibility: visible !important;
      }
    }
  </style>
</head>

<body>

  <!-- ★ 初期状態で表示しておく（display:none を削除） -->
  <div id="page-area">
    <h1 class="page-title">施肥記録一覧</h1>

    <div style="margin:10px 0; display:flex; gap:10px;">
      <a id="edit-fertilizer-master-link" href="/admin/edit-json/index.html?data=fertilizer-index&return=%2Ffertilizer%2Flist%2Flist.html" class="secondary-btn" style="display:none;">肥料基本情報を編集</a>
    </div>

    <div class="list-shell">
      <div class="card list-filter-card">
        <div class="list-filter-row">
          <div class="form-field">
            <label for="year-select">年</label>
            <select id="year-select" class="form-input"></select>
          </div>
          <div class="form-field">
            <label>肥料フィルタ</label>
            <button id="open-fertilizer-modal" class="primary-btn" type="button">肥料を選択</button>
          </div>
        </div>
        <div id="activeFertilizerFilters" style="margin-top:10px;"></div>
      </div>

      <div id="fertilizer-container"></div>

      <div style="margin-top:16px; display:flex; justify-content:flex-end;">
        <button id="fertilizer-back-btn" class="secondary-btn" type="button">戻る</button>
      </div>
    </div>
  </div>

  <div id="modal-container"></div>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js?v=1";
    import { renderHeader } from "/common/header.js";
    import { initFertilizerList } from "./list.js?v=1";

    window.addEventListener("DOMContentLoaded", async () => {

      const ok = await verifyLocalAuth();

      // ★ 未ログイン時だけ非表示にする（印刷プレビュー対策）
      if (!ok) {
        document.getElementById("page-area").style.display = "none";
        return;
      }

      renderHeader();
      const editLink = document.getElementById("edit-fertilizer-master-link");
      if (editLink && window.currentRole === "admin") {
        editLink.style.display = "inline-flex";
      }
      await initFertilizerList();
    });
  </script>

</body>
</html>
