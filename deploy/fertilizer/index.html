<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>施肥ログ - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
</head>

<body>

  <div id="page-area" style="display:none;">

    <h1 class="page-title">施肥ログ</h1>

    <!-- 日付 -->
    <h2 class="section-title">施肥日</h2>
    <div class="card">
      <input type="date" id="date" class="form-input">
    </div>

    <!-- 圃場 -->
    <h2 class="section-title">圃場</h2>
    <div class="card">
      <button id="open-field-modal" class="primary-btn">圃場を選択</button>
      <div id="activeFilters" style="margin-top:10px;"></div>
      <div id="selected-fields" style="margin-top:10px; font-weight:bold;">未選択</div>
    </div>

    <!-- 肥料名 -->
    <h2 class="section-title">肥料名</h2>
    <div class="card">
      <input type="text" id="fertilizer_id" class="form-input">
    </div>

    <!-- 使用量 -->
    <h2 class="section-title">使用量</h2>
    <div class="card">
      <div class="form-field">
        <label>袋数</label>
        <input type="number" id="bags" class="form-input" value="1">
      </div>
      <div class="form-field">
        <label>量（kg）</label>
        <input type="number" id="amount" class="form-input" value="20">
      </div>
    </div>

    <!-- 使用機械 -->
    <h2 class="section-title">使用機械</h2>
    <div class="card">
      <input type="text" id="machine" class="form-input" value="YT5113">
    </div>

    <!-- 作業者 -->
    <h2 class="section-title">作業者</h2>
    <div class="card">
      <input type="text" id="worker" class="form-input" value="直輝">
    </div>

    <!-- 備考 -->
    <h2 class="section-title">備考</h2>
    <div class="card">
      <textarea id="notes" class="form-textarea"></textarea>
    </div>

    <!-- 保存 -->
    <button id="save-btn" class="primary-btn">保存</button>

  </div>

  <!-- ★ モーダルはここにだけ入れる（filter-ui.js 用） -->
  <div id="modal-container"></div>

  <!-- 保存モーダル（直接埋め込み） -->
  <div id="saveModal" style="
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  ">
    <div style="
      background: white;
      padding: 20px;
      border-radius: 8px;
      width: 300px;
      text-align: center;
    ">
      <div id="saveModalMessage">保存中です…</div>
      <button id="saveModalCloseBtn" style="margin-top: 20px; display:none;">
        OK
      </button>
    </div>
  </div>

  <!-- 共通スクリプト -->
  <script type="module" src="/common/summary.js?v=1"></script>
  <script type="module" src="/common/save/index.js?v=1"></script>
  <script type="module" src="/common/save-modal.js?v=1"></script>

  <!-- フィルタ構造 -->
  <script type="module" src="/common/filter/filter-core.js?v=1"></script>
  <script type="module" src="/common/filter/filter-ui.js?v=1"></script>
  <script type="module" src="/common/filter/filter-field.js?v=1"></script>
  <script type="module" src="/common/filter/filter-active.js?v=1"></script>

  <!-- 初期化 -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { initFertilizerPage } from "./fertilizer.js?v=1";

    window.addEventListener("DOMContentLoaded", async () => {
      if (!await verifyLocalAuth()) return;

      renderHeader();
      document.getElementById("page-area").style.display = "block";

      // 今日の日付をセット
      document.getElementById("date").value =
        new Date().toISOString().slice(0, 10);

      await initFertilizerPage();
    });
  </script>

</body>
</html>
