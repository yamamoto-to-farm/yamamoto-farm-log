<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>施肥ログ - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <link rel="stylesheet" href="/common/filter.css?v=1">
</head>

<body>

  <div id="page-area" style="display:none;">

    <h1 class="page-title">施肥ログ</h1>

    <!-- 日付 -->
    <h2 class="section-title">施肥日</h2>
    <div class="card">
      <input type="date" id="date" class="form-input">
    </div>

    <!-- 圃場 -->
    <h2 class="section-title">圃場</h2>
    <div class="card">
      <button id="open-field-modal" class="primary-btn">圃場を選択</button>

      <!-- filter-active.js が自動でタグを描画 -->
      <div id="activeFilters" style="margin-top:10px;"></div>

      <!-- 合計面積 -->
      <div id="field-area-total" style="margin-top:10px; font-weight:bold; color:#444;">
        合計面積：0 a
      </div>
    </div>

    <!-- 肥料 -->
    <h2 class="section-title">肥料</h2>
    <div class="card">
      <button id="open-fertilizer-modal" class="primary-btn">肥料を選択</button>
      <div id="selected-fertilizer" style="margin-top:10px; font-weight:bold;">未選択</div>
    </div>

    <!-- ▼ 複数肥料入力エリア -->
    <h2 class="section-title">使用量（複数肥料）</h2>
    <div class="card">
      <div id="fertilizer-input-area">
        <p style="color:#777;">肥料を選択すると入力欄が表示されます</p>
      </div>
    </div>

    <!-- 使用機械 -->
    <h2 class="section-title">使用機械</h2>
    <div class="card">
      <input type="text" id="machine" class="form-input">
    </div>

    <!-- 作業者 -->
    <h2 class="section-title">作業者</h2>
    <div class="card">
      <div id="worker-box"></div>
      <input type="text" id="temp-workers" class="form-input" placeholder="単発バイト（カンマ区切り）">
    </div>

    <!-- 備考 -->
    <h2 class="section-title">備考</h2>
    <div class="card">
      <textarea id="notes" class="form-textarea"></textarea>
    </div>

    <!-- 保存 -->
    <button id="save-btn" class="primary-btn">保存</button>

  </div>

  <!-- モーダル -->
  <div id="modal-container"></div>

  <!-- 保存モーダル -->
  <div id="saveModal" style="
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  ">
    <div style="
      background: white;
      padding: 20px;
      border-radius: 8px;
      width: 300px;
      text-align: center;
    ">
      <div id="saveModalMessage">保存中です…</div>
      <button id="saveModalCloseBtn" style="margin-top: 20px; display:none;">
        OK
      </button>
    </div>
  </div>

  <!-- 共通スクリプト -->
  <script type="module" src="/common/summary.js?v=1"></script>
  <script type="module" src="/common/save/index.js?v=1"></script>
  <script type="module" src="/common/save-modal.js?v=1"></script>

  <!-- フィルタ構造 -->
  <script type="module" src="/common/filter/filter-core.js?v=1"></script>
  <script type="module" src="/common/filter/filter-field.js?v=1"></script>
  <script type="module" src="/common/filter/filter-fertilizer.js?v=1"></script>
  <script type="module" src="/common/filter/filter-active.js?v=1"></script>

  <!-- 複数肥料入力ロジック -->
  <script type="module" src="./fertilizer-multi-input.js?v=1"></script>

  <!-- 作業者 -->
  <script type="module" src="/common/workers.js?v=1"></script>

  <!-- ページロジック -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { initFertilizerPage } from "./fertilizer.js?v=1";
    import { createWorkerCheckboxes } from "/common/workers.js?v=1";

    window.addEventListener("DOMContentLoaded", async () => {
      if (!await verifyLocalAuth()) return;

      renderHeader();
      document.getElementById("page-area").style.display = "block";

      // 今日の日付
      document.getElementById("date").value =
        new Date().toISOString().slice(0, 10);

      // 作業者チェックボックス
      await createWorkerCheckboxes("worker-box");

      // URL パラメータで機械を自動入力
      const params = new URLSearchParams(location.search);
      const machine = params.get("machine");
      if (machine) {
        document.getElementById("machine").value = machine;
      }

      await initFertilizerPage();
    });
  </script>

</body>

</html>
