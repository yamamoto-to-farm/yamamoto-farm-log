<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>育苗ハウス管理 - 山本農園</title>
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <link rel="stylesheet" href="./house.css?v=20260718-2">
</head>

<body>
  <div id="page-area" class="page-container" style="display:none;">
    <h1 class="page-title">育苗ハウス・外育苗 配置ボード</h1>

    <section class="nursery-layout-grid">
      <article class="card zones-card">
        <section class="nursery-toolbar">
          <div class="toolbar-row">
            <button id="reload-btn" class="secondary-btn" type="button">再読込</button>
            <button id="split-btn" class="secondary-btn" type="button">分割</button>
            <button id="merge-btn" class="secondary-btn" type="button">結合</button>
            <button id="save-btn" class="primary-btn" type="button">配置を保存</button>
          </div>
          <div id="summary-line" class="summary-line">読み込み中...</div>
          <div id="stale-line" class="stale-line" style="display:none;"></div>
        </section>
        <div id="zones-root" class="zones-root"></div>
      </article>
    </section>
  </div>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { initNurseryHousePage } from "./house.js?v=20260718-2";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      renderHeader();
      document.getElementById("page-area").style.display = "block";
      await initNurseryHousePage();
    });
  </script>

  <script src="/common/sw-register.js?v=20260713-1"></script>
</body>

</html>
