<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>育苗ハウス管理 - 山本農園</title>
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <link rel="stylesheet" href="./house.css?v=20260717-1">
</head>

<body>
  <div id="page-area" class="page-container" style="display:none;">
    <h1 class="page-title">育苗ハウス・外育苗 配置管理</h1>

    <section class="card nursery-toolbar">
      <div class="toolbar-row">
        <label for="lot-search">ロット検索</label>
        <input id="lot-search" class="form-input" type="text" placeholder="品種名 or seedRef で検索">
        <label class="toggle-line"><input id="show-empty-lots" type="checkbox"> 在庫0ロットも表示</label>
        <button id="reload-btn" class="secondary-btn" type="button">再読込</button>
        <button id="save-btn" class="primary-btn" type="button">配置を保存</button>
      </div>
      <div id="summary-line" class="summary-line">読み込み中...</div>
      <div id="stale-line" class="stale-line" style="display:none;"></div>
    </section>

    <section class="nursery-layout-grid">
      <article class="card lot-pool-card">
        <h2 class="section-title">未配置ロット（ドラッグ元）</h2>
        <div id="unassigned-pool" class="lot-pool drop-pool"></div>
      </article>

      <article class="card zones-card">
        <h2 class="section-title">配置エリア</h2>
        <div id="zones-root" class="zones-root"></div>
      </article>
    </section>
  </div>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { initNurseryHousePage } from "./house.js?v=20260717-1";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      renderHeader();
      document.getElementById("page-area").style.display = "block";
      await initNurseryHousePage();
    });
  </script>

  <script src="/common/sw-register.js?v=20260713-1"></script>
</body>

</html>
