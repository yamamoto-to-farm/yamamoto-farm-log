<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>収穫ログ - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通デザイン -->
  <link rel="stylesheet" href="/common/style.css?v=1">

  <!-- Papaparse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

  <!-- ===============================
       ★ ヘッダー（header.js が自動挿入）
  =============================== -->

  <div id="form-area" style="display:none;">

    <!-- ページタイトル -->
    <h1 class="page-title">収穫ログ</h1>

    <!-- 収穫日 -->
    <h2 class="section-title">収穫日</h2>
    <div class="form-field">
      <input type="date" id="harvestDate" class="form-input">
    </div>

    <!-- 出荷申請日 -->
    <h2 class="section-title">出荷申請日</h2>
    <div class="form-field">
      <input type="date" id="shippingDate" class="form-input">
    </div>

    <!-- 作業者 -->
    <h2 class="section-title">作業者</h2>
    <div class="card" id="workers_box"></div>

    <div class="card">
      <label for="temp_workers">単発バイト（カンマ区切り）</label>
      <input id="temp_workers" class="form-input" placeholder="例：佐藤さん, 田中さん">
    </div>

    <!-- 圃場 -->
    <h2 class="section-title">圃場</h2>
    <div class="card">

      <label>自動判定（推定）</label>
      <input id="field_auto" class="form-input" readonly style="background:#fff3b0; font-weight:bold;">

      <label style="margin-top:10px;">
        <input type="checkbox" id="field_confirm">
        この圃場で確定する
      </label>

      <hr style="margin: 15px 0;">

      <label>エリア選択</label>
      <select id="field_area" class="form-input">
        <option value="">エリアを選択</option>
      </select>

      <label>圃場選択</label>
      <select id="field_manual" class="form-input">
        <option value="">エリアを選んでください</option>
      </select>
    </div>

    <!-- 紐づける定植記録 -->
    <h2 class="section-title">紐づける定植記録</h2>
    <div class="card">
      <label for="plantingRef">定植記録（収穫予定 ±1ヶ月）</label>
      <select id="plantingRef" class="form-input">
        <option value="">該当する定植記録を選択</option>
      </select>
    </div>

    <!-- 収穫量・特記事項 -->
    <h2 class="section-title">収穫量・特記事項</h2>
    <div class="card">
      <div class="form-field">
        <label for="amount">収穫量（基）</label>
        <input type="number" id="amount" class="form-input" inputmode="numeric">
      </div>

      <div class="form-field">
        <label for="issue">特記事項</label>
        <textarea id="issue" class="form-textarea" rows="3" placeholder="病害虫・欠株・その他メモなど"></textarea>
      </div>
    </div>

    <!-- 保存 -->
    <button type="button" class="primary-btn" onclick="saveHarvest()">保存</button>

    <!-- ★ 作業完了ボタンは utils.js が追加する -->
  </div>

  <!-- 保存モーダル -->
  <div id="modal-container"></div>
  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("modal-container").innerHTML = html;
      });
  </script>

  <!-- summary.js（モーダル制御） -->
  <script type="module" src="../common/summary.js"></script>

  <!-- save/index.js（S3 書き込み） -->
  <script type="module" src="../common/save/index.js"></script>

  <!-- ===============================
       ▼ 認証 → ヘッダー挿入 → 初期化
  =============================== -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { attachWorkDoneButton } from "/common/utils.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      // ヘッダー描画
      renderHeader();

      // ページ表示
      document.getElementById("form-area").style.display = "block";

      // 日付初期値
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById("harvestDate").value = today;
      document.getElementById("shippingDate").value = today;

      // 作業完了ボタン
      attachWorkDoneButton();

      // harvest.js をロードして初期化
      const module = await import("./harvest.js");
      module.initHarvestPage();
    });
  </script>

</body>
</html>
