<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>土づくり・耕起一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <style>
    body {
      background: linear-gradient(180deg, #f7f7f2 0%, #ffffff 28%);
    }

    .page-wrap {
      max-width: 1260px;
      margin: 0 auto;
      padding: 12px 16px 28px;
    }

    .hero-card,
    .toolbar-card,
    .summary-card,
    .field-card,
    .log-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .hero-card {
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .hero-title {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .hero-copy {
      margin: 0;
      color: #4b5563;
      line-height: 1.7;
    }

    .toolbar-card {
      padding: 14px;
      margin-bottom: 16px;
    }

    .toolbar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-card {
      padding: 14px;
    }

    .summary-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .summary-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }

    .summary-sub {
      font-size: 13px;
      color: #4b5563;
    }

    .content-grid {
      display: grid;
      gap: 16px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 10px;
    }

    .field-card {
      padding: 14px;
      border-left: 5px solid #d1d5db;
    }

    .field-card.has-recent {
      border-left-color: #2f855a;
    }

    .field-card.stale {
      border-left-color: #b45309;
    }

    .field-name {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .field-name h3 {
      margin: 0;
      font-size: 18px;
    }

    .area-text {
      color: #6b7280;
      font-size: 12px;
      white-space: nowrap;
    }

    .field-meta {
      display: grid;
      gap: 8px;
      font-size: 13px;
      color: #374151;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill-date { background: #eff6ff; color: #1d4ed8; }
    .pill-gap { background: #fef3c7; color: #92400e; }
    .pill-count { background: #ecfdf5; color: #166534; }

    .age-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      width: fit-content;
    }

    .age-chip.fresh { background: #ecfdf5; color: #166534; }
    .age-chip.warm { background: #fff7ed; color: #9a3412; }
    .age-chip.old { background: #fef2f2; color: #991b1b; }

    .table-wrap {
      overflow-x: auto;
    }

    .log-table {
      width: 100%;
      min-width: 1100px;
      border-collapse: collapse;
    }

    .log-table th,
    .log-table td {
      border-bottom: 1px solid #e5e7eb;
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 0.95em;
    }

    .log-table th {
      background: #f9fafb;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 12px;
      white-space: nowrap;
    }

    .badge-rotary { background: #ecfdf5; color: #166534; }
    .badge-subsoiler { background: #eff6ff; color: #1d4ed8; }

    .sub-note {
      color: #6b7280;
      font-size: 12px;
      margin-top: 2px;
      line-height: 1.5;
    }

    .empty-state {
      padding: 20px;
      color: #6b7280;
      text-align: center;
    }

    @media (max-width: 640px) {
      .page-wrap { padding: 10px 12px 20px; }
      .hero-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div id="page-area" style="display:none;">
    <div class="page-wrap">
      <div class="hero-card">
        <h1 class="hero-title">土づくり・耕起一覧</h1>
        <p class="hero-copy">いつ、どの圃場を耕うんしたかを時系列で確認できます。圃場ごとの最終耕うん日と、前回から何日空いたかを並べて見られるようにしています。</p>
      </div>

      <div class="toolbar-card">
        <div class="toolbar-grid">
          <div class="form-field">
            <label for="search-input">圃場・作業内容で絞り込み</label>
            <input id="search-input" class="form-input" placeholder="例：三角畑、ロータリー">
          </div>

          <div class="form-field">
            <label for="sort-select">並び順</label>
            <select id="sort-select" class="form-input">
              <option value="recent">新しい順</option>
              <option value="field">圃場名順</option>
              <option value="gap">前回からの空きが長い順</option>
            </select>
          </div>

          <div class="form-field">
            <a href="/field/tillage/index.html" class="secondary-btn">耕起ログを入力</a>
          </div>
        </div>
      </div>

      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-label">対象圃場</div>
          <div class="summary-value" id="summary-field-count">0</div>
          <div class="summary-sub">耕起ログのある圃場数</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">記録件数</div>
          <div class="summary-value" id="summary-log-count">0</div>
          <div class="summary-sub">全圃場の耕起記録合計</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">最新の耕うん</div>
          <div class="summary-value" id="summary-latest-date">-</div>
          <div class="summary-sub" id="summary-latest-field">-</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">最大の空き</div>
          <div class="summary-value" id="summary-max-gap">-</div>
          <div class="summary-sub" id="summary-max-gap-field">-</div>
        </div>
      </div>

      <div class="content-grid">
        <section>
          <h2 class="page-title" style="font-size:20px; margin-bottom:10px;">圃場ごとの最終耕うん</h2>
          <div id="field-grid" class="field-grid"></div>
        </section>

        <section class="log-card">
          <div style="padding:14px 14px 0;">
            <h2 class="page-title" style="font-size:20px; margin-bottom:6px;">記録一覧</h2>
            <p style="margin:0 0 10px; color:#6b7280;">前回の耕うんから何日空いたかを見ながら並べています。</p>
          </div>
          <div class="table-wrap">
            <table class="log-table">
              <thead>
                <tr>
                  <th>日付</th>
                  <th>圃場</th>
                  <th>区分</th>
                  <th>前回から</th>
                  <th>深さ</th>
                  <th>速度</th>
                  <th>機械</th>
                  <th>作業者</th>
                  <th>備考</th>
                </tr>
              </thead>
              <tbody id="log-body"></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script type="module" src="./list.js"></script>
</body>
</html>
