<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>土づくり・耕起一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <style>
    body {
      background: linear-gradient(180deg, #f7f7f2 0%, #ffffff 28%);
    }

    .page-wrap {
      max-width: 1260px;
      margin: 0 auto;
      padding: 12px 16px 28px;
    }

    .hero-card,
    .field-card,
    .log-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .hero-card {
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .hero-title {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .hero-copy {
      margin: 0;
      color: #4b5563;
      line-height: 1.7;
    }

    .content-grid {
      display: grid;
      gap: 16px;
    }

    .area-list {
      display: grid;
      gap: 14px;
    }

    .area-group {
      padding: 14px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .area-group.fresh { border-left: 6px solid #2f855a; }
    .area-group.warm { border-left: 6px solid #c05621; }
    .area-group.old { border-left: 6px solid #b91c1c; }

    .area-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    .area-title::-webkit-details-marker {
      display: none;
    }

    .area-title-main {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .area-title h3 {
      margin: 0;
      font-size: 20px;
    }

    .area-group.fresh .area-title h3,
    .field-card.fresh .field-name h3 a {
      color: #166534;
    }

    .area-group.warm .area-title h3,
    .field-card.warm .field-name h3 a {
      color: #9a3412;
    }

    .area-group.old .area-title h3,
    .field-card.old .field-name h3 a {
      color: #991b1b;
    }

    .field-name h3 a {
      text-decoration: none;
    }

    .field-name h3 a:hover {
      text-decoration: underline;
    }

    .area-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .area-badge.fresh { background: #ecfdf5; color: #166534; }
    .area-badge.warm { background: #fff7ed; color: #9a3412; }
    .area-badge.old { background: #fef2f2; color: #991b1b; }

    .area-sub {
      color: #6b7280;
      font-size: 12px;
      white-space: nowrap;
    }

    .field-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    
      .period-card {
        margin: 16px 0;
        padding: 14px;
      }
    
      .period-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 10px;
        align-items: end;
      }
    
      .period-summary {
        margin-top: 10px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }
    
      .period-summary-card {
        padding: 12px 14px;
        border-radius: 14px;
        background: #f8fafc;
        border: 1px solid #e5e7eb;
      }
    
      .period-summary-label {
        font-size: 12px;
        color: #6b7280;
        margin-bottom: 6px;
      }
    
      .period-summary-value {
        font-size: 26px;
        font-weight: 700;
        line-height: 1;
      }
    
      .period-summary-sub {
        margin-top: 4px;
        font-size: 12px;
        color: #6b7280;
      }

    .field-card {
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      background: #fbfbfa;
      border-left: 6px solid #d1d5db;
    }

    .field-card.fresh { border-left-color: #2f855a; }
    .field-card.warm { border-left-color: #c05621; }
    .field-card.old { border-left-color: #b91c1c; }

    .field-main {
      min-width: 240px;
      flex: 1 1 340px;
    }

    .field-name {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }

    .field-name h3 {
      margin: 0;
      font-size: 18px;
    }

    .field-area {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 700;
    }

    .field-area.fresh { background: #ecfdf5; color: #166534; }
    .field-area.warm { background: #fff7ed; color: #9a3412; }
    .field-area.old { background: #fef2f2; color: #991b1b; }

    .area-text {
      color: #6b7280;
      font-size: 12px;
      white-space: nowrap;
    }

    .field-meta {
      display: grid;
      gap: 8px;
      font-size: 13px;
      color: #374151;
    }

    .field-meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill-date { background: #eff6ff; color: #1d4ed8; }
    .pill-gap { background: #fef3c7; color: #92400e; }
    .pill-count { background: #ecfdf5; color: #166534; }

    .age-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      width: fit-content;
    }

    .age-chip.fresh { background: #ecfdf5; color: #166534; }
    .age-chip.warm { background: #fff7ed; color: #9a3412; }
    .age-chip.old { background: #fef2f2; color: #991b1b; }

    .field-link {
      align-self: center;
      white-space: nowrap;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .log-scroll {
      max-height: 66vh;
      overflow: auto;
      border-top: 1px solid #e5e7eb;
      border-radius: 0 0 16px 16px;
    }

    .log-table {
      width: 100%;
      min-width: 1100px;
      border-collapse: collapse;
    }

    .log-table th,
    .log-table td {
      border-bottom: 1px solid #e5e7eb;
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 0.95em;
    }

    .log-table th {
      background: #f9fafb;
      font-weight: 700;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .sort-header-btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      padding: 0;
      border: 0;
      background: transparent;
      font: inherit;
      font-weight: 700;
      color: inherit;
      cursor: pointer;
    }

    .sort-header-btn:hover {
      text-decoration: underline;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 12px;
      white-space: nowrap;
    }

    .badge-rotary { background: #ecfdf5; color: #166534; }
    .badge-subsoiler { background: #eff6ff; color: #1d4ed8; }

    .sub-note {
      color: #6b7280;
      font-size: 12px;
      margin-top: 2px;
      line-height: 1.5;
    }

    .empty-state {
      padding: 20px;
      color: #6b7280;
      text-align: center;
    }

    @media (max-width: 640px) {
      .page-wrap { padding: 10px 12px 20px; }
      .hero-title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div id="page-area" style="display:none;">
    <div class="page-wrap">
      <div class="hero-card">
        <h1 class="hero-title">土づくり・耕起一覧</h1>
        <p class="hero-copy">いつ、どの圃場を耕うんしたかを時系列で確認できます。圃場ごとの最終耕うん日と、前回から何日空いたかを並べて見られるようにしています。</p>
      </div>
      
        <div class="card period-card">
          <div class="period-grid">
            <div class="form-field">
              <label for="period-start">開始日</label>
              <input id="period-start" type="date" class="form-input">
            </div>
            <div class="form-field">
              <label for="period-end">終了日</label>
              <input id="period-end" type="date" class="form-input">
            </div>
            <div class="form-field">
              <button id="period-reset" class="secondary-btn" type="button">期間をクリア</button>
            </div>
          </div>
        
          <div class="period-summary">
            <div class="period-summary-card">
              <div class="period-summary-label">期間内の延べ耕うん面積</div>
              <div class="period-summary-value" id="period-area-total">0.00反</div>
              <div class="period-summary-sub" id="period-area-count">0件の耕うん記録</div>
            </div>
            <div class="period-summary-card">
              <div class="period-summary-label">対象圃場</div>
              <div class="period-summary-value" id="period-field-count">0</div>
              <div class="period-summary-sub">期間内に1回以上耕うんした圃場数</div>
            </div>
          </div>
        </div>

      <div class="content-grid">
        <section>
          <h2 class="page-title" style="font-size:20px; margin-bottom:10px;">エリアごとの最終耕うん</h2>
          <div id="area-list" class="area-list"></div>
        </section>

        <section class="log-card">
          <div style="padding:14px 14px 0;">
            <h2 class="page-title" style="font-size:20px; margin-bottom:6px;">記録一覧</h2>
            <p style="margin:0 0 10px; color:#6b7280;">前回の耕うんから何日空いたかを見ながら並べています。</p>
          </div>
          <div class="table-wrap log-scroll">
            <table class="log-table">
              <thead>
                <tr>
                  <th><button id="date-sort-header" class="sort-header-btn" type="button">日付</button></th>
                  <th>圃場</th>
                  <th>区分</th>
                  <th><button id="gap-sort-header" class="sort-header-btn" type="button">前回から</button></th>
                  <th>深さ</th>
                  <th>速度</th>
                  <th>機械</th>
                  <th>作業者</th>
                  <th>備考</th>
                </tr>
              </thead>
              <tbody id="log-body"></tbody>
            </table>
          </div>
        </section>

        <div style="display:flex; justify-content:flex-start;">
          <a id="tillage-back-btn" href="/field/tillage/index.html" class="secondary-btn">耕起ログへ戻る</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./list.js"></script>
</body>
</html>
