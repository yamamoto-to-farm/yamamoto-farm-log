<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>除草・草刈り記録一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <link rel="stylesheet" href="/common/filter.css?v=1">
  <style>
    body {
      background: linear-gradient(180deg, #f7f7f2 0%, #ffffff 28%);
    }

    .page-wrap {
      max-width: 1260px;
      margin: 0 auto;
      padding: 12px 16px 28px;
    }

    .hero-card,
    .list-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .hero-card {
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .hero-title {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .hero-copy {
      margin: 0;
      color: #4b5563;
      line-height: 1.7;
    }

    .mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0 8px;
    }

    .spray-view-row {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin: 6px 0 8px;
    }

    .spray-view-row.active {
      display: flex;
    }

    .mode-btn {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 8px 14px;
      background: #fff;
      color: #374151;
      cursor: pointer;
      font-weight: 700;
    }

    .mode-btn.active {
      border-color: #0f766e;
      background: #ccfbf1;
      color: #115e59;
    }

    .submode-btn {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 6px 12px;
      background: #fff;
      color: #374151;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    .submode-btn.active {
      border-color: #0f766e;
      background: #ecfeff;
      color: #155e75;
    }

    .meta-note {
      color: #6b7280;
      font-size: 13px;
      margin-top: 6px;
    }

    .period-card {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #f8fafc;
    }

    .period-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .summary-row {
      margin-top: 10px;
      color: #6b7280;
      font-size: 13px;
    }

    .filter-card {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .summary-row strong {
      color: #1f2937;
    }

    .list-card {
      overflow-x: auto;
      padding: 10px;
    }

    .weed-table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .weed-table th,
    .weed-table td {
      border-bottom: 1px solid #e5e7eb;
      padding: 9px 8px;
      font-size: 14px;
      text-align: left;
      vertical-align: top;
      word-break: break-word;
    }

    .weed-table th {
      background: #f8fafc;
      color: #475569;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .recent-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .recent-badge.fresh {
      background: #ecfdf5;
      color: #166534;
    }

    .recent-badge.warm {
      background: #fff7ed;
      color: #9a3412;
    }

    .recent-badge.old {
      background: #fef2f2;
      color: #991b1b;
    }

    .empty-box {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div id="page-area" class="page-wrap" style="display:none;">
    <section class="hero-card">
      <h1 class="hero-title">除草・草刈り記録一覧</h1>
      <p class="hero-copy">土づくり一覧と同じ見え方で、除草剤散布と草刈りを切り替えて確認できます。</p>

      <div class="mode-row">
        <button id="mode-spray" class="mode-btn" type="button">除草剤散布</button>
        <button id="mode-mowing" class="mode-btn" type="button">草刈り</button>
      </div>

      <div id="spray-view-row" class="spray-view-row">
        <button id="spray-view-aggregate" class="submode-btn" type="button">集約表示</button>
        <button id="spray-view-field" class="submode-btn" type="button">圃場別表示</button>
      </div>

      <div id="mode-note" class="meta-note"></div>

      <div class="period-card">
        <div class="period-grid">
          <div class="form-field">
            <label for="period-start">開始日</label>
            <input id="period-start" type="date" class="form-input">
          </div>
          <div class="form-field">
            <label for="period-end">終了日</label>
            <input id="period-end" type="date" class="form-input">
          </div>
          <div class="form-field">
            <button id="period-reset" class="secondary-btn" type="button">期間リセット</button>
          </div>
        </div>
        <div id="period-summary" class="summary-row"></div>
      </div>

      <div class="filter-card">
        <div class="filter-grid">
          <div class="form-field">
            <label>圃場フィルタ</label>
            <button id="open-field-modal" class="primary-btn" type="button">圃場を選択</button>
            <div id="activeFieldFilters" style="margin-top:8px;"></div>
          </div>
          <div class="form-field">
            <label for="filter-method">方式フィルタ</label>
            <select id="filter-method" class="form-input">
              <option value="">方式を選択（全件）</option>
            </select>
          </div>
          <div class="form-field">
            <label for="filter-keyword">キーワード</label>
            <input id="filter-keyword" class="form-input" placeholder="作業者・備考など">
          </div>
          <div class="form-field">
            <button id="filter-reset" class="secondary-btn" type="button">絞り込みリセット</button>
          </div>
        </div>
      </div>
    </section>

    <div id="weeding-container"></div>
  </div>

  <div id="modal-container"></div>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js?v=1";
    import { renderHeader } from "/common/header.js";
    import { initWeedingList } from "./list.js?v=1";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) {
        return;
      }

      renderHeader();
      document.getElementById("page-area").style.display = "block";
      initWeedingList();
    });
  </script>

</body>
</html>
