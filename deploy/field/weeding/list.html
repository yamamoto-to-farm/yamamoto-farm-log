<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>除草・草刈り記録一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <link rel="stylesheet" href="/common/filter.css?v=1">
  <style>
    body {
      background: linear-gradient(180deg, #f7f7f2 0%, #ffffff 28%);
    }

    .page-wrap {
      max-width: 1260px;
      margin: 0 auto;
      padding: 12px 16px 28px;
    }

    .hero-card,
    .list-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .hero-card {
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .hero-title {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .hero-copy {
      margin: 0;
      color: #4b5563;
      line-height: 1.7;
    }

    .mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0 8px;
    }

    .spray-view-row {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin: 6px 0 8px;
    }

    .spray-view-row.active {
      display: flex;
    }

    .mode-btn {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 8px 14px;
      background: #fff;
      color: #374151;
      cursor: pointer;
      font-weight: 700;
    }

    .mode-btn.active {
      border-color: #0f766e;
      background: #ccfbf1;
      color: #115e59;
    }

    .submode-btn {
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 6px 12px;
      background: #fff;
      color: #374151;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    .submode-btn.active {
      border-color: #0f766e;
      background: #ecfeff;
      color: #155e75;
    }

    .meta-note {
      color: #6b7280;
      font-size: 13px;
      margin-top: 6px;
    }

    .period-card {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #f8fafc;
    }

    .period-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .summary-row {
      margin-top: 10px;
      color: #6b7280;
      font-size: 13px;
    }

    .spray-metrics {
      display: none;
      margin-top: 10px;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    }

    .spray-metrics.active {
      display: grid;
    }

    .metric-card {
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #ffffff;
    }

    .metric-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 700;
      color: #1f2937;
    }

    .pesticide-summary {
      display: none;
      margin-top: 8px;
      color: #475569;
      font-size: 13px;
      line-height: 1.6;
    }

    .pesticide-summary.active {
      display: block;
    }

    .filter-card {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      align-items: end;
    }

    .summary-row strong {
      color: #1f2937;
    }

    .list-card {
      margin-top: 12px;
      overflow: hidden;
      padding: 0;
    }

    .list-head {
      padding: 14px 14px 0;
    }

    .list-head h2 {
      margin: 0;
      font-size: 20px;
    }

    .list-head p {
      margin: 6px 0 10px;
      color: #6b7280;
      font-size: 13px;
    }

    .log-scroll {
      max-height: min(68vh, 760px);
      overflow: auto;
      padding: 0 10px 10px;
    }

    .weed-table {
      width: 100%;
      min-width: 860px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .weed-table th,
    .weed-table td {
      border-bottom: 1px solid #e5e7eb;
      padding: 9px 8px;
      font-size: 14px;
      text-align: left;
      vertical-align: top;
      word-break: break-word;
    }

    .weed-table th {
      background: #f8fafc;
      color: #475569;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .recent-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .recent-badge.fresh {
      background: #ecfdf5;
      color: #166534;
    }

    .recent-badge.warm {
      background: #fff7ed;
      color: #9a3412;
    }

    .recent-badge.old {
      background: #fef2f2;
      color: #991b1b;
    }

    .empty-box {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      color: #6b7280;
    }

    .area-card {
      margin-bottom: 16px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      padding: 12px;
    }

    .area-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .area-sort-wrap {
      min-width: 180px;
    }

    .area-list {
      display: grid;
      gap: 12px;
    }

    .area-group {
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #fff;
    }

    .area-group.in-period { border-left: 6px solid #2f855a; }
    .area-group.out-period { border-left: 6px solid #c05621; }
    .area-group.no-record { border-left: 6px solid #9ca3af; }

    .area-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    .area-title::-webkit-details-marker {
      display: none;
    }

    .area-title-main {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .area-title h3 {
      margin: 0;
      font-size: 20px;
    }

    .area-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .area-badge.in-period { background: #ecfdf5; color: #166534; }
    .area-badge.out-period { background: #fff7ed; color: #9a3412; }
    .area-badge.no-record { background: #f3f4f6; color: #4b5563; }

    .area-sub {
      color: #6b7280;
      font-size: 12px;
      white-space: nowrap;
    }

    .field-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .field-card {
      display: grid;
      gap: 6px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #fbfbfa;
      border-left: 6px solid #d1d5db;
    }

    .field-card.in-period { border-left-color: #2f855a; }
    .field-card.out-period { border-left-color: #c05621; }
    .field-card.no-record { border-left-color: #9ca3af; }

    .field-name {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .field-name h4 {
      margin: 0;
      font-size: 17px;
    }

    .field-name h4 a {
      text-decoration: none;
    }

    .field-name h4 a:hover {
      text-decoration: underline;
    }

    .field-area {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 700;
    }

    .field-area.in-period { background: #ecfdf5; color: #166534; }
    .field-area.out-period { background: #fff7ed; color: #9a3412; }
    .field-area.no-record { background: #f3f4f6; color: #4b5563; }

    .status-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .status-chip.in-period { background: #ecfdf5; color: #166534; }
    .status-chip.out-period { background: #fff7ed; color: #9a3412; }
    .status-chip.no-record { background: #f3f4f6; color: #4b5563; }

    .field-meta {
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: #374151;
    }

    .field-meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      white-space: nowrap;
    }

    .pill-date { background: #eff6ff; color: #1d4ed8; }
    .pill-count { background: #ecfdf5; color: #166534; }
    .pill-out { background: #fff7ed; color: #9a3412; }

    .age-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      font-weight: 700;
      width: fit-content;
    }

    .age-chip.in-period { background: #ecfdf5; color: #166534; }
    .age-chip.out-period { background: #fff7ed; color: #9a3412; }
    .age-chip.no-record { background: #f3f4f6; color: #4b5563; }

    @media (max-width: 640px) {
      .area-head {
        flex-direction: column;
        align-items: stretch;
      }
      .area-sort-wrap {
        min-width: 0;
      }
      .log-scroll {
        max-height: 62vh;
        padding: 0 8px 8px;
      }
    }
  </style>
</head>
<body>

  <div id="page-area" class="page-wrap" style="display:none;">
    <section class="hero-card">
      <h1 class="hero-title">除草・草刈り記録一覧</h1>
      <p class="hero-copy">土づくり一覧と同じ見え方で、除草剤散布と草刈りを切り替えて確認できます。</p>

      <div class="mode-row">
        <button id="mode-spray" class="mode-btn" type="button">除草剤散布</button>
        <button id="mode-mowing" class="mode-btn" type="button">草刈り</button>
      </div>

      <div id="mode-note" class="meta-note"></div>

      <div class="period-card">
        <div class="period-grid">
          <div class="form-field">
            <label for="period-start">開始日</label>
            <input id="period-start" type="date" class="form-input">
          </div>
          <div class="form-field">
            <label for="period-end">終了日</label>
            <input id="period-end" type="date" class="form-input">
          </div>
          <div class="form-field">
            <button id="period-reset" class="secondary-btn" type="button">期間をクリア</button>
          </div>
        </div>
        <div id="period-summary" class="summary-row"></div>
        <div id="spray-metrics" class="spray-metrics">
          <div class="metric-card">
            <div class="metric-label">期間内作業面積</div>
            <div id="metric-area-total" class="metric-value">-</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">期間内散布液量</div>
            <div id="metric-water-total" class="metric-value">-</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">平均散布量（10a換算）</div>
            <div id="metric-per10a" class="metric-value">-</div>
          </div>
        </div>
        <div id="pesticide-summary" class="pesticide-summary"></div>
      </div>

      <div class="filter-card">
        <div class="filter-grid">
          <div class="form-field">
            <label>圃場フィルタ</label>
            <button id="open-field-modal" class="primary-btn" type="button">圃場を選択</button>
            <div id="activeFieldFilters" style="margin-top:8px;"></div>
          </div>
          <div class="form-field">
            <label for="filter-method">方式フィルタ</label>
            <select id="filter-method" class="form-input">
              <option value="">方式を選択（全件）</option>
            </select>
          </div>
          <div class="form-field">
            <label for="filter-pesticide">使用農薬フィルタ</label>
            <select id="filter-pesticide" class="form-input">
              <option value="">農薬を選択（全件）</option>
            </select>
          </div>
          <div class="form-field">
            <label for="filter-keyword">キーワード</label>
            <input id="filter-keyword" class="form-input" placeholder="作業者・備考など">
          </div>
          <div class="form-field">
            <button id="filter-reset" class="secondary-btn" type="button">絞り込みリセット</button>
          </div>
        </div>
      </div>
    </section>

    <section class="area-card">
      <div class="area-head">
        <h2 class="page-title" style="font-size:20px; margin:0;">エリアごとの最終作業</h2>
        <div class="form-field area-sort-wrap">
          <label for="area-sort">並び順</label>
          <select id="area-sort" class="form-input">
            <option value="new">新しい順</option>
            <option value="old">古い順</option>
          </select>
        </div>
      </div>
      <div id="weeding-area-list" class="area-list"></div>
    </section>

    <div id="weeding-container"></div>

    <div class="back-action-slot">
      <button id="weeding-back-btn" class="secondary-btn unified-back-btn" type="button">元のページへ戻る</button>
    </div>
  </div>

  <div id="modal-container"></div>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js?v=1";
    import { renderHeader } from "/common/header.js";
    import { initWeedingList } from "./list.js?v=1";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) {
        return;
      }

      renderHeader();
      document.getElementById("page-area").style.display = "block";
      initWeedingList();
    });
  </script>

  <script src="/common/sw-register.js?v=20260713-1"></script>
</body>
</html>
