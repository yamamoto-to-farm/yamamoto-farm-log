<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>中耕・畝立てログ - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <link rel="stylesheet" href="/common/filter.css?v=1">
</head>

<body>

  <div class="page-container" id="mode-area" style="display:none;">
    <h1 class="page-title">作業を選択</h1>
    <div class="card">
      <p style="margin-top:0; color:#555;">中耕ログまたは畝立てログを選択してください。</p>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button id="go-intertill" class="primary-btn" type="button">中耕ログへ</button>
        <button id="go-bedmaking" class="primary-btn" type="button">畝立てログへ</button>
      </div>
    </div>
  </div>

  <div class="page-container" id="form-area" style="display:none;">

    <h1 class="page-title" id="page-title">作業ログ</h1>

    <h2 class="section-title">作業日</h2>
    <div class="card">
      <input type="date" id="date" class="form-input">
    </div>

    <h2 class="section-title">作業内容</h2>
    <div class="card">
      <div class="form-field">
        <label id="task-label" for="task-select">アタッチメント</label>
        <select id="task-select" class="form-input"></select>
      </div>

      <div class="form-field" id="ridge-width-field" style="margin-top:10px;">
        <label for="ridge-width-cm">畝幅（cm）</label>
        <input type="number" id="ridge-width-cm" class="form-input" inputmode="decimal" placeholder="例：120">
      </div>

      <div class="form-field" id="ridge-height-field" style="margin-top:10px;">
        <label for="ridge-height-cm">畝高（cm）</label>
        <input type="number" id="ridge-height-cm" class="form-input" inputmode="decimal" placeholder="例：20">
      </div>

      <div class="form-field" id="ridge-count-field" style="margin-top:10px;">
        <label for="ridge-count">畝数</label>
        <input type="number" id="ridge-count" class="form-input" inputmode="numeric" min="1" placeholder="例：8">
      </div>
    </div>

    <h2 class="section-title">圃場</h2>
    <div class="card">
      <button id="open-field-modal" class="filter-open-btn" data-type="field" type="button">圃場を選択</button>
      <div id="activeFieldFilters" style="margin-top:10px;"></div>
      <div id="field-area-total" style="margin-top:10px; font-weight:bold; color:#444;">
        合計面積：0 a
      </div>
    </div>

    <h2 class="section-title">同時施肥</h2>
    <div class="card">
      <label style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" id="with-fertilizer">
        作業と同時に施肥した
      </label>

      <div id="fertilizer-area" style="display:none; margin-top:12px;">
        <button id="open-fertilizer-modal" class="filter-open-btn" data-type="fertilizer" type="button">肥料を選択</button>
        <div id="activeFertilizerFilters" style="margin-top:10px;"></div>

        <div style="margin-top:10px;">
          <div id="fertilizer-input-area">
            <p style="color:#777;">肥料を選択すると入力欄が表示されます</p>
          </div>
        </div>
      </div>
    </div>

    <h2 class="section-title">作業者</h2>
    <div class="card" id="workers_box"></div>

    <div class="card">
      <label for="temp_workers">単発バイト（カンマ区切り）</label>
      <input id="temp_workers" class="form-input" placeholder="例：佐藤さん, 田中さん">
    </div>

    <h2 class="section-title">備考</h2>
    <div class="card">
      <textarea id="notes" class="form-textarea"></textarea>
    </div>

    <button id="save-btn" class="primary-btn">保存</button>
  </div>

  <div id="modal-container"></div>

  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("modal-container").innerHTML = html;
      });
  </script>

  <script type="module" src="/common/summary.js?v=1"></script>
  <script type="module" src="/common/save/index.js?v=1"></script>

  <script type="module" src="/common/filter/filter-core.js?v=1"></script>
  <script type="module" src="/common/filter/filter-field.js?v=1"></script>
  <script type="module" src="/common/filter/filter-fertilizer.js?v=1"></script>
  <script type="module" src="/common/filter/filter-active.js?v=1"></script>
  <script type="module" src="/fertilizer/fertilizer-multi-input.js?v=1"></script>

  <script type="module">
    import { verifyLocalAuth, createWorkerCheckboxes } from "/common/ui.js?v=1";
    import { renderHeader } from "/common/header.js?v=1";
    import { initSoilWorkPage } from "./soil-work.js?v=1";

    window.addEventListener("DOMContentLoaded", async () => {
      if (!await verifyLocalAuth()) return;

      renderHeader();

      await createWorkerCheckboxes("workers_box");

      const params = new URLSearchParams(location.search);
      window.__soil_work_machine = params.get("machine") || "machine1";

      document.getElementById("date").value =
        new Date().toISOString().slice(0, 10);

      await initSoilWorkPage();
    });
  </script>

  <script src="/common/sw-register.js?v=20260713-1"></script>
</body>

</html>
