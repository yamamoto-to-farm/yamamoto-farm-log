<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>播種・定植一覧 - 山本農園</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- 共通CSS -->
    <link rel="stylesheet" href="../common/style.css?v=1">

    <!-- Papaparse -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

    <!-- ===============================
       ★ ヘッダー（header.js が自動挿入）
  =============================== -->

    <div id="page-area" style="display:none;">

        <!-- ★ ページタイトル -->
        <h1 class="page-title">播種・定植一覧</h1>

        <!-- モード切り替え -->
        <div id="mode-switch" class="mode-switch">
            <button data-mode="planting" id="btn-planting">定植ベース</button>
            <button data-mode="seed" id="btn-seed">播種ベース</button>
        </div>

        <!-- フィルタカード -->
        <div id="filter-card" class="filter-card"></div>

        <!-- 選択中フィルタ -->
        <div id="activeFilters" class="active-filters"></div>

        <!-- 一覧テーブル -->
        <table id="plantingTable" class="list-table"></table>

        <!-- モーダル -->
        <div id="modal-container"></div>
    </div>

    <!-- save-modal 読み込み（一覧でも使える） -->
    <script>
        fetch("/common/save-modal.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("modal-container").innerHTML = html;
            });
    </script>

    <!-- save-modal.js -->
    <script type="module" src="/common/save-modal.js"></script>

    <!-- ===============================
       ▼ 認証 → ヘッダー挿入 → 初期化
  =============================== -->
    <script type="module">
        import { verifyLocalAuth } from "/common/ui.js";
        import { renderHeader } from "/common/header.js";
        import { initListPage } from "./list.js";

        window.addEventListener("DOMContentLoaded", async () => {
            const ok = await verifyLocalAuth();
            if (!ok) return;

            // ヘッダー描画
            renderHeader();

            // ページ表示
            document.getElementById("page-area").style.display = "block";

            // 一覧ページ初期化
            initListPage();
        });
    </script>

    <!-- 一覧ロジック（通常スクリプト） -->
    <script src="plantingList.js"></script>
    <script src="seedList.js"></script>

    <!-- list.js だけ module -->
    <script type="module" src="list.js"></script>

</body>

</html>
