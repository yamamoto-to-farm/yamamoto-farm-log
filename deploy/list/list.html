<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>播種・定植一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通 CSS -->
  <link rel="stylesheet" href="/common/css/main.css?v=1">
  <link rel="stylesheet" href="/common/filter.css?v=1">

  <!-- フィルタ UI 共通 CSS -->

  <!-- 一覧ページ専用 CSS（定植・播種共通の印刷設定など） -->

  <!-- 播種一覧専用 CSS（列幅など） -->

  <style>
    body {
      background: linear-gradient(180deg, #f7f7f2 0%, #ffffff 28%);
    }

    .page-wrap {
      max-width: 1420px;
      margin: 0 auto;
      padding: 12px 16px 28px;
    }

    .hero-card,
    .summary-card,
    .list-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .hero-card {
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .hero-title {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .hero-copy {
      margin: 0;
      color: #4b5563;
      line-height: 1.7;
    }

    .list-shell {
      display: grid;
      gap: 12px;
    }

    .summary-card {
      padding: 12px;
      background: #f8fafc;
    }

    .mode-switch-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 10px;
    }

    .summary-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      margin-top: 10px;
    }

    .filter-summary-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(340px, 0.85fr);
      gap: 10px;
      align-items: start;
    }

    .filter-column {
      min-width: 0;
    }

    .summary-column {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      min-width: 0;
      align-content: start;
      width: 100%;
    }

    .metric-card {
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #fff;
    }

    .metric-label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 700;
      color: #1f2937;
      line-height: 1.1;
    }

    .filter-card {
      margin-top: 10px;
      padding: 6px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #ffffff;
      max-width: 620px;
      width: 100%;
      margin-right: auto;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 2px;
      align-items: end;
    }

    .filter-grid .form-field {
      margin-bottom: 0;
    }

    .filter-grid .form-field label {
      margin-bottom: 3px;
      font-size: 13px;
    }

    .filter-grid .filter-open-btn {
      padding-left: 12px;
      padding-right: 12px;
    }

    .list-card {
      margin-top: 12px;
      overflow: hidden;
      padding: 0;
    }

    .list-head {
      padding: 14px 14px 0;
    }

    .list-head h2 {
      margin: 0;
      font-size: 20px;
    }

    .list-head p {
      margin: 6px 0 10px;
      color: #6b7280;
      font-size: 13px;
    }

    .log-scroll {
      max-height: min(68vh, 760px);
      overflow: auto;
      padding: 0 10px 10px;
    }

    .log-scroll table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
      background: #fff;
    }

    body[data-list-mode="planting"] .log-scroll table {
      min-width: 1260px;
    }

    body[data-list-mode="seed"] .log-scroll table {
      min-width: 1040px;
    }

    body[data-list-mode="planting"] .log-scroll th:nth-child(1),
    body[data-list-mode="planting"] .log-scroll td:nth-child(1) {
      width: 110px;
    }

    body[data-list-mode="planting"] .log-scroll th:nth-child(2),
    body[data-list-mode="planting"] .log-scroll td:nth-child(2) {
      width: 165px;
    }

    body[data-list-mode="planting"] .log-scroll th:nth-child(3),
    body[data-list-mode="planting"] .log-scroll td:nth-child(3) {
      width: 165px;
    }

    body[data-list-mode="planting"] .log-scroll th:nth-child(4),
    body[data-list-mode="planting"] .log-scroll td:nth-child(4) {
      width: 88px;
    }

    body[data-list-mode="planting"] .log-scroll th:nth-child(5),
    body[data-list-mode="planting"] .log-scroll td:nth-child(5) {
      width: 110px;
    }

    body[data-list-mode="planting"] .log-scroll th:nth-child(6),
    body[data-list-mode="planting"] .log-scroll td:nth-child(6),
    body[data-list-mode="planting"] .log-scroll th:nth-child(7),
    body[data-list-mode="planting"] .log-scroll td:nth-child(7) {
      width: 130px;
    }

    .log-scroll th,
    .log-scroll td {
      border-bottom: 1px solid #e5e7eb;
      padding: 9px 8px;
      font-size: 14px;
      text-align: left;
      vertical-align: top;
      word-break: break-word;
    }

    .log-scroll th {
      background: #f8fafc;
      color: #475569;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .log-scroll tbody tr:hover {
      background: #f9fafb;
    }

    .log-scroll a {
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
    }

    .log-scroll a:hover {
      text-decoration: underline;
    }

    .log-scroll .primary-btn,
    .log-scroll .secondary-btn {
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.2;
      border-radius: 8px;
      white-space: nowrap;
    }

    .log-scroll .plant-date-cell,
    .log-scroll .seed-date-cell {
      cursor: pointer;
      color: #0f766e;
      font-weight: 700;
    }

    .log-scroll .plant-date-cell:hover,
    .log-scroll .seed-date-cell:hover {
      text-decoration: underline;
    }

    #activeFilters {
      margin: 6px 0 0;
    }

    #activeFilters .filter-open-btn {
      display: none;
    }

    #activeFilters .filter-pill-row {
      margin-top: 0;
    }

    #summary-grid {
      margin-top: 0;
      gap: 8px;
      grid-template-columns: 1fr;
    }

    #summary-grid .metric-card {
      min-height: 0;
    }

    #summaryArea {
      font-size: 16px;
      line-height: 1.4;
    }

    @media (max-width: 1024px) {
      .filter-summary-layout {
        grid-template-columns: 1fr;
      }

      .summary-column {
        grid-template-columns: 1fr;
      }

      .filter-card {
        max-width: none;
      }
    }

    @media (max-width: 720px) {
      .filter-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }
    }

    @media print {
      body * {
        visibility: hidden !important;
      }

      #print-scope,
      #print-scope * {
        visibility: visible !important;
      }

      #print-scope {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }

      .mode-switch-row,
      .filter-card .filter-open-btn,
      .back-action-slot,
      #modal-container,
      #list-back-btn,
      .hero-copy {
        display: none !important;
      }

      .hero-card,
      .list-card,
      .summary-card,
      .metric-card {
        box-shadow: none !important;
      }

      .log-scroll {
        max-height: none !important;
        overflow: visible !important;
        padding: 0 !important;
      }

      .log-scroll table {
        min-width: 0 !important;
      }

      .log-scroll th {
        position: static !important;
      }

      .log-scroll .primary-btn,
      .log-scroll .secondary-btn {
        display: none !important;
      }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

  <div id="page-area" style="display:none;">

    <div class="page-wrap">

      <section class="hero-card">
        <h1 class="page-title hero-title">播種・定植一覧</h1>
        <p class="hero-copy">播種と定植の実績を同じ条件で切り替えて確認できます。印刷時はサマリーとフィルタ後一覧のみ出力されます。</p>
      </section>

      <div id="print-scope" class="list-shell">
          <section class="summary-card">
            <div class="mode-switch-row" id="mode-switch-card">
              <button id="btn-planting" class="mode-btn" data-mode="planting" type="button">定植</button>
              <button id="btn-seed" class="mode-btn" data-mode="seed" type="button">播種</button>
            </div>

            <h2 class="section-title">フィルタ・集計</h2>
            <div class="filter-summary-layout">
              <div class="filter-column">
                <div class="filter-card">
                  <div class="filter-grid">
                    <div class="form-field">
                      <label>年月フィルタ</label>
                      <button class="filter-open-btn" data-type="year" type="button">年月を選択</button>
                    </div>
                    <div class="form-field">
                      <label>圃場フィルタ</label>
                      <button class="filter-open-btn" data-type="field" type="button">圃場を選択</button>
                    </div>
                    <div class="form-field">
                      <label>品種フィルタ</label>
                      <button class="filter-open-btn" data-type="variety" type="button">品種を選択</button>
                    </div>
                  </div>
                </div>
                <div id="activeFilters"></div>
              </div>

              <div class="summary-column">
                <div class="summary-grid" id="summary-grid">
                  <div class="metric-card">
                    <div class="metric-label">表示件数</div>
                    <div id="countArea" class="metric-value">0 件</div>
                  </div>
                  <div class="metric-card">
                    <div class="metric-label">集計</div>
                    <div id="summaryArea" class="metric-value">-</div>
                  </div>
                </div>
              </div>
            </div>

          </section>

          <section class="list-card">
            <div class="list-head">
              <h2>記録一覧</h2>
              <p>フィルタ条件で絞り込んだデータを表示しています。</p>
            </div>
            <div class="log-scroll">
              <div id="table-area"></div>
            </div>
          </section>
      </div>

      <div class="back-action-slot" style="margin-top:14px;">
        <button id="list-back-btn" class="secondary-btn unified-back-btn" type="button">元のページへ戻る</button>
      </div>

    </div>

  </div>

  <!-- モーダル -->
  <div id="modal-container"></div>

  <!-- 一覧ページのメイン JS -->
  <script type="module" src="./list.js"></script>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { initListPage } from "./list.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      renderHeader();
      document.getElementById("page-area").style.display = "block";

      initListPage();
    });
  </script>

  <script src="/common/sw-register.js?v=20260713-1"></script>
</body>
</html>
