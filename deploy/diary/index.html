<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>作業日誌</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通CSS -->
  <link rel="stylesheet" href="/common/css/main.css">

  <!-- diaryページ専用CSS -->
  <link rel="stylesheet" href="/diary/diary.css">
</head>

<body>

  <div id="header"></div>

  <div class="page-container" id="form-area" style="display:none;">
    <h1 class="page-title">作業日誌</h1>

    <!-- モード切り替え -->
    <div id="modeSwitchArea"></div>

    <!-- 日付 -->
    <h2 class="section-title">日付</h2>
    <div class="card diary-date-card">
      <div id="diaryDateNav" class="form-field">
        <button id="prevDayBtn" type="button" class="secondary-btn day-nav-btn">前日</button>
        <input type="date" id="diaryDate" class="form-input">
        <button id="nextDayBtn" type="button" class="secondary-btn day-nav-btn">翌日</button>
      </div>
    </div>

    <!-- 天気カード -->
    <h2 class="section-title">天気</h2>
    <div id="weatherBox">
      <p>日付を選択すると天気が表示されます。</p>
    </div>

    <!-- 作業ログ一覧（折りたたみ対応） -->
    <h2 id="workListTitle" class="collapse-title print-hide">作業ログ一覧</h2>
    <div id="workList" class="collapse-content card print-keep-collapsed print-hide">
      <p>日付を選択すると作業一覧が表示されます。</p>
    </div>

    <!-- 作業内容（スクロール領域） -->
    <h2 class="section-title">作業内容</h2>

    <div id="workContentWrapper">
      <div id="editWorkArea"></div>
    </div>

    <!-- 保存ボタン -->
    <button id="saveDiaryBtn" class="btn-primary">保存</button>

  </div>

  <!-- JS -->
  <script type="module" src="/common/collapse.js"></script>

  <script type="module" src="/diary/work-summary.js"></script>
  <script type="module" src="/diary/editCard.js"></script>
  <script type="module" src="/diary/viewCard.js"></script>
  <script type="module" src="/diary/weather-box.js"></script>
  <script type="module" src="/diary/loadDiary.js"></script>
  <script type="module" src="/diary/diary.js"></script>

</body>
</html>
