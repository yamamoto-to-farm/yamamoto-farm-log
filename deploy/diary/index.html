<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>作業日誌</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通CSS -->
  <link rel="stylesheet" href="/common/css/main.css">

  <!-- diaryページ専用CSS -->
  <link rel="stylesheet" href="/diary/diary.css">
</head>

<body>

  <div id="header"></div>
  <aside id="diaryMonthMini" class="diary-month-dock" aria-live="polite"></aside>

  <div class="page-container" id="form-area" style="display:none;">
    <h1 class="page-title">作業日誌</h1>

    <!-- 検索（折りたたみ） -->
    <h2 id="diarySearchTitle" class="collapse-title print-hide">検索</h2>
    <div id="diarySearchPanel" class="collapse-content card print-hide">
      <div class="diary-search-bar">
        <input id="diarySearchInput" class="form-input diary-search-input" type="search" placeholder="作業者・圃場・作業種別で検索">
        <button id="diarySearchBtn" type="button" class="secondary-btn">検索</button>
        <button id="diarySearchClearBtn" type="button" class="secondary-btn">クリア</button>
      </div>
      <div id="diarySearchSummary" class="diary-search-summary" style="display:none;"></div>
      <div id="diarySearchResults" class="card diary-search-results" style="display:none;"></div>
      <div id="diarySearchMoreArea" class="diary-search-more-area" style="display:none;"></div>
    </div>

    <!-- モード切り替え -->
    <div id="modeSwitchArea"></div>

    <!-- 日付 -->
    <h2 id="diaryDateTitle" class="section-title">日付</h2>
    <div class="diary-date-card">
      <div id="diaryDateNav" class="form-field">
        <button id="prevDayBtn" type="button" class="secondary-btn day-nav-btn">前日</button>
        <input type="date" id="diaryDate" class="form-input">
        <button id="todayBtn" type="button" class="secondary-btn day-nav-btn">今日</button>
        <button id="nextDayBtn" type="button" class="secondary-btn day-nav-btn">翌日</button>
      </div>
    </div>

    <!-- 天気カード -->
    <h2 class="section-title">天気</h2>
    <div id="weatherBox">
      <p>日付を選択すると天気が表示されます。</p>
    </div>

    <!-- 作業ログ一覧（折りたたみ対応） -->
    <h2 id="workListTitle" class="collapse-title print-hide">作業ログ一覧</h2>
    <div id="workList" class="collapse-content card print-keep-collapsed print-hide">
      <p>日付を選択すると作業一覧が表示されます。</p>
    </div>

    <!-- 作業内容（スクロール領域） -->
    <h2 class="section-title">作業内容</h2>

    <div id="workContentWrapper">
      <div id="editWorkArea"></div>
    </div>

    <!-- 保存ボタン -->
    <button id="saveDiaryBtn" class="btn-primary">保存</button>

  </div>

  <div id="modal-container"></div>
  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("modal-container").innerHTML = html;
      });
  </script>

  <!-- JS -->
  <script type="module" src="/common/collapse.js"></script>

  <script type="module" src="/diary/work-summary.js"></script>
  <script type="module" src="/diary/editCard.js"></script>
  <script type="module" src="/diary/viewCard.js"></script>
  <script type="module" src="/diary/weather-box.js"></script>
  <script type="module" src="/diary/loadDiary.js"></script>
  <script type="module" src="/diary/diary.js?v=20260716-1"></script>

  <script src="/common/sw-register.js?v=20260713-1"></script>
</body>
</html>
