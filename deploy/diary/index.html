<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>作業日誌（編集）</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="/assets/common/css/main.css">

  <!-- diaryページ専用CSS（pagesレイヤー） -->
  <link rel="stylesheet" href="/assets/diary/diary.css">
</head>

<body>

  <div id="header"></div>

  <div class="diary-container" id="form-area" style="display:none;">

    <h1 class="page-title">作業日誌（編集）</h1>

    <!-- 日付 -->
    <h2 class="section-title">日付</h2>
    <div class="form-field">
      <input type="date" id="diaryDate" class="form-input">
    </div>

    <!-- 作業ログ一覧（自動） -->
    <h2 class="section-title">作業ログ一覧</h2>
    <div class="card" id="workList">
      <p>日付を選択すると作業一覧が表示されます。</p>
    </div>

    <!-- 作業編集カード -->
    <h2 class="section-title">作業編集</h2>
    <div id="editWorkArea"></div>

    <!-- 保存ボタン -->
    <button id="saveDiaryBtn" class="btn-primary">保存</button>

  </div>

  <!-- JS -->
  <script type="module" src="/assets/diary/work-summary.js"></script>
  <script type="module" src="/assets/diary/editCard.js"></script>
  <script type="module" src="/assets/diary/diary.js"></script>

</body>
</html>
