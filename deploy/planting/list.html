<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>播種・定植一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/common/style.css?v=1">
  <script type="module" src="list.js"></script>

  <style>
    .filter-open {
      cursor: pointer;
      margin-top: 12px;
      user-select: none;
    }

    /* activeFilters */
    #activeFilters {
      margin: 10px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .filter-tag {
      background: #e8f2ff;
      border: 1px solid #4da3ff;
      padding: 4px 10px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-tag-remove {
      cursor: pointer;
      font-weight: bold;
      color: #4da3ff;
    }

    .filter-reset-btn {
      margin-left: 10px;
      padding: 4px 10px;
      background: #ddd;
      border-radius: 6px;
      cursor: pointer;
      border: none;
    }
  </style>
</head>

<body>

  <h1 class="page-title">播種・定植一覧</h1>

  <!-- 現在のフィルタ（filter.js が描画） -->
  <div id="activeFilters"></div>

  <!-- フィルタカード -->
  <div class="card" id="filter-card">
    <h2 class="section-title">フィルタ</h2>

    <h3 class="section-title filter-open" data-type="year">▶ 年月</h3>
    <h3 class="section-title filter-open" data-type="field">▶ 圃場</h3>
    <h3 class="section-title filter-open" data-type="variety">▶ 品種</h3>
  </div>

  <!-- 件数 + 集計 -->
  <div class="card">
    <div id="countArea">0 件</div>
    <div id="summaryArea" style="margin-top:10px;"></div>
  </div>

  <!-- テーブル -->
  <table id="plantingTable">
    <thead>
      <tr>
        <th>定植日</th>
        <th>圃場</th>
        <th>品種</th>
        <th>面積(反)</th>
        <th>播種日</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- モーダル挿入領域 -->
  <div id="modal-container"></div>

</body>
</html>
