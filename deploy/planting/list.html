<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>播種・定植一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/common/style.css?v=1">

  <style>
    .filter-open-btn {
      padding: 14px 0;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>

<body>

  <div id="page-area" style="display:none;">

    <h1 class="page-title">播種・定植一覧</h1>

    <div id="activeFilters"></div>

    <div class="card" id="filter-card">
      <h2 class="section-title">フィルタ</h2>

      <div class="filter-open-btn" data-type="year">▶ 年月</div>
      <div class="filter-open-btn" data-type="field">▶ 圃場</div>
    </div>

    <div class="card">
      <div id="countArea">0 件</div>
      <div id="summaryArea" style="margin-top:10px;"></div>
    </div>

    <table id="plantingTable">
      <thead>
        <tr>
          <th>定植日</th>
          <th>圃場</th>
          <th>品種</th>
          <th>面積(反)</th>
          <th>播種日</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <div id="modal-container"></div>

  <script type="module" src="./list.js"></script>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { initPlantingListPage } from "./list.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      renderHeader();
      document.getElementById("page-area").style.display = "block";

      initPlantingListPage();
    });
  </script>

</body>
</html>
