<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>定植記録一覧</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通デザイン -->
  <link rel="stylesheet" href="/common/style.css?v=1">

  <!-- ナビバー -->
  <script type="module">
    import { renderNavbar } from "/common/header.js?v=1.1";
    renderNavbar();
  </script>

  <style>
    /* フィルタカード */
    #filter-card {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    #filter-body {
      margin-top: 12px;
      display: none;
    }
    #filter-card.open #filter-body {
      display: block;
    }

    /* 印刷時はフィルタ非表示 */
    @media print {
      #filter-card,
      .primary-btn {
        display: none;
      }
    }
  </style>
</head>

<body>

  <h1>定植ログ一覧</h1>

  <a href="index.html" class="primary-btn" style="text-align:center; display:block;">
    ＋ 新しい定植ログを追加
  </a>

  <!-- フィルタカード -->
  <div id="filter-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <strong>フィルタ</strong>
      <button class="primary-btn" style="padding:4px 10px;" onclick="toggleFilter()">開く / 閉じる</button>
    </div>

    <div id="filter-body">
      <label>年</label>
      <select id="filterYear" class="form-input"><option value="">すべて</option></select>

      <label style="margin-top:10px;">月</label>
      <select id="filterMonth" class="form-input">
        <option value="">すべて</option>
        <option value="01">1月</option>
        <option value="02">2月</option>
        <option value="03">3月</option>
        <option value="04">4月</option>
        <option value="05">5月</option>
        <option value="06">6月</option>
        <option value="07">7月</option>
        <option value="08">8月</option>
        <option value="09">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>

      <label style="margin-top:10px;">圃場</label>
      <select id="filterField" class="form-input"><option value="">すべて</option></select>

      <label style="margin-top:10px;">品名</label>
      <select id="filterVariety" class="form-input"><option value="">すべて</option></select>

      <button class="primary-btn" style="margin-top:14px;" onclick="applyFilter()">フィルタ適用</button>
    </div>
  </div>

  <div id="countArea" style="margin-top:10px; font-weight:bold;"></div>

  <table id="plantingTable">
    <thead>
      <tr>
        <th>定植日</th>
        <th>圃場</th>
        <th>品名</th>
        <th>面積（反）</th>
        <th>播種日</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- メイン処理 -->
  <script type="module" src="./list.js?v=1.0"></script>

</body>
</html>
