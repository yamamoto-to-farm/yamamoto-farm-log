<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>播種・定植一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ★ 共通デザイン -->
  <link rel="stylesheet" href="/common/style.css?v=1">
</head>

<body>

  <!-- ===============================
       ★ ヘッダー（header.js が自動挿入）
  =============================== -->

  <div id="page-area" style="display:none;">

    <!-- ★ ページタイトル（統一） -->
    <h1 class="page-title">播種・定植一覧</h1>

    <!-- ★ 現在のフィルタ（filter.js が描画） -->
    <div id="activeFilters"></div>

    <!-- ★ フィルタカード -->
    <div class="card" id="filter-card">
      <h2 class="section-title">フィルタ</h2>

      <h3 class="section-title filter-open" data-type="year">▶ 年月</h3>
      <h3 class="section-title filter-open" data-type="field">▶ 圃場</h3>
      <h3 class="section-title filter-open" data-type="variety">▶ 品種</h3>
    </div>

    <!-- 件数 + 集計 -->
    <div class="card">
      <div id="countArea">0 件</div>
      <div id="summaryArea" style="margin-top:10px;"></div>
    </div>

    <!-- テーブル -->
    <table id="plantingTable">
      <thead>
        <tr>
          <th>定植日</th>
          <th>圃場</th>
          <th>品種</th>
          <th>面積(反)</th>
          <th>播種日</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <!-- ★ モーダル挿入領域（filter.js が使用） -->
  <div id="modal-container"></div>

  <!-- list.js -->
  <script type="module" src="./list.js"></script>

  <!-- ===============================
       ▼ 認証 → ヘッダー挿入 → 初期化
  =============================== -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { initPlantingListPage } from "./list.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      // ヘッダー描画
      renderHeader();

      // ページ表示
      document.getElementById("page-area").style.display = "block";

      // ページ固有初期化
      initPlantingListPage();
    });
  </script>

</body>

</html>
