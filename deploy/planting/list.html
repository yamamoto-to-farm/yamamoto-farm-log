<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>定植ログ一覧</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 共通デザイン -->
  <link rel="stylesheet" href="/common/style.css?v=1">

  <!-- ナビバー -->
  <script type="module">
    import { renderNavbar } from "/common/header.js?v=1.1";
    renderNavbar();
  </script>

  <style>
    /* フィルタカード */
    #filter-card {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    #filter-body {
      margin-top: 12px;
      display: none;
    }
    #filter-card.open #filter-body {
      display: block;
    }

    .checkbox-group label {
      display: block;
      margin: 2px 0;
    }

    @media print {
      #filter-card,
      .primary-btn {
        display: none;
      }
    }
  </style>
</head>

<body>

  <h1>定植ログ一覧</h1>

  <a href="index.html" class="primary-btn" style="text-align:center; display:block;">
    ＋ 新しい定植ログを追加
  </a>

  <!-- フィルタカード -->
  <div id="filter-card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <strong>フィルタ</strong>
      <button class="primary-btn" style="padding:4px 10px;" onclick="toggleFilter()">開く / 閉じる</button>
    </div>

    <div id="filter-body">

      <label style="margin-top:10px;">年</label>
      <div id="filterYear" class="checkbox-group"></div>

      <label style="margin-top:10px;">月</label>
      <div id="filterMonth" class="checkbox-group"></div>

      <label style="margin-top:10px;">圃場</label>
      <div id="filterField" class="checkbox-group"></div>

      <label style="margin-top:10px;">品名</label>
      <div id="filterVariety" class="checkbox-group"></div>

      <button class="primary-btn" style="margin-top:14px;" onclick="applyFilter()">フィルタ適用</button>
    </div>
  </div>

  <div id="countArea" style="margin-top:10px; font-weight:bold;"></div>

  <table id="plantingTable">
    <thead>
      <tr>
        <th>定植日</th>
        <th>圃場</th>
        <th>品名</th>
        <th>面積（反）</th>
        <th>播種日</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- メイン処理 -->
  <script type="module" src="./list.js?v=1.1"></script>

</body>
</html>
