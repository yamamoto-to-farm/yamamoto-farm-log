<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>播種・定植一覧 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/common/style.css?v=1">
  <script type="module" src="list.js"></script>
</head>

<body>

  <!-- 認証 & ヘッダー -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      if (window.currentRole === "worker") {
        alert("このページにはアクセスできません。");
        location.href = "/";
        return;
      }

      renderHeader();
    });
  </script>

  <h1 class="page-title">播種・定植一覧</h1>

  <!-- 現在のフィルタ（カード化） -->
  <div id="activeFilters" style="display:none;"></div>

  <!-- フィルタカード -->
  <div class="card" id="filter-card">

    <h2 class="section-title">フィルタ</h2>

    <!-- ▼ 年月 -->
    <h3 class="section-title">年月</h3>
    <div id="yearTags"></div>
    <div id="monthTags"></div>

    <!-- ▼ 圃場 -->
    <h3 class="section-title">圃場</h3>
    <div id="fieldAreaTags"></div>
    <div id="fieldTags"></div>

    <!-- ▼ 品種 -->
    <h3 class="section-title">品種</h3>
    <div id="varietyTypeTags"></div>
    <div id="varietyTags"></div>

    <!-- 下部の適用・クリアは削除（filter.js が上部に生成） -->
    <div id="filter-actions" style="display:none;"></div>

  </div>

  <!-- 件数 + 集計 -->
  <div class="card">
    <div id="countArea">0 件</div>
    <div id="summaryArea" style="margin-top:10px;"></div>
  </div>

  <!-- テーブル -->
  <table id="plantingTable">
    <thead>
      <tr>
        <th>定植日</th>
        <th>圃場</th>
        <th>品種</th>
        <th>面積(反)</th>
        <th>播種日</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</body>
</html>
