<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>播種・定植一覧</title>
  <link rel="stylesheet" href="/common/style.css">
  <script type="module" src="list.js"></script>
</head>

<body>

<h1>播種・定植一覧</h1>

<div class="card" id="filter-card">

  <h2 onclick="toggleFilter()" style="cursor:pointer;">フィルタ ▼</h2>

  <div id="filter-body">

    <!-- 年月フィルタ -->
    <div class="filter-root-block" id="filterYearMonthRoot">
      <!-- JS がここに 3 階層ツリーを生成 -->
    </div>

    <!-- 圃場フィルタ -->
    <div class="filter-root-block" id="filterFieldRoot">
      <!-- JS がここに 3 階層ツリーを生成 -->
    </div>

    <!-- 品種フィルタ -->
    <div class="filter-root-block" id="filterVarietyRoot">
      <!-- JS がここに 3 階層ツリーを生成 -->
    </div>

    <button class="primary-btn" onclick="applyFilter()">フィルタ適用</button>

  </div>
</div>

<!-- 件数 + 集計 -->
<div class="card">
  <div id="countArea">0 件</div>
  <div id="summaryArea" style="margin-top:10px;"></div>
</div>

<!-- テーブル -->
<table id="plantingTable">
  <thead>
    <tr>
      <th>定植日</th>
      <th>圃場</th>
      <th>品種</th>
      <th>面積(反)</th>
      <th>播種日</th>
      <th>操作</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</body>
</html>
