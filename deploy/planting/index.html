<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>定植ログ - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ★ 共通デザイン -->
  <link rel="stylesheet" href="/common/style.css?v=1">
</head>

<body>

  <div id="form-area" style="display:none;">

    <h1>定植ログ</h1>

    <!-- 日付 -->
    <div class="form-field">
      <label for="plantDate">定植日</label>
      <input type="date" id="plantDate" class="form-input">
    </div>

    <!-- 作業者 -->
    <h2>作業者</h2>
    <div class="card" id="workers_box"></div>

    <div class="card">
      <label for="temp_workers">単発バイト（カンマ区切り）</label>
      <input id="temp_workers" class="form-input" placeholder="例：佐藤さん, 田中さん">
    </div>

    <!-- 圃場 -->
    <h2>圃場</h2>
    <div class="card">

      <label>自動判定（推定）</label>
      <input id="field_auto" class="form-input" readonly style="background:#fff3b0; font-weight:bold;">

      <label style="margin-top:10px;">
        <input type="checkbox" id="field_confirm">
        この圃場で確定する
      </label>

      <hr style="margin: 15px 0;">

      <label>エリア選択</label>
      <select id="field_area" class="form-input">
        <option value="">エリアを選択</option>
      </select>

      <label>圃場選択</label>
      <select id="field_manual" class="form-input">
        <option value="">エリアを選んでください</option>
      </select>
    </div>

    <!-- 品種 -->
    <h2>品種</h2>
    <div class="card">
      <label>種別</label>
      <select id="varietyType" class="form-input">
        <option value="">種別を選択</option>
      </select>

      <label style="margin-top:10px;">品名</label>
      <select id="variety" class="form-input">
        <option value="">種別を選んでください</option>
      </select>
    </div>

    <!-- 播種ロット -->
    <h2>播種ロット（seedRef）</h2>
    <div class="card">
      <label>選択</label>
      <select id="seedRef" class="form-input">
        <option value="">品名を選択してください</option>
      </select>

      <p>播種枚数：<span id="seedTrayCount">-</span></p>
      <p>トレイ種別：<span id="seedTrayType">-</span></p>
      <p>残り株数：<span id="remainingCount">-</span></p>
    </div>

    <!-- 植え付け量 -->
    <h2>植え付け量</h2>
    <div class="card">

      <label>セルトレイ種別</label>
      <label><input type="radio" name="trayType" value="128" checked>128穴</label>
      <label><input type="radio" name="trayType" value="200">200穴</label>

      <hr style="margin: 15px 0;">

      <label>入力方法</label>
      <label><input type="radio" name="mode" value="stock" checked> 株数で入力</label>
      <label><input type="radio" name="mode" value="tray"> セルトレイ枚数で入力</label>

      <div id="stock-input" class="form-field">
        <label>株数</label>
        <input type="number" id="stockCount" class="form-input" inputmode="numeric">
      </div>

      <div id="tray-input" class="form-field" style="display:none;">
        <label>枚数</label>
        <input type="number" id="trayCount" class="form-input" inputmode="numeric">

        <p>自動計算：<span id="calcStock">0</span> 株</p>
      </div>
    </div>

    <!-- 株間・畝間 -->
    <h2>株間・畝間</h2>
    <div class="card">
      <label>株間（cm）</label>
      <input type="number" id="spacingRow" class="form-input" value="34">

      <label>畝間（cm）</label>
      <input type="number" id="spacingBed" class="form-input" value="60">
    </div>

    <!-- 備考 -->
    <h2>備考</h2>
    <div class="card">
      <textarea id="notes" rows="3" class="form-textarea" placeholder="欠株・病害虫など"></textarea>
    </div>

    <!-- 保存 -->
    <button type="button" class="primary-btn" onclick="savePlanting()">GitHub に保存する</button>

    <!-- ★ 定植記録一覧へ -->
    <a href="list.html" class="menu-card" style="display:block; margin-top:20px; padding:12px; text-align:center;">
      ← 定植記録一覧へ
    </a>
    <!-- ▼ 必須ライブラリ（順番が重要） -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    
  </div>

  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { initPlantingPage } from "./planting.js";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      document.getElementById("form-area").style.display = "block";

      const today = new Date().toISOString().slice(0, 10);
      document.getElementById("plantDate").value = today;

      initPlantingPage();
    });
  </script>

  <script type="module" src="../common/save/index.js"></script>

  <!-- ★★★★★ 追加：共通保存モーダルの読み込み ★★★★★ -->
  <div id="modal-container"></div>
  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("modal-container").innerHTML = html;
      });
  </script>
  <!-- ★★★★★ ここまで ★★★★★ -->

</body>

</html>
