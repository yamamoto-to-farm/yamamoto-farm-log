<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>定植ログ - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ★ 共通デザイン -->
  <link rel="stylesheet" href="/common/css/main.css?v=1">

  <!-- Papaparse（1回だけ） -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

  <!-- ===============================
       ★ ヘッダー（header.js が自動挿入）
  =============================== -->

  <div class="page-container" id="form-area" style="display:none;">

    <!-- ★ ページタイトル（統一） -->
    <h1 class="page-title">定植ログ</h1>

    <!-- 日付 -->
    <h2 class="section-title">定植日</h2>
    <div class="form-field">
      <input type="date" id="plantDate" class="form-input">
    </div>

    <!-- 作業者 -->
    <h2 class="section-title">作業者</h2>
    <div class="card" id="workers_box"></div>

    <div class="card">
      <label for="temp_workers">単発バイト（カンマ区切り）</label>
      <input id="temp_workers" class="form-input" placeholder="例：佐藤さん, 田中さん">
    </div>

    <!-- 圃場 -->
    <h2 class="section-title">圃場</h2>
    <div class="card">

      <label>自動判定（推定）</label>
      <input id="field_auto" class="form-input" readonly style="background:#fff3b0; font-weight:bold;">

      <input type="checkbox" id="field_confirm" style="display:none;">
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:10px;">
        <button type="button" id="useGpsFieldBtn" class="secondary-btn" style="margin-top:0;">GPS候補を採用</button>
      </div>

      <hr style="margin: 15px 0;">

      <label>ログ保存される圃場</label>
      <input id="fieldSelectedResult" class="form-input" value="未選択" readonly style="background:#f8fafc; font-weight:600;">

      <div style="margin-top:10px;">
        <button type="button" id="openFieldModalBtn" class="primary-btn" style="margin-top:0;">圃場を選択</button>
      </div>

      <div style="display:none;">
        <select id="field_area" class="form-input">
          <option value="">エリアを選択</option>
        </select>
        <select id="field_manual" class="form-input">
          <option value="">エリアを選んでください</option>
        </select>
      </div>
    </div>

    <!-- 品種 -->
    <h2 class="section-title">品種</h2>
    <div class="card">
      <label>品種（モーダル選択）</label>
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <input id="varietyModalDisplay" class="form-input" value="未選択" readonly style="flex:1 1 260px; background:#f8fafc; font-weight:600;">
        <button type="button" id="openVarietyModalBtn" class="secondary-btn" style="margin-top:0;">品種を選択</button>
        <button type="button" id="clearVarietyModalBtn" class="secondary-btn" style="margin-top:0;">解除</button>
      </div>

      <div style="display:none;">
        <select id="varietyType" class="form-input">
          <option value="">種別を選択</option>
        </select>
        <select id="variety" class="form-input">
          <option value="">種別を選んでください</option>
        </select>
      </div>
    </div>

    <!-- 播種ロット -->
    <h2 class="section-title">播種ロット（複数選択・順位付け）</h2>
    <div class="card" id="seedRefArea"></div>

    <!-- 植え付け量 -->
    <h2 class="section-title">植え付け量</h2>
    <div class="card">

      <label>セルトレイ種別</label>
      <label><input type="radio" name="trayType" value="128" checked>128穴</label>
      <label><input type="radio" name="trayType" value="200">200穴</label>

      <hr style="margin: 15px 0;">

      <label>入力方法</label>
      <label><input type="radio" name="mode" value="stock" checked> 株数で入力</label>
      <label><input type="radio" name="mode" value="tray"> セルトレイ枚数で入力</label>

      <div id="stock-input" class="form-field">
        <label>株数</label>
        <input type="number" id="stockCount" class="form-input" inputmode="numeric">
      </div>

      <div id="tray-input" class="form-field" style="display:none;">
        <label>枚数</label>
        <input type="number" id="trayCount" class="form-input" inputmode="numeric">

        <p>自動計算：<span id="calcStock">0</span> 株</p>
      </div>
    </div>

    <!-- 株間・畝間 -->
    <h2 class="section-title">株間・畝間</h2>
    <div class="card">
      <label>株間（cm）</label>
      <input type="number" id="spacingRow" class="form-input" value="34">

      <label>畝間（cm）</label>
      <input type="number" id="spacingBed" class="form-input" value="60">
    </div>

    <!-- 備考 -->
    <h2 class="section-title">備考</h2>
    <div class="card">
      <textarea id="notes" rows="3" class="form-textarea" placeholder="欠株・病害虫など"></textarea>
    </div>

    <!-- 保存 -->
    <button type="button" class="primary-btn" onclick="savePlanting()">保存</button>

    <!-- ★ 作業完了ボタンは utils.js が追加する -->
  </div>

  <!-- ★★★★★ 保存モーダル ★★★★★ -->
  <div id="modal-container"></div>
  <script>
    fetch("/common/save-modal.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("modal-container").innerHTML = html;
      });
  </script>

  <!-- save-modal.js -->
  <script type="module" src="/common/save-modal.js"></script>

  <!-- summary.js -->
  <script type="module" src="../common/summary.js"></script>

  <!-- planting.js -->
  <script type="module" src="./planting.js?v=20260716-2"></script>

  <!-- save/index.js -->
  <script type="module" src="../common/save/index.js"></script>

  <!-- ===============================
       ▼ 認証 → ヘッダー挿入 → 初期化
  =============================== -->
  <script type="module">
    import { verifyLocalAuth } from "/common/ui.js";
    import { renderHeader } from "/common/header.js";
    import { attachWorkDoneButton } from "/common/utils.js";
    import { initPlantingPage } from "./planting.js?v=20260716-2";

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await verifyLocalAuth();
      if (!ok) return;

      // ヘッダー描画
      renderHeader();

      // ページ表示
      document.getElementById("form-area").style.display = "block";

      // 日付初期値
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById("plantDate").value = today;

      // 作業完了ボタン
      attachWorkDoneButton();

      // ページ固有初期化
      initPlantingPage();
    });
  </script>

  <script src="/common/sw-register.js?v=20260713-1"></script>
</body>

</html>
