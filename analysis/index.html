<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>圃場分析</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- デザイン用CSS -->
  <link rel="stylesheet" href="analysis.css">
</head>

<body>

  <!-- 圃場名（analysis.js で書き換え） -->
  <h1 id="field-name"></h1>

  <!-- ★ 分析カードをまとめるコンテナ -->
  <div id="analysis-container">
    <!-- ★ カードは analysis.js が動的に追加する -->
  </div>

  <!-- 戻るボタン -->
  <button class="back-btn" onclick="location.href='/yamamoto-farm-log/map/index.html'">
    地図に戻る
  </button>

  <!-- 認証チェック & メイン処理 -->
  <script type="module">
    import { verifyLocalAuth } from "/yamamoto-farm-log/common/ui.js";
    import { initAnalysisPage } from "./analysis.js";

    window.addEventListener("DOMContentLoaded", async () => {

      // 認証チェック
      const ok = await verifyLocalAuth();
      if (!ok) return;

      // worker → 閲覧禁止
      if (window.currentRole !== "family" && window.currentRole !== "admin") {
        alert("このページは家族のみ閲覧できます");
        location.href = "/yamamoto-farm-log/map/index.html";
        return;
      }

      // メイン処理
      initAnalysisPage();
    });
  </script>

</body>
</html>
