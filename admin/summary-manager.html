<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>サマリー管理 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { font-family: sans-serif; padding: 20px; background:#f5f5f5; }
    h1 { margin-bottom: 16px; }
    .item {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .btn {
      padding: 6px 12px;
      background: #2f855a;
      color: white;
      border-radius: 4px;
      cursor: pointer;
      border: none;
    }
    #generateAll {
      margin-top: 20px;
      padding: 12px;
      font-size: 16px;
      width: 100%;
      background: #3182ce;
      color: white;
      border: none;
      border-radius: 4px;
    }
    #status {
      margin-top: 20px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

  <!-- 認証後に表示 -->
  <div id="form-area" style="display:none;">

    <h1>サマリー管理</h1>
    <p>未生成のサマリーを一覧表示します。</p>

    <div id="summaryList"></div>

    <button id="generateAll">すべて生成</button>

    <div id="status"></div>

  </div>

  <!-- JS -->
  <script type="module">
    import { verifyLocalAuth } from "/yamamoto-farm-log/common/ui.js?v=2026031418";
    import { initSummaryManager } from "./summary-manager.js?v=2026031418";

    window.addEventListener("DOMContentLoaded", async () => {

      // ★ 認証チェック（shipping と同じ）
      const ok = await verifyLocalAuth();
      if (!ok) return;

      // 認証済み → UI 表示
      document.getElementById("form-area").style.display = "block";

      // ★ summary-manager 初期化
      initSummaryManager();
    });
  </script>

</body>
</html>
