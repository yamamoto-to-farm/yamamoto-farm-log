<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>サマリー管理 - 山本農園</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ★ 共通デザイン -->
  <link rel="stylesheet" href="/yamamoto-farm-log/common/style.css?v=1">

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

  <div id="form-area" style="display:none;">

    <h1>サマリー管理</h1>
    <p>未生成のサマリーを一覧表示します。</p>

    <!-- 未生成リスト -->
    <div id="summaryList" class="card"></div>

    <!-- すべて生成 -->
    <button id="generateAll" class="primary-btn">すべて生成</button>

    <!-- ステータス -->
    <div id="status" class="info-line"></div>
  </div>

  <!-- JS 読み込み順が超重要 -->
  <script type="module" src="../common/summary.js?v=2026031418"></script>

  <script type="module">
    import { verifyLocalAuth } from "/yamamoto-farm-log/common/ui.js?v=2026031418";
    import "./summary-manager.js?v=2026031418";   // initSummaryManager は不要

    window.addEventListener("DOMContentLoaded", async () => {

      const ok = await verifyLocalAuth();
      if (!ok) return;

      document.getElementById("form-area").style.display = "block";

      // summary-manager.js が自動で refreshMissingSummaries() を実行する
    });
  </script>

</body>
</html>
