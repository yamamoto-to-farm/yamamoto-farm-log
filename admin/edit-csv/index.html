<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CSV 編集（管理者）</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { border-collapse: collapse; margin-top: 20px; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 6px 10px; }
    th { background: #f0f0f0; }
    #csvTableArea { margin-top: 20px; }
    .row { margin-top: 15px; }
    button, select { padding: 8px 16px; }
  </style>
</head>
<body>

  <h1>CSV 編集（管理者）</h1>

  <!-- 上段：ファイル操作 -->
  <div class="row">
    <label>保存フォルダ：</label>
    <select id="csvType">
      <option value="planting">planting</option>
      <option value="harvest">harvest</option>
      <option value="weight">weight</option>
      <option value="seed">seed</option>
      <option value="nursery">nursery</option>
      <option value="discard-planting">discard-planting</option>
    </select>

    <label>ファイル名：</label>
    <select id="csvFile">
      <option value="all.csv">all.csv</option>
    </select>

    <button id="loadCsvBtn">読み込む</button>
    <button id="saveCsvBtn">保存する</button>
  </div>

  <!-- 中段：行操作 -->
  <div class="row">
    <button id="addRowBtn">行を追加</button>
    <button id="deleteRowBtn">選択行を削除</button>
  </div>

  <!-- 下段：テーブル -->
  <div id="csvTableArea"></div>

  <script type="module" src="./edit-csv.js"></script>
</body>
</html>
